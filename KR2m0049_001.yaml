body:
  text: 臨事之政計二十臨事論曰古者有鄉里之委積以恤民艱門關之委積以飬老孤縣都之委積以待凶荒夫能食之已足矣而必又有所積蓋如此所以為仁政之周也後世古法不修適遇飢困或指仰官榖以為生命或勸捐借以助賑施上即垂覆載之鴻恩下仍多凍餒之黎庶此皆承平日久豐穰積年救災恤患之務闕焉不講耳語云拯災貴早賙急濟困之道茍能斟酌於康年自可維持於儉嵗凡長民者誠能踵武聖賢廓開大制則深恩被於蒼生厚惠流於下土仁民之業豈不偉歟一急祈禱以回天意周禮奚武周逹漢明帝唐代宗麴信陵宋太宗宋王子融蘇軾語附仁宗東坡志林元順帝李伯時明太祖梅傳周禮小祝掌小祭祀順豐年逆時雨寧風旱弭災兵逺罪戾司巫掌羣巫之政令若國大旱則帥巫而舞雩國有大災則帥巫而造巫恆巫恆巫之有常者帥巫而造之求所以禱禳之術也謹案聖王御宇其愛民也甚於愛身故商之旱成湯之禱於桑林也以六事而自責周之旱宣王側身修行而欲消去之其憂民之憂也若此宜乎萬姓戴之如日月親之如父母矣今觀周禮原貴祈求凡災傷之處倘去神京甚逺食祿是方者可不竭誠致敬上體天子之心下救小民之苦使玉燭常調而時聞擊壤之歌哉漢明帝永平十八年四月詔曰自春以來時雨不降宿麥傷旱秋種未下政失厥中憂懼而已其理寃獄録輕繫二千石分禱五嶽四瀆郡界有名山大川能興雲致雨者長吏各潔齋禱請冀蒙嘉澍謹案天之水旱固難測人之祈禱亦豈同哉如遇旱災擾龍潭掩枯骨禁民間不得舉火抑陽而助隂遇雨患閉城市北門蓋井禁婦人不許入市抑隂而助陽然而究不若一誠是格之為當也漢世遣官分禱理寃獄出輕繫既極其誠復施仁政不可為後世之法歟周逹奚武為同州刺史時大旱髙祖敕武祀華嶽嶽廟舊在山下常所祈禱武謂僚屬曰吾備位三公不能燮理隂陽遂使盛農之月久絶甘雨天子勞心百姓惶懼忝寄既重憂責實深不可同於衆人在常祀之所必須登峰展誠尋其靈奧嶽既髙峻千仞壁立巖路嶮絶人迹罕通武年逾六十惟將數人攀藤援枝然後得上於是稽首祈請陳百姓懇誠晚不得還即於嶽上藉草而宿夢見一白衣人來執武手曰辛苦甚相嘉尚武驚覺益用祗肅至旦雲霧四起俄而澍雨逺近沾洽髙祖聞之賜璽書慰勞謹案念民既深祈禱自切奚武不避一身之險遂格嶽神之靈隂雲布而時雨降民間之困釋矣後之君子欲免災危者可不小心翼翼昭事上帝哉唐代宗大厯四年四月雨至於九月京師斗米八百官出米二萬石分場出糶閉坊市北門置土臺臺上置立黃旗以祈晴是日雨止謹案天之以災譴示警實未嘗殃民以快意也將以試司牧者之處置何如耳今幸出官米而分糶之民困稍蘇是霽也窮黎欣幸感召而致之乎抑亦閉北門置土臺而晴也賢哲者定有以知此舒州令麴信陵有仁政嘗為禱雨文其略曰必也私欲之求行於邑里慘黷之政施於黎元令長之罪也神得而誅之豈可移於人而害於嵗耶焚畢雨澍謹案對衾影而無慚者始能向神明而暢逹也甚矣仁政之美也清白之吏神勿福之乎無辜之民嵗將困之乎民無罪而令長賢雨或稍遲神豈無過此司空圗之移雨神亦曰知民之情而不時請於天是徒偶於位矣何以為神宋仁宗慶厯甲申王子融息壤記云余以尚書郎蒞荆州自春至夏不雨遍走羣祀五月壬申與羣僚過此地無復隆起而石屋簷已露請掘取驗雖致小沴亦足為快因具畚鍤以待來朝從事是夕雷雨大至逺近沾洽即以馨爼薦答蘇子瞻息壤詩序云息壤旁有石不可犯畚鍤所及又復如故又頗致雷雨嵗旱屢發有驗謹案雨之不可得者緣無從而知其可必能致雨之術也今觀息壤王子融蘇子瞻皆云略不可犯屢有所驗犯之既有其災求之豈無所福欲雨者茍於此地展其誠敬焉知不勝於鋤鍤之用哉宋太宗太平興國五年五月癸卯朔京師大霖雨辛酉命宰相祈晴己卯命宰臣禱雨至道二年命宰臣百官詣神祠禱雪謹案燮理隂陽宰相之任也風雨時若百榖繁昌此皆聖天子時時默祝於上天且以此責望於公孤卿尹者也茍或愆時過甚則百僚之長自宜身任其勞齋心虔禱上為至尊分憂下率羣臣盡職至誠所感或者邀福於上蒼以乂安海宇此亦賢臣遇災而懼之道也仁宗慶厯七年三月辛丑帝禱雨於西太乙宫日方炎赫帝却蓋不御及還大雨沾足謹案仁宗每遇水旱必露立仰天痛自刻責抑何仁愛斯民之至於斯也夫災荒之至半由人事闕失故惟恐懼修省克謹天戒以感召和氣則災戾消而百榖用成萬民以濟詩曰小心翼翼昭事上帝聿懷多福仁宗有焉東坡志林云吾昔為扶風從事嵗大旱問父老境內有可禱者云太白山至靈自昔有禱無不應者近嵗有太守奏封山神為濟民侯自此禱則不驗矣莫測其故吾方思之偶取唐會要看云天寶十四年方士上言太白山金星洞有寶符靈藥遣使取之而獲詔封山為靈應公吾然後知神之所以不悅者即告太守遣使禱之若應當奏乞復公爵且以瓶取水歸郡水未至風霧相纒旗幡飛舞倣佛若有所見遂大雨三日嵗大熟吾作奏具言其狀詔封明應公吾復為記之是嵗嘉祐七年謹案舊典不可不諳神靈不可不敬使非蘇公之觀唐會要知前人封典之誤誠心敬禱許復公爵則雨終不可得而嵗能豐哉孝宗淳熙時大旱知縣李伯時以擾龍事告太守以長繩繫虎骨縋於龍潭中遂得雨取之稍遲雷電隨至急令人取出乃止南州久旱里人以長繩繫虎骨投有龍處入水即數人牽掣不定俄頃雲起潭水雨亦隨降龍虎敵也雖枯骨猶能激效如此謹案行渺茫之祀典不若效可法之祈求虎骨非難得之物龍潭亦郡邑所常有知縣李伯時與南州里人皆以此而得雨今之求雨者獨不可以一試乎但恐不有誠心仍無實效此又在人之自勵矣元順帝至正二年御史王思誠上奏謂京畿去年秋不雨冬無雪方春首月蝗生河水溢宜雪寃獄敕有司行禱百神陳牲幣祭河伯塞決口被災之家厚加賑恤庶幾可以召隂陽之和消水旱之變此應天以實不以文也謹案人君馭育萬物敬畏天神豈徒以虛文求降鑒哉歷稽古史宋景公以善言退星漢文帝敕有司祭而不祈勿媚神以求助唐懿宗詔京兆用香水蒲蕭於坊市以召雨羅隱請遵十六聖之教訓可致豐稔誠以君上有愛民之隱則必實踐其仁厚之言急行其補救之政然後誠信昭於上恩澤及於下推德意以導揚和氣雖多災沴有潛消而默化矣願司牧者之敬慎乎平時警惕於臨事也明太祖洪武三年夏久不雨上憂之乃擇日躬自祈禱至日四鼓上素服草履徒步出詣山川壇設藁席露坐晝暴於日頃刻弗移夜卧於地衣不解帶皇太子捧榼進農家之食雜麻麥菽粟凡三日既而大雨四郊霑足謹案天者羣物之祖帝王則萬民之大父母也飢饉之嵗億兆嗷嗷於下司牧者憂勞於上惟恐弗克積誠感召天和為民請命於蒼昊矧敢燕間深宫置民傷於度外哉太祖洞悉其理虔心步禱幾不自愛其髮膚是以君心端而天心亦順甘澍滂沱嵗稱大有豈不美歟明季戊申河南大旱知登封令梅傳見麥俱枯稿因思蕎麥可種勸民偹種而待之祈禱畢信步行數里遇一隱士揖曰令君勤苦然雨關天行非旦夕之可得也梅曰蕎麥尚可種乎其人嘆息曰可惜一片仁心向樹下一指曰公欲活民非此不可視之則菜也梅遂令民廣收菜子與蕎麥並種未幾又霪雨不止蕎無一生者惟菜則勃然透發矣且逾常年數倍民賴以不死謹案苟以難必之事教民不若以得飽之道率衆令君意在活民誠心祈禱雖不能必雨暘之協應亦可得隱士之指述噫此隱士者烏知非神人之化身不然何以知蕎之不生而菜之必茂也乃知一誠所感萬類俱通怨天尤人者徒增罪戾耳此亦救雨災之一法留心民瘼者不可不知也急祈禱總論曰至治馨香何事於禱不知旱潦無常非神莫祐禱亦不可少也况當萬民窘迫四境倣徨之際哉使弗夙夜祗肅以上格天心不但不能救將來之飢饉且不能慰悵望之民情矣此周禮小祝必有掌祭祀者在也為人君者因祈禱而念民艱釋寃獄廣平糶或格神於夢寐或得雨於躬祈懷保之仁不於此而見歟嶽神降鑒大臣之敬也邑令則作文章而自責投虎骨以擾龍誠意所通雨無不得菜之可以活民不遇隱士之指點何由而知可見有牧民之責者無時不當積誠以致感通如不可得則如蘇子瞻之迎神受惠王子融之息壤求恩皆可法也安可食天祿而不顧嵗時之豐歉哉詩云天降喪亂飢饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽惟圭璧既卒而後可以冀上天之降鑒將荒之際要務尚有過於祈禱者哉二求才能以捍災傷漢武帝帝南齊武秦王堅唐太宗杜黃裳孝宗宋司馬光理宗元武宗元明林希張光大鍾化民漢武帝元朔元年冬詔曰十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也二千石官長紀綱人倫將何以佐朕燭幽隱惠元元厲蒸庶崇鄉黨之訓哉且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪謹案武帝之詔雖不專為荒政而言然而令人舉賢之法莫妙於此如趙簡子得尹鐸而萬姓感懷陳寵用王渙而百事盡理况飢年民命在於旦夕若不以賞罰勵薦舉烏知不有徘徊岐路觀望而後時者哉東晉秦甘露五年十月秦王堅命牧伯守宰各舉孝悌亷直文學政事察其所舉得人者賞之非其人者罪之由是人人莫敢妄舉而請托不行內外之官率皆稱職田疇修辟倉庫多實盜賊屏息謹案用人得而萬事理非秦王之謂乎令舉之不得其法賞罰混淆蒙蔽者多田疇能闢歟倉庫能充歟盜賊能息歟甚矣賢良之不可不急而賞罰之不可不明也南齊武帝永明三年詔守宰親民之要刺史案部所先宜嚴課農桑相土揆時必窮地利若耕蠺殊衆足勵浮惰者所在即便立奏其違方矯務佚事妨農亦以名聞將明賞罰以勸勤怠較核殿最以申黜陟謹案佚事妨農國之大蠧也設逢水旱小民衣食全無必至凍餒流離轉於溝壑此詔既勵司牧於未荒豈肯因循於歉嵗可謂勸之切而責之當者矣唐太宗貞觀初上令封德彛舉賢久之無所舉上詰之對曰非不盡心但今未有竒才耳上曰君子用人如器各取所長古之致治者豈借才異代乎正患已之不能知安可誣一世之人德彛慚而退謹案一人之聰明有限天下之才智無窮可弗令人悉舉乎故有一代之聖君必有一代之賢臣何嘗借才於異代蔽賢小人惟知自用被太宗一言道破此其所以抱慚而退耳憲宗元和間上與宰相論自古帝王或勤勞庶政或端拱無為互有得失何為而可杜黃裳對曰王者上承天地宗廟下撫百姓四夷夙夜憂勤故不可自暇自逸然上下有分紀綱有序茍慎選天下賢才而委任之有功則賞有罪則刑誰不盡力明主勞於求賢而逸於得人此虞舜所以能無為而治者也謹案天下事獨任則勞分任則逸理固然也然不得賢才而委之則親民之官不以實心行實政而救災恤患之無方督撫大員不能洞逹國體宣布德意於羣黎俾知崇節儉致阜成之有道所以治國之謨必以慎選為要杜公之對真宰相之論也宋神宗熙寧二年遣使賑濟河北流民司馬光言京師之米有限河北之流民無窮莫若擇公正之人為監司使察災傷州縣守宰不勝任者易之各使賑濟本州縣之民則飢民有可生之路豈得有流移謹案宋之司馬君實其為政也雖婦人小子無不愛之戴之然其救荒也亦以舉賢良去不職為言後之活餓莩者何可不以得人為首務大生機於歉嵗而免流移之顛沛哉孝宗時臣僚言諸路旱傷乞以展放展閣責之轉運司糴給借貸責之常平司覺察妄濫責之提刑司體量措置責之安撫司上諭宰執曰轉運只言檢放一事恐他日賑濟之類必不肻任事虞允文奏曰轉運司管一路財賦謂之省計凡州郡有餘不足通融相補正其責也謹案君臣之間皆以飢民為急其用人也互相斟酌惟恐稍有不當以貽民患悉令各盡厥職事有專司非蒼生之幸歟理宗嘉熙三年臨安飢民相擕溺死命故守臣趙與權仍知臨安府事與權奉詔急榜諭各全性命佇沐聖恩都人遂相戒勿死與權上則祈哀公朝下則推誠勸分甘雨隨至米商大集即流移者亦有以濟之謹案理宗之命故守臣仍知臨安府事民遂相戒勿死良吏之有益民生也如此凡當歉嵗得此良模借寇之風忽焉再覩何患雨之不降民之不救哉元武宗至大二年詔即位以來恆以拯災恤民為務而恩澤猶未溥博流離猶未安集豈有司奉行弗至歟今特命中書省選內外官僚專以撫治為事簡汰冗員撙節浮費一新政理以稱朕懷謹案因恩澤未溥而以遴選宜嚴計之得矣但在司牧亦不可不以下士為懷昔子竒年十六而令於阿非賴白首者悉與之謀其能大治歟張光大有云擇人委任為第一要事若委任得人自然無弊君子作事謀始賑濟之方尤為當慎若一概委用富豪之家則富而好義者少為富不仁者多其害有甚於吏胥無藉之輩今後莫若選擇鄉里有德望誠信謹厚好義之人或賢良縉紳素行忠厚廉介之士不拘富豪但為衆所敬而悅服者許令鄉民推舉使之掌管庶幾儲積不虛凶年飢嵗得以濟民也謹案元之張君猶夫宋之董氏也留心荒政真誠愷切故所論悉皆出於肺腑事事可法嗚呼人生天地間既不能致君擇民再不能立説濟世食粟而已不亦大有愧於寸隂是惜之論哉明僉事林希元疏內有云救荒無善政使得人猶有不濟况不得人乎臣愚欲令撫按監司精擇府縣官之亷能者使主賑濟正印官如不堪用可别擇廉能佐二或無災州縣亷能正印官用之蓋荒事處變難以常拘也至於分賑官員可令主賑官擇之事完官則上之吏部府縣學職等官視此黜陟舉人監生等人員視此為除授民則上之撫按别其賞罰如此則人人有所激勸而荒政之行或庶幾乎謹案僉事之救荒可謂無微不入矣首重得人而以賞罰勸人敢不以勤敏自勵怠惰為戒哉此即求賢於賞罰之中使飢民得活於拯溺扶危之道耳御史鍾化民救荒諭所屬曰司厰不可用在官人各地方保甲里耆公舉富而好禮者州縣官以鄉賔禮往請破格優禮諭以實心任事厰內利弊陳請即行月給官俸能使一厰飢民得所旌以彩幣匾額倍之者給以冠帶或為骨肉贖罪或欲子弟採芹任其所欲富室捐賑視其多寡與司厰者同賞格既諭之後又巡歷各方用拾遺法得實心任事多方全活災民賢之尤者即刻破格薦揚貪暴縱恣以致餓殍枕籍不肖之尤者即時馳參以故羣吏實心任事飢民多所全活拾遺法預令飢民進見時人具一紙勿書姓名開所當興當革及官吏豪猾有無侵刻橫行散布於地即與興革處分然必擇其僉同者而後察之也謹案破格優禮陳請即行鍾公存此八字於心何患人之不為我用人亦誰不欲見用於公此所以縣縣得人而厰厰有濟也况有拾遺之妙法乎求才能總論曰天下事未有不得人而能理者也况歉嵗哉事起急迫人非素練老幼悲啼婦女雜亂厲之以嚴則餓體難加撲責待之以寬則散漫莫肯循規加之吏胥作弊致使餓莩盈途故不得人其何以濟此歷代聖君賢相無不以得人為要也如漢武之詔謂進賢受上賞蔽賢蒙顯戮唐太宗之罪封德彛謂用人當取所長必不借才異代雖不為救荒而言而自得求才任事之要道南齊之詔至大之制切中情弊其次如苻堅之責重有司孝宗之與羣僚斟酌髙宗之復用與權皆用人救荒之良法僉事之用廉能任其擇取御史之用厰首陳請得行人有不樂為其所用歟昔王梅溪守泉州會邑宰勉以詩云九重天子愛民深令尹宜懷惻隱心今日黃堂一杯酒使君端為庶民斟使為太守者皆若梅溪之存心又何患乎令之不善也總之在君相當郡縣是求在郡縣宜鄉耆是選遞相慎擇必得其人任之以事自無不濟書云建官惟賢位事惟能時當歉嵗可弗以擇賢任能為首務哉三命條陳以開言路虞舜伯周西夏禹周公漢文帝宋真宗唐太宗神宗明于謙劉大夏周忱詔世宗虞帝廣開視聽求賢自輔置進善旌立敢諌鼓設誹謗木以訪不逮於總章即明堂堯曰衢室舜曰總章謹案聖人之治天下肯使一民不被其澤哉但貴賤相懸朝野相隔雖有善言何由得逹此虞帝之聖不自聖而廣開言路也後世嵗逄飢饉不得良謨將何以補天地之不足故身雖聖矣亦當法虞帝之視聼以善言為重寶夏禹懸器以招言者曰教寡人以道者擊鼓告事者鐸訟獄者鞀諭以義者鐘有憂欲鳴者磬每一饋十起一沐三握髮以勞民鞀音陶有柄搖鼓謹案大禹之治水智超千古功在萬年猶欲以言自益况乎後世帝王不及禹者多矣可挾貴自矜而不以善言為急哉書云德日新萬邦惟懷志自滿九族乃離急下求言之詔時聞規諌之條有不日新其德歟周西伯即位篤仁敬老慈少禮下賢者日中不暇食以待士士以此多歸之謹案世知文王之德廣被四海而不知其所以無逺勿屆者未有不由樂聞善言而得也故日不暇食以求言否則何西伯之不憚煩而時與多士相接哉周家八百之基開之者西伯總在見善不怠去邪勿疑而已矣魯公伯禽周公之長子也成王少周公留相之使其子就封於魯周公戒伯禽曰我文王之子武王之弟今王之叔父吾於天下亦不賤矣然我亦一沐三握髮一飯三吐哺起以待士猶恐失天下之賢人子之魯慎無以國驕人謹案孔子之所讃美者周公之才也要知天下無有過於周公之才者矣尚且握髮吐哺以待士周公豈不知身之貴哉蓋以作相之道貴乎尊賢而得士不可不以言為重耳併以之訓其子則凡驕矜自恃拒人於千里之外者視此豈不有天壤之隔耶漢文帝時每朝郎從官上書疏未嘗不止輦受其言言不可用置之言可用則採之未嘗不稱善又除誹謗妖言法詔曰古之治天下朝有進善之旌如有進善者立於旌下言之誹謗之木慮政有缺失便言事者書之於木所以通治道而來諫者也今法有誹謗妖言之罪是使衆臣不敢盡情而上無由聞過失也將何以示逺方之賢良其除之謹案文帝之求直言不啻如飢者之欲食渴者之欲飲故無不稱其善者誘之使言也除誹謗妖言法者慮其懼禍而不告也朝乾夕惕民瘼是恤不待鄒忌之諷諫而能然也此文景之時號稱熙皥盛世可以倣佛唐虞耳唐太宗貞觀三年夏六月以旱求直言中郎將常何武人不學家客馬周代陳便宜二十餘條上怪其能以問何對曰此非臣所能家客馬周為臣具草耳上即召之未至遣使督促者數輩及謁見與語甚悅令直門下省尋除監察御史奉使稱旨上以常何為知人賜絹三百匹謹案以太宗之聰明英武一遇飢年直言是急救我元元故見馬周條陳之言即令人召之不特召之而且使人促之不特促之而且官之無非為萬民起見故天下無不救之飢寒發明云太宗之用人如此天下烏有遺才治道烏有不進者哉信矣夫宋真宗咸平二年閠三月丁亥以久不雨諭宰相曰凡政有闕失宜相規以道毋惜直言庚寅罷有司營繕之不急者詔中外臣直言極諌壬辰雨謹案言路通而苛政除猶夫茅塞去而蹊徑豁人情快於下天道有勿和於上哉真宗之諭宰相首欲闕失相規詔諭羣僚又望極言敢諫猶恐己之不德降咎於民急於改過惟善是圗上蒼有不為之感動哉此時雨之所以立降也神宗熙寧七年京師久旱下詔求直言略曰朕之聽納有不得於理歟獄訟非其情歟賦斂失其節歟忠謀讜言鬱於上聞而阿諛壅蔽以成其私者衆歟詔出人情大悅是日即雨謹案是雨也非詔出而即雨也因人情之大悅和氣相感而雨者也人情豈徒悅哉蓋因直言即罷新法二十八事民免征求死於法網而雨者也乃知鄭俠之繪圗韓維之力諌實有回天之力仁宗因亢旱而求直言英宗緣雨災而望敢諌從未有若兩君言之切而驗之速者也誰謂天道之元逺哉明宣德間山西河南荒上命于謙巡撫二省公到任即立木牌於院門一書求通民情一書願聞利弊二省里老皆逺來迎公公曰吾欲首行平糶之法汝衆里老可將吾言勸諭富豪之家將所積米榖扣起本家食用之外餘者皆要糶與飢民若仗義者每石肯減價二錢減至一百石以上者免其數年差役一二千以上者奏請建坊旌表有不願減者勿強若有姦民擅富要利坐視飢民不與平糶者里老從實具呈重罰不恕凡有借欠私債一概年豐還納若有遺棄子女里老可即報與州縣著官設法收飬候嵗熟訪其父母而還之如里內有賢良之民能收飬四五口者官犒以羊酒給其匾額十口以上者加綵縀免其終身差役二十口以上者冠帶榮身一時富民樂捐而尚義者甚衆謹案公之謀猷能匡輔社稷之艱危豈不克自出救荒之仁術然猶以民情利弊為急榜示於門求通言路蓋以撫綏之責關係匪輕拯災之方便民為上茍非虛衷下問實心採訪縱有愛民之意難施利濟之謀是以咨詢周廣惟恐百姓不為上告民情不得上申言路開而州牧縣令罔敢遏抑寃滯由其上之明聰已無逺不屆也蠧胥姦役莫敢擾纍閭里緣其上之察訪已無微不燭也豪猾紳士弗敢閉糴昻價侵牟鄉邑懼受欺受侮者之直訴劣迹難逃國憲也然此尚未可恃為無弊必平心以審之明決以行之其庶幾有利而無害歟正統時周文襄公巡撫江南蘇州逋稅七百九十萬石公閲牒大異詢父老皆言吳中豪富有力者不出耗并賦之貧民貧民不能支盡流徙公創為平米官田民田并加耗蘇稅額二百九十餘萬石公與知府况鍾曲算疏減八十餘萬石明何良俊曰周文襄巡撫江南一十八年常操一小舟沿村逐落隨處詢訪遇一村朴老農則携之與俱卧於榻中下咨以地方之事民情土俗無不周知故定為論糧加耗之制以金花銀粗細布輕賫等項禆補重額之田斟酌損益盡善盡美顧文僖謂循之則治紊之則擾非虛語也𢎞治間命户部劉大夏出理邉餉或曰北邉糧草半屬中貴子弟經營公素不與此輩合恐不免剛以取禍大夏曰處事以理不以勢俟至彼圗之後既至召邉上父老日夕講究遂得其領要公有餘積家有餘財舊評曰忠宣之法誠善然使不召邉上父老日夕講究如何得知能如此虛心訪問實心從善何官不治何事不濟書曰木從繩則正后從諌則聖人臣果知納約自牖之理兼以實心愛民則民情何時不可上聞九重何時不悉民隱耶世宗嘉靖七年九月川陕湖廣山西荒諭都察院令內外官員條奏救荒良䇿及凡不便者謹案事不盡晰於典章言不盡在於卿二故必令內外官員奏其良䇿蓋合天下之廣兆民之衆平時經理常恐有未協民心不便民俗之事况於飢荒之嵗尤須斟酌盡善康濟黎元况內外官員具有牧民之責然則有嘉謀嘉猷者可不急為入告以順承此德意也哉命條陳總論曰舜之孝禹之功西伯之德皆臻人世之極皇皇焉猶恐士民不以善言告日中不暇食求賢以自輔後之致治者可弗廣開言路歟君臣一體理豈有殊周公之輔成王一沐三握髮一飯三吐哺猶恐失天下之賢人故致君澤民者亦無不以言路為先也况逄凶嵗飢饉頻仍衣食難充者衆民困不知救援無術何以稱佐君上燭幽隱子元元之意哉此漢文帝之止輦受言庶幾無愧唐太宗之立用馬周倣佛聖王其他如宋之二君明之嘉靖亦不愧凶年之修省于忠肅公之巡撫兩省一到即求通言路上逹民情惟以平糶為先育嬰為重上行之既力下奉之必誠既活飢寒之衆復全襁褓之嬰仁哉忠肅救荒之政也周文襄大驚逋欠若不隨地與農民辨論烏得周知劉大夏出理邉疆使不日夕與父老圗謀何由得法且草茅之中屠狗之間未必無人言可忽乎書云能自得師者王謂人莫若己者亡好問則裕自用則小君子可不卑以自牧合天下之智以為智哉四先審户以防冒恩宋蘇次參鄭雍李余珏童俞宗亨袁燮董林煟元明希鍾化民周孔教陳霽岩陳龍正宋蘇次參澧州賑濟患抄劄不公給印册一本用紙半幅令各自書某家口數若干大人若干小兒若干合請米若干實貼於各人門首壁上如有虛偽許人告首甘伏斷罪以便委官查點又患請米者冗分定幾人為一隊逐隊俱用旗引如卯時一刻引第一隊領米二刻引第二隊以至辰巳時皆用此法則自無冗雜且老幼婦女悉得均糴矣又任澧陽司户日權安鄉縣正值大潦始至令典押將縣圗逐鄉抹出全潦者用緑半潦者用青無水之鄉用黃不以示人又令鄉司抹來參合方請鄉耆逐鄉為圗復以青緑黃色别其村分出圗參驗故不檢潦而可知分數催科賑濟亦視此為先後其法甚簡要也謹案宋蘇君兩番賑濟前法固佳安鄉之潦令典押抹出或言在城之人焉知在鄉之事豈能無弊殊不知水潦乃人所共覩共聞倘出人不意親歷數鄉而驗之不但典押不敢妄抹即鄉司鄉耆皆知自警矣非善法而何李珏守毗陵時適遇民飢將災傷都分作四等抄劄仁字係有産稅物業之家義字係中下户雖有産稅災傷實無所收之家禮字係五等下户及佃人之田并薄有藝業而飢荒難於求趂之人智字係孤寡貧弱疾廢乞丐之人除仁字不係賑救義字賑糶禮字半濟半糶智字全濟並給票計口如常法惟濟米預挂榜文十日一次委官散給民至於今稱之丁卯鄱陽旱暵又將義倉米每日就城中多置場所減價出糶先救城內外之民却以此錢準價計口逐月一頓支給以濟村落之民非惟深山窮谷皆沾實惠且免偷竊拌和之弊一物兩用其利甚普謹案李公之守毗陵户分四等别之最清其賑鄱陽先城後鄉以錢代米免拌和路費之苦循循有序處處至當如陳平之宰肉以之而治天下何不均之有吳中大飢方議賑恤以民習欺誕敕本部料撿家至户到左諫議大夫鄭雍言此令一布吏專料民而不救災民皆死於飢今富有四海奈何謹圭撮之濫而輕比屋之死乎上悟追止之謹案搜檢户口在官長則不可不嚴在天子萬不可過謹何也官長不嚴則濫冒者決多天子過謹則搜檢者必刻而况久羈時日乎諌議之言誠懷保赤子之道也天子悟而追止之君明而臣良吳人生矣余童蘄州賑濟盡括户口之數第為三等孤獨不能自存者專賑濟下户乏食者賑糶有田無力耕者賑貸閣境五邑以鄉村逺近均粟置場每場以一總首主出納十場以一官吏專伺察謹案户列三等賑各不同已得其要而且逺近置場多分給所各有所主令官察之弊不能生惠可遍及宜其見美於千秋江東運判俞宗亨賑濟踏殺婦人一百六十二人乞待罪舊評曰是未明分場分隊用旗引之法不知徐寧孫蘇次參皆有成式儘可通變而行大抵百人已上便慮冗雜此皆平日無紀律者况飢羸之軀易蹂踐乎從政郎董煟曰勘災抄劄之時里正乞覓強梁者得之善弱者不得也附近者得之逺僻者不得也吏胥里正之所厚者得之鰥寡孤獨疾病而無告者未必得也賑成已是深冬官司疑之又令覆實使飢者自偹裹糧數赴點集空手而歸困踣於風霜凛冽之時甚非古人視民如傷之意凡縣令宜每鄉委請一上戶平時信義為鄉里推服官員一人為提督賑濟官令其逐都擇一二有聲譽行止公幹之人為監視每月送米麥點心錢分團抄劄不許邀阻乞覔有則申縣斷治其發米賑糶亦如之若此庶乎其弊少革耳謹案董君此語在數百年之前而勘賑弊端歷歷如繪可見人情千古一轍惟在為政者善於審户發糧否則徒飽姦人之腹耳袁燮為江隂尉浙西大飢常平使者羅點屬任賑恤燮命每保畫一圗田疇山水道路悉載之以民居分布其間凡名數治業悉書之合都為鄉合鄉為縣征發追胥披圗可立決以此為荒政首謹案披覽輿圗瞭如指掌司牧者留心於間暇之時則臨事自有定見若災荒既告方事丹青如嗷嗷待哺者何與索我於枯魚之肆者殆不逺也明僉事林希元疏云臣愚欲分民為六等富民之等三極富次富稍富貧民之等三極貧次貧稍貧稍富不勸分稍貧不賑濟極富次富使自檢其鄉之次貧稍貧而貸之種非特欲借其銀種也欲於勸分之中而寓審户之法何者蓋使極富次富之民出銀以貸諸貧彼必度其能償者方借而不借者即極貧不用耳目而民為吾耳目不費吾心而民為吾盡心法之簡要似莫有過於此者若流移之民則與鰥寡孤獨等皆謂之極貧可也謹案審户不清姦人得之已可恨貧戶失之更可憐林公此法使鄉里自别上中下三等而貸之其源清矣其流豈濁哉但極富者當貸幾户次富者當貸幾人不可不細加斟酌亦安富之一道也御史鍾化民督理荒政有云垂亡之人既因粥厰而得生矣稍自顧惜不就厰者散銀賙之令各府州縣正印官遍歷鄉村喚集里保公同查審胥棍作姦許人舉首得實者重賞如虛反坐給與印信小票上書極貧某人給銀五錢次貧某人給銀三錢鰥寡孤獨更加優恤分東西南北先期出示分給以免奔走守候敢有以宿逋奪去者以劫賊同論其銀又當不時掣封稱驗如有低潮短少視輕重處分謹案御史公審户之意一在正印官遍歷鄉村二在公同查審三在許人首告兼而行之不可缺一必須上臺實有愛民之心有司方不敢怠至分東西南北先期出示者尤美政也萬厯己巳陳霽岩知開州時大水無蠲而有賑府下有司議岩倡議極貧民賑榖一石次貧民賑五斗務必令民共沾實惠放賑時編號執旗魚貫而入雖萬人無敢譁者公自坐倉門外小棚下執筆點名視其容貌衣服於極貧者暗記之庚午春上司行文再賑貧者書吏稟公出示另報公曰不必第出前之點名册查看暗記極貧者徑開其人喚領賑米鄉民咸以為神蓋前領賑之時不暇粧點盡得真態故也謹案有司官皆如是之惠愛法紀精嚴何患貧民之不沾實惠要之真誠必能窮虛偽亦惟始終存心為民時時檢點則民情洞鑒而措置無一事之不得其宜矣中丞周孔教撫蘇時有云救荒者凡以為貧户下户也官司非不欲一一清審之奈寄之人則難公任之已則難遍昔人謂救荒無竒䇿正以貧户之難審也所以然者亦不豫故耳合令被災之府州縣豫乘秋月以主賑官督在城保長以在城保長催在鄉保長以保長催甲長以甲長報花户每甲分為不貧次貧極貧三等除不貧外將次貧極貧各口數大小若干貼其門首壁上再令每保開一土紙手本送至賑濟官不許指稱造册科斂貧民待鄉黨日久論定委官乘便覆查此即宋時蘇次參澧州賑濟之法但彼臨時為之不若先時查審貧富明白民志定矣尤為無弊謹案先時查審明白較臨期抄劄貧富逈不相同非親歷其境者不能知其妙也撫君之法不但著美一時且可傳於後世陳龍正曰賑飢之法往往吏緣為姦皆由户之不能審也貧者未必報報者未必給其報而給者又未必貧請就里中推一二大姓任以賑事有司不時單車臨視稍立賞罰科條以勸戒之蓋大姓給散其利有九習知貧户多寡不至漏冒一也給散近在里中得免奔走與留滯之若二也披籍而得姓名榖米之數易於查勘三也以鄰里之誼不至偽雜損耗四也貧户數服大姓即有缺漏同於自鳴五也食糜各於其鄉不至羣聚喧雜穢惡薰蒸而成疫癘六也大姓熟識近鄰不至攫奪七也分縣官之勞八也吏不能為姦九也一云黃𢡟中所言謹案凡論荒政事貴可行語貴通逹勿支勿漏斯得之矣若此九種意周而語切非目覩飢年之竇弊叢興者不能有此妙論也譬如寶鏡當前絲毫悉燭纎塵無有不見者也此雖放賑之法而審户已寓其中不審之審也可不熟此而為濟世之䇿歟先審户總論曰時當歉嵗不以生民為重而恆以榖粟是惜者固非要道然用之而不得其法徒資姦詭莫救哀鴻在朝廷既有所費在窮民不得生全主其事者寧無溺職之罪耶况有冒支之弊必多不給之人有一姓而得數姓之糧者有幾人而不得一口之食者其害可勝道哉故惟天子不當謹圭撮之濫而輕比屋之死鄭雍所言可風千古若主賑之官烏可不預為檢點此蘇次參命取一家人口盡貼壁上陳霽岩自將點過窮民暗記册中立法善而用意深尚何冒破之足慮李珏之人分四等余童之户别三般居上者既能精其妙算在下者焉敢肆其侵欺袁燮之畫未嘗不美但當預計於平時不能濟變於歉嵗懋中所言委托大户其利有九的確不易倉卒可行弊之無窮董煟言之最盡法之簡要希元思之最精鍾御史必令正印官親歷窮鄉公同檢視周巡撫又使府州縣預先抄劄不混稽查由此觀之良法已偹於前矣善政何疏於後也乃知不稽舊典任意設施者不但不能比美先賢且恐踐俞通判之故轍矣惟保甲之法嚴而審戶自清審户清而姦詭息然而尤當籌之於預也詩云逮天之未隂雨徹彼桑土綢繆牖户今此下民莫敢侮豫人能得詩人之意致力於間暇之時又何必倣徨於放賑之際哉五借國帑以廣糴糶春秋臧孫辰興元詔唐開元詔宋吳遵路王元秬至令元張飬浩明康榮成化準奏周孔教林希元屠隆春秋莊公二十八年魯飢臧文仲言於莊公曰夫為四鄰之援結諸侯之信重之以婚􅊚申之以盟誓固國之艱急是為鑄名器藏寶財固民之殄病是待今國病矣君盍以名器請糴於齊於是以鬯圭玉磬如齊告糴曰不腆先君之敝器敢告滯積以救敝邑謹案官之糴糶春秋時賢大夫已行之矣何以後之為臣者竟不恤民之困於髙價糴於熟所糶於荒境哉分釐之惠及小民讃誦之聲盈道路易者不為難者可知雖曰愛民其誰我知唐元宗開元十二年八月詔曰蒲同等州自春偏旱慮至來嵗貧下少糧宜令太原倉出十五萬石米付蒲州永豐倉出十五萬石米付同州減時價十錢糶與百姓謹案糴莫貴於早糶莫貴於時以八月而計來年計之得矣且以十五萬石賑糶於一州每升減價十文非美政乎但唐時出糶之際其法不傳使不知張公詠守蜀平糶之法恐其必盡歸富戶其害實在窮民深可歎耳何也窮民待哺之日時雖多所糴之米粟有限一則官不許其多糴二則彼亦無錢多糴姦人窺破其微賄囑官吏串通斛手在水次日買數十石而去此米未曾發入公所早已暗貨與人故此無從查考簿上仍填零賣之期不踰月而官米已畢矣奈此地米價稍減之名忽又遍傳商販商販聞之懼虧本而不來官長察之歎倉空而無繼米有不驟貴之理乎姦人於是賣其所糴之米不數旬而獲利無算寧勿令人切齒是窮民之食賤米不過數旬窮人之食貴米必需幾月食賤米者十不過二三食貴米者十必八九惠之者非即所以害之耶故賑糶當兼行張公保甲之法此法一行既無冒濫亦不失恩宋之去唐不逺烏知張公所行之法非即蒲同等州所行之法哉賑糴者尚其察之德宗興元元年十月乙亥詔曰頃戎役繁興兩河尤劇農桑俱廢井邑為墟丁壯服其干戈疲羸委於溝壑江淮之間連嵗豐稔迫於供賦頗亦傷農收其有餘濟彼不足宜令度支於淮南浙江東西道增價和糴米三五十萬石差官搬運於諸道減價出糶貴從權便以利於人宜即遣使分道宣慰勞勉將士存問鄉閭有可以救嵗凶災除人疾苦各與長吏商量奏聞謹案是時陸宣公言於上曰人君知過非難改過為難言善非難行善為難詔內命官和糴不厭多方疾苦可除悉求具奏意真詞切感動軍民此車駕之所以得返長安耳忠良之言有益於人國也如是夫宋吳遵路知通州時淮甸災傷民多流轉惟遵路勸誘富豪之家得錢萬貫遣牙吏二十六次和賃海船往蘇秀收糴米豆歸本處依元價出糶使通州災傷之地常與蘇秀米價不殊當時范仲淹乞宣付史館謹案官米若不循環糴糶姦商乘其既盡而鬻之價愈髙而民愈困矣以萬貫錢轉運至二十六次價焉有不平之理故遵路之勸富民者是救一時之災也仲淹之命付史館者欲垂萬世之則也留心民瘼者尚其知所取法哉孝宗乾道七年饒州旱傷措畫賑濟知州王秬劄子借會子五萬貫接續販糴米麥之類以賑糶得旨依江州旱傷益措置本州義倉米四萬四千餘石又截留上供米六千五百餘石作本收糴米斛謹案借錢糴糶官不傷而民有益最善而易行何皆逡巡不果如知州王君借會子錢五萬貫接續販糴朝廷益之以米又得數萬石作本收糴此州尚慮缺食乎事畢而本在民得不死非賢者之妙算而能之乎元文宗時以張飬浩為西臺御史中丞時關中大旱民相食既聞命即散家之所有以與鄉里貧乏登車就道遇飢者賑之死者瘞之經華山禱雨嶽祠泣拜不能起天忽隂翳一雨三日及到官復禱於社壇大雨如注水三尺乃止禾黍自生秦民大喜時米價騰踊緡鈔壅不可得米飬浩以倒換之艱乃檢庫中未燬緡鈔得一千八十五萬五千餘緡悉印其背又刻十貫五貫為劵給貧民命米商視印出糶詣庫驗數以易鈔又率富民出粟為奏補官四月未嘗家居止宿公署夜禱於天晝出賑飢無少怠每一念至即撫膺慟哭謹案人若無實心愛民耳此天之所以不能格也若張公所行惟知有民不知有已何禱不誠何民不救視民如傷之念形之慟哭是所忠者君所愛者民不愧忠君愛民之君子矣順帝至元三年十二月大都南城等處設米鋪二十每鋪日糶米五十石以濟貧民俟秋成乃罷六年二月增設京城米鋪從便賑糶謹案天之警惕於順帝亦云至矣兹獨於分設米鋪一節思以上格天意政雖疏略而愛飬百姓之心固肫摯而不浮茍能震動恪恭上則敬畏昊天下乃軫恤民隱則將推廣此心正已求賢飬民致治豈遽至於危也明英宗正統六年巡撫浙江監察御史康榮奏杭州府地狹人稠浮食者多仰給蘇松諸府今彼地水旱相仍榖米不至杭州遂困又湖州府比因嵗凶米亦甚貴竊計二府官廪有二十年之積恐年久紅腐請發三十五萬糶於民間令依時值償納則朝廷不費而民受其惠從之謹案積善在常人則不易在大臣又何難一念朝存萬民暮活如康公此奏窮人雖難免拮據之求飢者幸可無轉死之慮惟望仁人賑飢救困活此窮民德大福大自古不爽也憲宗成化六年奏準將京通二倉糧米發糶五十萬石每粳音耕米收銀六錢粟米五錢以減京城米價騰貴再將文武官員俸糧預支三個月謹案嵗值飢饉仁智不可不兼用也仁以惠民智以慰衆今減價糶米仁也預支月俸智也數月之後麥熟稻登仍然大有烏可閉藏不發令民心之頓變哉僉事林希元疏云臣愚欲借官帑銀錢令商賈分往各處糴買米榖歸本處發賣依原價量增一分為搬運腳力一分給商賈工食糶盡復糴事完之日糴本還官官無失財之費民有足食之利非特他方之粟畢集於我而富民亦恐後時失利爭出粟以糶矣然糴糶之法專為濟貧若有商賈轉來販去所當禁革又當遍及鄉村不得專及城市則貧民方沾實惠謹案糴糶濟民能以林公之論為法不特城市蒙其利澤而村落亦沾其實惠矣尚有溝壑之苦哉奈何世之救荒者皆不知林公之荒政叢言是必要之書也中丞周孔教撫蘇時有云次貧之民宜賑糶其法有二有坊郭之糶宜多擇諸城門相近寺院及寬厰民居儲榖於其中不限時日零細糶之糶米計升多不過一斗糶榖不過二斗如姦牙市虎有借倩粧扮之弊出首者重賞其弊自革有鄉村之糶宜行保甲之法間月而糶之每先一月出示將有災之鄉保限次月某日某保排定日期每隔一日一糶以防雨雪壅滯之患每甲大約許糶三石多則五石若通水去處當移舟就水次糶之糶價俱比時價減少愈少愈善富人強奪貧人之糴用張詠連坐之法一家犯罪十家皆不許糴其糴本或借官銀或借官糧或勸富家事完各歸其本如係民家則加旌奬可也謹案賑糶之法分出二種一曰坊郭一曰鄉村何其周到也又曰循環行之必待稻熟而止方略精詳不遺遐邇真仁人也有心而不得其法實惠不能及民有法而不存此心蒼生何由得活中丞不但身體力行而且欲傳後世有不身為濟世之名臣而子孫享積德之報哉屠隆荒政考有云災傷之處議賑濟則恐官府之困廪有限議勸借又恐地方之富户無多最妙之法借帑銀若干委用忠厚吏農富户向豐熟去處循環糴糶積榖之家雖欲踊貴其價而官府平糶之糧日日在市勢亦不能如他處米亦不足則雜置豆粟薷薥麥蕎蕨粉芝麻之類皆足充飢但當嚴禁商牙來糴昔吳遵路知通州時能使災傷之處與蘇秀同其米價用此法也謹案屠君開口兩句就將荒政説完見得賑糶一事是救荒上䇿本不虧民不死即耿夀昌之遺意至説凡可以充飢而救死者一概可買尤見行權之大略借國帑總論曰上不病官下不困民能救生民於萬死之中者莫如借國帑以先興販也自春秋以來即有其事今觀唐宋元明代無不舉誠盛典也但借官錢而糴糶之多者無如王氏借民錢而興販之頻者首推吳公二人所行為法千古救荒者何可視為泛泛也若元之張公不特取鈔命米商出糴救民一種忠君愛民之心勃不可遏形之痛哭流涕而不止真太古之仁人也後之君子或那常平米或借府庫錢或貸富豪錢加其月利以作糴本給與富商大賈或差幹吏能員先往豐熟去處循環糴糶我無濟人之重費而實有起死之良圗舉口之勞生人之命上智之事也又何惑焉易云損上益下民悅無疆惟賑糴則所損者甚少而民之悅也誠無疆矣六理囚繫以釋含寃漢于公鄧太后揚貞終詔唐觀顔真卿歐陽觀宋太祖諭元仁宗諭明王哲許襄毅吳黼漢昭帝時海州大旱三年人民離散莫知所從會新太守下車于公謂守曰非申孝婦之寃不可守詢之公曰郯城昔有竇氏少寡事姑極孝姑念孝婦侍奉勤苦欲其嫁婦不允姑遂自經蓋以已在妨其嫁也姑之女竟以殺毋告太守按治婦乃誣服某曽力爭而勿聽咎非在是而何新守齋戒沐浴徒步往祭孝婦於塜祝方畢而大雨如注至今有孝婦廟在謹案人有寃抑之事不明則鬱恨之氣不散遂結於太虛而災眚見淫雨亢旱蝗蝻兵火之類是也竇氏孝婦也蒙不孝之名身首不保非于公之力請於太守徒步往祭舒孝婦之寃而能上回天意哉况以孀婦而遭此寃者多矣一見於齊之庶女再見於東漢之上虞三見於晉代之臨淄折獄者慎之章帝建初元年大旱榖貴校書郎楊終以為廣陵楚淮陽濟南之獄徙者萬數又逺屯絶域吏民怨曠乃上疏曰臣竊按春秋水旱之變皆因暴急惠不下流自永平以來仍連大獄有司窮考轉相牽引掠拷寃濫家屬徙邉加以北征外邦西開三十六國頻年服役轉輸煩費又逺屯伊吾樓蘭車師戊巳民懷土思怨結邉域足以感動天地移變隂陽願陛下留念省察以濟元元謹案楊子山以至理論天意切實不差毫釐何也天不可測而理可必聖人云天視自我民視天聽自我民聽安有天心異於民心者哉掠拷寃濫已足違和况閭閻愁苦一方鬱結此天地所以為之感動也安帝立鄧太后猶臨朝聼政永平二年夏京師旱親幸洛陽寺録寃獄有囚實不殺人而被拷自誣羸困輿見畏吏不敢言將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即時收洛陽令下獄抵罪行未還宫澍雨大降謹案不仁哉有司之嚴刑也不肯細心體訪但將五毒迫人囚不能堪何寃不受致令餘威猶在死不敢言若非太后英明此獄烏能得直今下屬問而上司録防寃抑也然而出入難必誰敢再受一番荼毒故案一定而獄多寃理其枉而出之者是在欽恤慎刑之君子矣唐太宗貞觀十七年三月甲子以久旱詔曰去冬之間雪無盈尺今春之內雨不及時載想田疇恐乖豐稔農為政本食乃人天百姓嗷然萬箱何兾昔頽城之婦隕霜之臣至誠所通感應天地今州縣獄訟常有寃滯者是以上天降鑒延及兆庶宜令覆囚使至州縣簡刑獄以申枉屈務從寬宥以布朕懷庶使桑林自責不獨美於殷湯齊郡表墳豈自髙於漢代謹案天地惟以好生為心人生當以不殺為德刑之所加何招不得有罪者嘆自新之無路受枉者恨宿憤之難申怨觸上蒼遂成閉塞此詔一下何患甘霖之不沛而嘉禾之不熟哉開元中榆林衛等久旱非常顔真卿為御史行部至五原時有寃獄久不決真卿至立辨其寃雨即沛然而至郡人遂呼為御史雨謹案獄之寃者不待決遣而後乖戾之氣慘成凶嵗即令沉埋獄底積憤未舒已逆天和久之不雨幸顔公行部細心辨其寃獄愁雲怨日忽變而為暢靄和風此御史雨之所由來也宋太祖建隆二年帝謂宰臣曰五代諸侯跋扈跋扈猶言強梁也扈竹籬也水未至先作竹籬候魚入水退小魚獨留大魚跋籬扈而出故曰跋扈也有枉法殺人者朝廷置而不問人命至重姑息當如是邪自今諸州決大辟録案奏聞付刑部覆視之宋史斷曰禁暴止虐誠帝王保民之盛德也湯武聖君此心純乎愛民故勇決嚴毅之中即寓正直蕩平之道太祖深知理獄之難視人命為至重特詔令諸州慎重録囚逹部詳審然後信讞定而法網寬合之周禮委曲詳核之條仁慈忠厚之旨前後無違矣歐陽觀為泗州司理嘗秉燭治官書屢廢而歎妻問之曰此死獄也我求其生不得耳其子修方三嵗乳者抱立於旁觀曰術者謂我嵗在戍不利使其言驗不及見兒之立也後當以吾言告之謹案仁哉歐陽觀之存心何肫摯而深切也求生於死獄之內並非要名遺言以告後人并非樹德總為一腔慈惠不欲因勢而阻尤不欲自我而止故及身則倍著哀矜錫類則教之忠厚仁哉司理宜文忠之為名臣也乎元仁宗延祐四年春正月帝謂侍臣曰中書比奏百姓乏食宜加賑恤朕默思之民飢若此豈政有過差以致然與向詔有司務遵世祖成憲宜勉力奉行輔朕不逮然嘗思之惟省刑薄賦庶使百姓可遂其生也謹案百姓不能遂其生四境擾害由之起大業末年乾符初年可鑑也仁宗因民飢饉言非省刑罰薄賦斂則不能舒其困非思得其要而治得其道者哉明孝宗𢎞治十五年五月上命御史王哲巡按江西時值大旱苗種不得入土哲深恤民隱即親録囚繫出其所當原者數百人餘皆減之次日即雨遂成有秋民為謡曰江西有一哲六月飛霜雪天下有十哲太平無休歇謹案古之盛吉執丹筆而泣者謂五口筆一下死生立判故也理刑官如此存心何至亢旱不雨王御史因苖不得入土親録繫囚出其當原減其餘等即成有秋乃知寧失出無失入此二句者誠祈禱之靈符也松江吳黼任撫州同知時久旱不雨臺使以黼廉直將鄰郡建昌富民吳萬八一案令迹其實蓋萬八以子殺父大獄久未決萬八至是仍以厚賂求寬免黼曰我荷國恩食天祿寧以賄賂壞公法耶遂核論如律是夕忽然大雨萬八已為雷震矣一郡驚異以為吳公之正直所感云謹案此又以不殺而致旱災者也萬八之獄斷無遲滯之理問官何得貪其厚賂而曲貸其辜茍非天譴嚴明暗與王章相合安見幽明一理法不可弛然則赦非善政古且志之况於絶倫之大者乎單縣有田作者其婦餉之食畢即死其翁曰此必婦之故矣陳於官不勝箠楚遂誣服自是天久不雨許襄毅公時官山東曰獄其有寃乎乃親歷各境出獄囚遍審之至餉婦乃曰夫婦相守人之至願鴆毒殺人計之至密焉有自餉於田而鴆之者哉遂詢其所饋飲食所經道路婦曰魚湯米飯度自荆林無他異也公問時適當其夫死之際置魚作飯仍由舊路而行試狗彘無不立死者遂出其罪即日大雨如注謹案感孚之理捷如影響田婦餉夫而死實出無心問官不能細訪置之死地所謂嚴刑之下何所不招遂干天怒災異頓施非襄毅公上體天心察其寃抑安能沛甘澍於恆暘之嵗哉理囚繫總論曰獄中之苦人盡知之乎以將相而歎獄吏之尊則其毒加於囚也可知矣一人在獄閣户悲啼吏卒苛求不已妻兒賣盡難供故血淚未乾於箠楚離魂又泣於夢中仁人君子可不以刑獄是恤哉若雨呼御史者不決之獄也亢旱三年者已死之獄也畏吏不敢言苖不得入土者將死之獄也罪定天誅不殺之獄也不論已死未死有枉不直困於獄中天地未有不為之震怒而見於災異者也楊終之論信不誣矣唐之太宗宋之太祖元之仁宗異代同心故得咸稱致治之主折獄者存心必若歐陽觀明察得如許襄毅方能無愧試問今之沉於獄底者果能求其生而勿得者歟哀哉吾恐半居洛陽令之所問也人自不察耳五毒痛加何枉不坐縲絏所繫何嵗無寃易云君子以明慎用刑而不留獄書云殺戮無辜上帝弗蠲降咎於苖君子可勿於囚繫之內稍開一面以免降咎之困哉七禁遏糴以除不義秦百里奚隋文帝秦穆公唐崔悛後周廣順詔蘇軾宋吳及蘇緘淳熙詔正明張居黃化裳鍾民周襄王甲戍五年冬晉飢使乞糴於秦百里奚言於秦伯曰天災流行國家代有救災恤鄰道也行道有福秦於是輸粟於晉謹案人生不幸遭遇飢年全賴有無相濟庶可全生此賢臣所以勸其君救災恤鄰惠飬黎民之要道也襄王七年十一月晉飢秦伯饋之粟曰吾矜其民也謹案秦伯之輸粟一而再矜民之語藹若陽春并不生一點偏護之念是故被其澤者歡欣交通逺邇愛戴後之為鄰郡司牧者可不上法賢哲之仁術乎隋齊州刺史盧賁坐民飢閉糴除名皇太子為言賁有佐命功不可廢帝謂盧賁等功雖甚偉然皆挾詐擾政不可免也乃如律治之謹案沽名而不恤民者非良有司也欲以閉糴為愛民殊不知鄰邦均赤子也故孟子取五霸之禁遏糴千古公正之論莫大於此髙祖之論盧賁略前勳而警害民之吏誠快舉哉唐崔悛為湖南都團練觀察使湖南舊法豐年貿易不出境鄰部災荒不相恤悛至謂屬吏曰此非人情也無使閉糴以重困鄰民自是商貨流通謹案不近人情之事皆胥吏貪汚者之所為也凡下閉糴之令藉口為本境之民起見未嘗稍有所私殊不知其所私者不在是也不過不能為民身家畫萬全之䇿徒欲藏此粟於富家以説豪猾昻價損民之意豈知聖天子以天下為家胞與為懷凡在版圗莫不欲安飬而生全之寧肯令此境阜安彼方飢餒乎揆情度理務在流通崔公真仁人也後周廣順間南唐大旱井泉涸淮水可涉飢民度淮而北者相繼濠夀發兵禦之民與兵鬬而北來太祖聞之曰彼我之民一也聽糴米過淮唐人遂築倉多糴以供軍詔唐民以人畜負米者聽之以舟車運載者勿豫謹案視太祖之待南唐非大度之主歟唐人以之供軍尚許人畜負之而去究何嘗因救民而得禍若後之府縣官必然閉糴以為上為其君下為其民而不知其干天之怒矣人主當以好生為德信哉宋仁宗嘉祐四年諌官吳及言春秋之時諸侯相爭竊地專封固不以天下生靈為憂然同盟之國有救患分災之義秦飢晉閉之糴而春秋誅之聖朝恩施動植視民如傷然州郡之間各專其民擅造閉糴之令一路飢則鄰路為之閉糴一郡飢則鄰郡為之閉糴夫二千石以上所宜同國休戚而宣布主恩今坐視流離又甚於春秋之間豈聖朝所以子育兆民之意謹案閉糴之令自古皆恨又自古有之其故何也其意他處之民徙死我境之粟有餘豈無卓異賢能之賞殊不知此令一行劫掠流移由之而起吳公言之亹亹蓋深知民之受弊甚大斷不可以害民之政為我邀功幸祿計也蘇軾浙西災傷狀內有云臣聞熙寧之災傷本緣天旱米貴而沈起張靚之流不先事奏聞但立賞閉糴富民皆事藏榖小民無所得食流殍既作然後朝廷知之使命運江西及截本路上供米一百二十三萬石濟之巡門俵米攔街散粥終不能救飢饉既成繼之以疫所傷實多兩稅課利皆失其舊是大吏之不能仰承德意廣孚惠澤於下民也如之何其可乎謹案飢年處事沽名心萬不可起救荒政務須宜早為裁酌沈起張靚立賞閉糴不過欲沽愛民之譽不知小民絶粒草木俱完藏米者愈髙其價興販者懼劫不來遂至於此非平日失於稽古臨事在於求名乎東坡疏中此假可為閉糴者戒紹興初蘇緘為南城令嵗凶里中藏粟者固閉以待價緘籍得其數先發常平榖定中價糶於民揭榜於道曰某家有粟幾何令民用官價糴有勒不出及出不如數者撻於市以是民無艱食謹案民無糴所劫掠必興盜賊縱橫安危難保惟賴司牧有以處之然不將常平米盡行先糴何以塞富民之口蘇君為政先已後人其誰我議淳熙八年敕旱傷州縣全賴傍近豐熟去處通放客販米斛已降旨不得遏糴訪聞上流得熟州郡尚有將客販米斛邀阻者仰逐司覺察按劾尚或容蔽仰御史臺彈奏九年兩降指揮諸路監司不許遏糴多出榜文曉諭如故違戾令總司覺察申奏謹案官之糴糶有限民之興販無窮彼射錙銖之利我活溝壑之民實云兩得如其閉糴此境雖安彼地不活無惻隱之心違忠恕之道彈劾覺察其可緩乎咸淳七年撫州飢黃裳奉命往彼救荒但期會富民耆老以某日至至則大書閉糴者籍強糴者斬八字揭於通衢米價遂平一云辛幼安所行謹案孰謂救荒無竒䇿以八字而定民心非竒䇿乎此所謂有治人無治法也明萬厯九年淮鳯告災張居正疏云皇上大發帑銀遣使分賑恩至渥矣然賑銀有限飢民無窮惟是鄰近協助市糴通行乃可延旦夕之命近聞所在往往閉糴災民既缺食於本土又絶望於他鄉是激之為變也宜禁止遏糴之令講求平糴之法聽商民從宜糴買江南則糴於江淮山陕則糴於河南各撫按互相關白接遞轉運不許閉遏其糴本或於各布政司或於南京户部權宜措處河南直𨽻四府縣以臨德二倉之米平價發糶則各處皆可接濟謹案以通暢之筆寫仁政之端條分縷晰何等明白且令各巡撫互相關白接遞轉運糴本悉為措置允稱相度汪洋不愧調和鼎鼐有鹽梅之責者不可不法之以救天下也萬厯間御史鍾化民奉使河南賑飢先飛檄各省不許遏糴及河南布政司撤防勦兵悉分置黃河口各運米所過為米舶傳縴護送至境設官單記所到時刻稽遲罪及將領米到任其價之髙下毋許抑勒是時米價五兩逺商慕重價無攘奪患浹辰米舟併集延袤五十里價遂減石止八錢矣袤音茂長也亘於東西曰廣亘於南北曰袤謹案水旱不時天荒之也遏糴阻抑人荒之也天荒尚有挽回人荒豈無救治鍾公竭力救全頓蘇民困米價十減五六可知有治人無治法本仁心以行仁政事未有不濟者也禁遏糴總論曰偽矣哉有司之遏糴也彼不過欲借此以邀愛民之上賞耳若言真實為民彼糶米之家雖婦人小子必知但賣其食之所餘斷無盡貨之理何必有司之諄諄禁約也總之圗治之術在誠實尤在權宜自周至明歷代典故悉中窽要晉惠公之失算未識愛民之方周太祖之大度包容異域盧賁沈起張靚等特小人之尤者耳設令見崔悛於湖南能無愧歟此宋朝之詔使劾之察之誠是也吳及之論蘇緘之法黃裳之諭化民之檄同功一體得致治之原良法良模不可不知所以法之也且無曲防無遏糴五伯禁之聖賢取之吏竟背之耶詩曰在彼無惡在此無射庶幾夙夜以永終譽則凡在位之君子欲美其譽於畢生者可分疆界致嗷嗷待哺之民日望泛舟之役而弗得哉閉糴之令烏可勿除八發積儲以救困窮漢文帝唐元宗魏黃初間憲宗宋仁宗元世祖真德秀胡長孺明成祖孫璽周化忱鍾民漢文帝六年大旱蝗令諸侯無入貢弛山澤減諸御服損郎吏員發倉庾以賑民謹案嘗閲文帝之詔有云患自怨起福繇德興則禍福之機久矣了了於胸中故首定振窮飬老之令每布蠲租免稅之恩當此旱蝗相繼豈不知民飢患也救困德也有不自損以濟蒼生哉此三代後之賢君首推文帝也魏黃初二年冀州大荒歲飢使尚書杜畿持節開倉廪以賑之五年冀州復飢又遣使者開倉廩賑之六年春遣使者巡行沛郡問民間疾苦貧者悉賑貸之謹案時當災荒民惟望治魏能愛民賑貸弗倦故能撫其衆而大其國百姓戴惠四境寧帖致治者所當於緊要機宜務為斟酌也唐元宗開元二十九年制曰承前飢饉皆待奏報然後開倉道路悠逺何救懸絶自今委州縣及採訪使給訖奏聞謹案初陽透發大地回春一詔下頒九州開泰豈非明皇此日之制乎洞悉嗷嗷待哺之苦免其懸懸望眼之穿故其時沐恩澤者歌咏遐陬四海清寧兆人康樂誰謂斯民也非三代之所以直道而行者也憲宗元和九年二月丁未制曰善為國者務蓄於人百姓未康君孰與足去嵗甸服氣序愆和夏屬驕陽秋多苦雨三農爽候五稼不滋産於地者既微出於力者宜困百姓所欠歷年稅斛等項並宜赦免仍以常平義倉斛斗三十萬石委京兆條疏賑濟如不足即宜以元和七年諸縣所貯折糴斛斗添給應緣賑給百姓等委京兆官差擇清幹官於每縣界逐處給付使無所弊各得自資將我詔意戒之以擾授之以仁宣示朕懷咸使知悉謹案地無所産粟何從生民若遭荒催征何益憲宗悉為蠲免誠賢主矣且以三十萬石而賑飢民不足又令添之以折糴之斛斗諄諄不已民命為懷何其仁也克寬克仁彰信兆民憲宗之謂矣宋仁宗乾興元年十二月以京城榖價翔貴出常平倉米分十四場賤糶以濟民皇祐三年十二月癸巳詔曰天下常平米依原糴價出糶以濟飢民毋得收餘利以希恩賞謹案民逄飢饉之災確似人遭水火之厄救之稍遲不成灰燼即陷狂瀾寧不痛心然救之不力終於一死與不救何殊今乾興間以常平米分作十四場減價出糶以濟平民皇祐間又以天下常平倉米依原價出糶以濟貧民博施濟衆可風千載小民不有再生之樂歟寧宗時真德秀知潭州以廉仁公勤勵僚友以正心修身勉士行遇水旱災傷貧困無依之民極力救恤復立惠民倉積榖至五萬石至凶荒時照原價出糶又積榖九萬五千石分十二縣置社倉以遍及鄉落立慈惠倉飬老倉孤幼無依自十五嵗以下年老無飬自六十嵗以上皆有賑給謹案自古理學儒臣莫不本子惠蒼生之念為君父錫福於四方蓋其溫厚性成兼能陶鎔於典籍經權措置各得其宜試觀此數法實可與文公之社倉共垂不朽有守土之責者茍能倣而行之是甘棠慈蔭可以傳後世而潤斯民矣元世祖至元五年益都路飢以米三十一萬八千石賑之十年諸路出蝻霖雨害稼賑米五十四萬五千五百九十石十三年東平濟南諸路水旱賑飢用米二十二萬五千五百六十石粟四萬七千七百十二石鈔四千二百八十二錠草二年十一月哈喇和卓民飢户給牛二頭種二石更給鈔一十一萬六千四百錠糴米六萬四百石為四月糧賑之謹案天有降災之時民無愁苦之嵗此際之轉移而造福者惟隨時蠲賑惠愛萬民之聖君賢相耳帑藏之金粟斷無窮時閭里之身家亟宜撫恤世祖賑飢不異九天雨露隨地頻施一無所吝民生矣嵗何凶焉武宗時民飢者四十六萬户即詔每户月給米六斗浙東宣慰同知脫歡察議行勸貸之令斂富民錢一百五十餘萬以二十五萬屬海寧縣簿胡長孺藏之長孺察其有乾沒意悉散於民既而果索其錢長孺抱成案進曰錢在此脫歡察怒而不敢問謹案飢民之得賑濟猶田苖之得時雨點滴不到根荄失鮮業已雲興澤沛則時刻不可需遲何况雲霓之轉易乎廉吏識破貪夫之意發其積聚補散民間為蒼生救飢實則為脫歡消愆仁智兼盡一舉而兩得之矣明成祖永樂九年七月户部言賑北京臨城縣飢民三百餘户給糧三千七百石有竒上曰國家儲蓄上以供國下以濟民故豐年則斂凶年則散但有土有民何憂不足隋開皇間大旱民飢文帝不開倉賑濟聼民流移就食末嵗計所積可供五十年倉廩雖豐民心勿固前鑒具在今後但遇水旱民飢即開倉賑給毋令失所謹案開皇間倉廪皆足不肯賑給使民流移後且恃其富足而糜費焉成祖深明其故而易其轍誠明逹之主哉正統間周忱巡撫江南適江北大飢巡撫都御史王竑借三萬石於忱忱計至來春麥熟曰此須十萬即以與焉蓋忱所積餘米不但贍江南又可兼利江北景泰二年有言忱勾通官吏侵漁國帑召忱還忱言臣之百凡修治興作見為妄費亦由宣宗皇帝許臣便宜行事臣之所費者餘米也不敢侵動正賦事遂不問致仕而歸户部因言忱所積米無可稽驗請綜括為公賦由是徵需雜出逋負依然吳後大飢民多餓莩無不望周公之再生矣謹案賢臣妙䇿忽轉而為姦吏彈射之端户部因之作公賦設使再遇飢年於何利賴户部之歸積粟於朝廷不過邀榮於一己豈知國體之正大其生財之道固自有在夫豈若是之瑣瑣也哉武宗正德四年孫璽知興化縣事多竒政時大水傷稼上司不允題荒璽即自為奏請詔減田租之半又賑飢民萬餘人後以兵備巡歷雲貴直聲大振謹案今之為縣令者見上臺不題而敢自奏乎孫公不以逆鱗為恐寧顧其他雖然使非天子之惠愛何以成郎官之救援宜並德之神宗萬厯二十二年御史鍾化民河南賑荒垂危之人賑粥有顧惜體面者散銀賑之著州縣正印官下鄉親放移官就民毋勞民就官分東西南北四鄉先示散期以免奔走伺候貧民領得錢榖或里長豪惡要抵宿負者以劫論出首者賞其銀正印官監視戥鑿逐封加印立册期日分給差廉能官不時掣封稱驗躬巡所至延見各色人等不嫌村陋謹案飢無不救國無不安河南甲午之荒甚難措手而鍾公獨力撑持弗辭辛苦賑濟斯民不生不已不特自忘其官併過遭飢之困觀其政迹直欲令人感入心脾矣良臣善政真足垂光簡編發積儲總論曰倉廩實而國富饒致治之本圗也然而有德此有人有人此有土有土則財與用俱有可知百姓之身家國之倉廪所由出始而年嵗豐登民則為上實倉儲偶然旱潦告災君即為民謀保聚蓋君猶心而民猶體體安心始泰民飢其可勿救乎積儲其可勿發乎君臣識鑒之明睿者未有不以賑濟為急者也自漢文以至元明賑濟之法救困之言略偹於前致治者可勿以是為法哉夫水旱蝗蝻迫人溝壑救人適以自安無二視也何則未有百姓困厄於下而君臣能相安於上者也天災之流行偶爾一人之救濟萬全否則成湯何以將六事而自責孔子何以舉自貶以對景公救飢之道權自上操設遇災傷之地誠能大發積儲以救窮黎則一方安樂薄海內外愈皆安樂矣能散財者世躋升平夫豈謬哉九不抑價以招商運齊管子唐盧坦漢宣帝詔宋趙抃范仲淹范純仁包庾拯誼孟章董懋煟蔡德明周孔教龎承寵齊管子曰滕魯之粟釡百則使吾國之粟釡千滕魯之粟四流而歸我若下深谷矣謹案旨哉管子之言也民之趨利確如水之趨下稍拂其性其誰我向榖粟者活命之源也使恤民之財而不恤民之命財帛其可飽乎危亡其可免乎則釡百釡千之論非明決者不能道也漢宣帝本始四年春正月詔蓋聞農者興德之本也今嵗不登已遣使者賑貸困乏其令太官損膳省宰樂府減樂人使歸就農業丞相以下至都官令丞上書入榖輸長安倉助貸貧民民以車船載榖入關者得毋用傳傳符也欲榖之多故不問其出入也謹案宣帝令丞相以下皆上書入榖以貸貧民則官無避事之弊矣載榖入關者不論舟車皆無用傳則免徵商之困矣豈尚有抑價之令哉唐盧坦為宣歙觀察使嵗飢榖價日增或請損之坦曰所部土狹榖少仰四方之來者若價賤榖不復來民益困矣既而米商輻輳市估遂平民賴以生宋董煟曰不抑價則商賈來此不昜之論昧者反之其意正欲沽譽不知市無告糴之所適以召變而起釁也坦有定見真可嘉也宋神宗熙寧中趙抃知越州兩浙旱蝗米價踴貴諸州皆榜道路禁人增米價人多餓死抃獨榜通衢令有米者任昻價糶之於是諸州米商輻輳米價更賤而民無餓者謹案抑價之令一行商賈固褁足不前囤户亦皆無米吏知之乎囤戶恐人賤糴略留少許以應多人餘皆重價而暗售他方故無米者室如懸罄有錢者亦欲呼庚於是一夫不靖千人應之趙公之論髙出千古范公仲淹知杭州二浙阻飢榖價方踴每斗一百二十文范公增至一百八十文衆不知所為仍多出榜文具述杭飢及米價所增之數於是商賈爭先惟恐其後米既輻輳價亦隨減謹案范公仁智兼全行之固極其善後世法令不可造次須要揆時度勢假如杭州米貴增價之榜文必須豫先差人於産米地方張挂約其已到之後我處方增其價不然彼處米商未知而我先增其價貧民何堪久食貴米但增價告示切不可令一人知之恐俱待增價而後賣則民愈苦矣包拯知廬州不限米價商賈聞之日集其境不數日而米價大平謹案龍圗公之明決雖婦人小子無不知之若使米價可抑公抑之矣公知物多必賤少則貴愈抑愈少愈少愈貴龍圗公之所不抑也而他人可抑之哉范純仁為襄邑宰因嵗大旱度來年必歉於是盡籍境內客舟誘之運米許為主糶明春客米果至多於平日邑人遂賴以不飢謹案境內荒矣客米不來此際而方為之偹何若先事而為之圗范公預於冬間多方勸誘交春果至髙價既無民情可慰非得預偹不虞之䇿耶紹興五年行在斗米千錢時留守參政孟庾户部尚書章誼不抑價惟大出陳廪每升止糶二十五文僅得時價四之一耳民賴以濟謹案米貴時民雖賣妻鬻女總救不得數旬之苦何也米貴則人賤所得無幾耳二公大出陳廪減價救民秋成仍可賤糴非仁智兩全之道歟故慮米貴者出天庾而賤糶一也借國帑以興販二也王侯貴戚大小臣工軍民人等有米照時價出糶視其多寡遞有恩奬三也責重有司廣貸牛種課民春耕因其勤惰定以黜陟四也朝廷重農抑末優恤窮氓五也得此五法水利是務專官督理何米貴之足憂哉從政郎董煟云比年為政者不明立法之意謂民間無錢須當籍定其價不知官抑其價則客米不來若他處騰踴而此間之價低則誰肯興販商賈不至則境內乏食有蓄積者愈不敢出矣飢民手持其錢終日無告糴之所有不肯甘心就死者必不能安靜人情昜於煽搖此莫大之患也惟不抑價非惟舟車輻輳而上户亦恐後時爭先發米出糶其價自賤謹案凡論荒政言宜通暢事貴預知董君所論彰隱情於未發息禍患於無形非逹人之言歟為政者果能頻頻屬目細想人情自無抑價之令閉糴之條矣若之何忽之也明中丞周孔教撫蘇時有云榖少則貴勢也有司往往抑之米産他境歟客販必不來矣米産吾境歟上戶必然閉糴矣上戶非真閉糴也逺商一至牙儈為之指引則隂糶與之以故逺商可糴而土民缺食是抑價者欲利吾民反害吾民也謹案抑價之令一出商賈不來囤户不賣即賣如撫君所云專賣與出重價之逺商而去四境之米於是而絶無論小民無錢在手即有錢何從得糴非死亡即劫掠緣斯而起撫君燭及隱微非一省之福乎杭州司李蔡𢡟德通商濟荒條議杭城生齒仰給外米蒙憲行廣糴通商已無遺䇿而聚米之道不厭多方近聞鄰境閉糴米價翔涌商販紛紛有各處阻難之訴職思官府之儲散有限民間之自運無窮而民間之自運猶有限逺商之樂販更無窮但能使逺地經商望武陵為利藪聞風爭赴米貨逬湊杭郡百萬生齒之事濟矣招來之法釐為八則八則載後摘要偹觀條內謹案商不通民不救價不抑客始來此定理也司李善於擘畫釐為八則精詳周到蓋以經濟為心視疏忽者逺矣杭守龎承寵給批糴米議杭城周遭百里食齒繁聚地又山多田少桑柘多而禾稼少故民間食米皆仰給於外省所從來久矣今夏徂秋雲漢為災民虞桂玉所藉商販雲集庶幾拯此孑遺無奈鄰省下遏糴之令掫人又播摽掠之虐使不為之計商人將褁足不敢出途而杭民有立稿耳給照流通無待再計仍請嚴檄嘉湖二府飭各巡兵不得搶掠嚇詐米船生事者以三尺繩之庶商販通行而杭民猶有更生之望也謹案興販五榖雖云射利之徒譬猶救民之使不可與他販等何也杭州素不産米逺商不至朝啼絶粒暮喪溝渠害可言哉給批令糴無許阻撓通商之要法也不抑價總論曰諸君子咸以不抑米價為髙又以稍增米價為善商自通而民可救此固不易之理矣古人立法固有成算後世倣行貴乎隨時非訪之於父老即宜詢之於紳襟然終不若微行村僻得實之為當也遇飢年果能知境內之粟共有若干石而榜示於通衢必使闔郡人知之令有米者但許隨時價出糶不許閉糴屯積此亦救民之要法不可不知也小民既知有米可糶心已安矣誰復爭求客商知價不抑舟已集矣豈又他之此不抑之抑也惟杭城之棧米最為可恨富商略不遂意棧而不賣圗厚利耳豈顧窮民牙人利口欺官阿富翁耳誰憐餓莩彼果為人何不速買速賣循環糴糶悉屯積而不賣哉此非閉糴而何君子知之自管子以及宋明政之美者已列於右若能倣行何患乎飢民之不救也與其為民惜錢不若為民惜命如宋時濮州侯日成嫌米價日增題請令人留一年之糧餘皆依祥符八年之數而出糶天子慮其擾民勿許非洞悉人情之聖主耶書云懋遷有無化居蒸民乃粒萬邦作乂故米價貴任其低昻不可稍為之裁抑欲利吾民而反害吾民也十開粥厰以活垂危齊黔敖漢陸續衛公叔文子隋房景逺唐郭禹陳堯佐宋程頤元余闕明席書耿橘畢懋康鍾化民齊大飢黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰豫惟不食嗟來之食以至於斯也從而謝焉終不食而死曽子聞之曰微與其嗟也可去其謝也可食謹案禮貌之於人大矣哉士君子當死亡之際略不自貶以偷生曽子論之素矣故鍾御史河南賑粥賑銀獨加厚於寒士不與庸衆同之蓋以揚目而視之者未必不謝之而寧死也衛公叔文子卒其子請諡君曰昔者衛國凶飢夫子為粥與國之餓者不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子謹案人當飢饉之時得惠一餐之粥即延一日之命此後得遇生機皆此一餐之力矣故為力少而致功大以此定諡也宜矣凡當凶嵗人可不以文子之惠為惠哉漢陸續字智初會稽吳人也幼孤仕郡戶曺史時嵗荒民飢困太守尹興使續於都亭賦民饘粥續悉簡閲其民訊以名氏事畢興問所食幾何續因口説六百餘人皆分别姓名無有差謬興異之謹案粥雖數碗能活飢人豈可小視公皆悉數無遺其不茍於處事也明矣太守之用人户曺之謹慎不可為賑粥之盛典歟隋房景逺為齊州主簿多惠政景逺平生重然諾好施與嵗祲設粥通衢存濟甚衆平原劉郁路經齊兖遇劫賊將殺之郁呼曰與君鄉近何忍見殺賊曰若鄉里親親是誰郁曰齊州房主簿是我姨兄賊曰我食彼粥得活何忍殺其親遂還郁衣物且蒙活者二十餘人謹案善之感人如風之偃草未有不從之而披靡者也故雖盜賊不昧其良賑救其可緩乎主簿賑粥得救其親設令景逺自遇化盜為良豈其所難可見粥之活人感恩者切食祿者何不稍分肥甘之萬一以延枵腹之殘喘哉唐僖宗文德元年四月以郭禹為荆南留後初禹勵精為治撫集雕殘賑饘粥給孤貧通商務農時藩鎮莫以飬民為事獨華州刺史韓建招撫流散勸課農桑數年之間民富軍贍時人謂之北韓南郭謹案人生天地間惠在一時名垂萬世始可告無忝於生平北韓南郭近之矣若專以功名為重者生則顯榮死則泯焉不亦大可慨哉宋程頤有云救飢者使之免死而已非欲其豐肥也當擇寬廣之地宿戒使辰入至已則闔門不納午後與之食申而出之日得一粥則不死矣其力能自營一食者皆不來矣比之不擇而與者當活數倍之多也謹案昔陳龍正謂伊川之論雖佳但日只一餐恐不足以救其死耳曽則以為莫若俟其食畢每人或給米二三合或給糕餅數枚以代下次之餐彼既不專守候於此又可往他處營生一朝而獲數日之糧未可知也陳堯佐知夀州遭嵗大飢自出米為糜以食餓者吏民以故皆爭出米共活數萬人堯佐曰吾豈以是為私惠耶蓋以令率人不若身先而使其從之樂也謹案米珠薪桂人皆自顧不暇何處懇求官長若不救全老弱死而壯者盜必然之勢陳公身先率民廣開粥厰一州之中到處盡沾實惠非善於鼓衆之君子哉元順帝至正二年五月起復余闕為淮東宣慰副使守安慶到官十日寇至却之集將吏議屯田戰守計環境築堡寨選精甲外捍而田其中明年春夏大飢人相食捐俸為粥以食之請之中書得鈔三萬錠以賑民謹案忠於君者必能愛民如余公到官十日捐俸煮粥請鈔賑民力行善政惟恐不及後果盡忠於國若置飢民於勿問但以功名為重是屯其膏而不能布上之恩澤矣所以有聖主必賴有賢臣上下交而志同夫非蒼生之幸歟明嘉靖十七年席書疏云臣竊見南京地方飢饉殊甚初賣牛畜繼鬻妻女老弱展轉少壯流移甚或餓死於道廷議賑恤但飢民甚多錢糧絶少惟作粥一法不須防姦不須審户至簡至要可以救人世俗皆謂作粥不可輕舉緣有行之一城不知散布諸縣以致四方飢民聞風駢集主者勢力難及來者壅積無算遂謂作粥不宜輕舉不知辰舉而午即受惠三四舉而即可寧輯其效甚速其功甚大此古遺法扶顛起斃拯溺救焚未有先於此者未有急於此者此臣一得之愚也謹案是時餓莩甚多比戶離徙姦民雜出公謂民命在於旦夕若必待編審事定民何以堪令州縣每十里為一局先發現銀市米為粥賑之兩月惟食以粥則所賑皆貧民姦猾漸散乃奏截運儲及戶部所發銀兩議定間月兼給其妙在先令州縣十里為一局俟賑粥兩月然後議給銀米所以人沾實惠而豪強不得為姦也陕西巡按畢懋康賑粥其議有云嘗聞救荒非救飢民乃救死民也其法無如煮粥善相應先儘各州縣見在倉糧盡數動支又動本院贖銀收買米豆雜糧煮粥賑濟然所謂救荒無竒䇿者患在任之不真任之不力耳若有真心自有良法又何事不可為何災不可弭也向得張司農救荒十二議試有明驗為此仰司即將救荒議十二欵發刻令各府印刷分給各州縣逐欵著實舉行十二欵載後賑粥須知內謹案若有真心自有良法非實心愛民者不能道此二句亦不能知此二句之妙畢公深於愛民令州縣盡開粥厰且令將救荒十二議處處發刻印刷施行其心不但欲救一省之荒併欲救各省之荒更可以救各省千百年後之荒矣生機至今猶在時與春氣融和於宇宙間也萬厯時知常熟縣耿橘有云荒年煮粥全在官司處置有法就村落散設粥厰若盡聚之城郭少壯棄家就食老弱道路難堪一不便也竟日伺候二餐遇夜投宿無地二不便也穢雜昜染疾疫給散難免擠踏三不便也非有司親嘗嚴禁人衆慮粥缺少增添生水往往致疾惟就各處村落屬慕義者主之畫地分煮之為當也謹案耿君三説言言中窽事事俱真非目覩而傷心者焉能有此故於不得已之中想出必不可易之法莫如各處村落各令義士主之留法人間惠愛至今不息吁嗟乎耿公安得天下有司盡如公也御史鍾化民河南賑飢令各府州縣官遍歷鄉村察舉善良以司粥厰就便多立厰所每厰收飬飢民二百不拘土著流移分别老幼婦女片紙注明某厰就食以油紙護繫於臂彚立一册聽正印官不時查點使不得東西冒應期至麥熟而止所到必行拾遺之法遍歷州縣村墟粥厰以故地方官望風感動竭力賑救而民賴以生謹案諺云飢時一口勝如一斗死在須臾即能行走粥厰之妙言難盡述鍾公令州縣鄉村就便多立厰所在在救全而且遍歷周觀有司敢不竭力以生之乎一點仁慈貫徹各厰如陽和之布大地無有不在其化育之中者也開粥厰總論曰飢年賑粥可以粥視之乎純陽丹藥岐伯仙方不是過也何也得之則生勿得則死故耳於黔敖之事可見矣但粥厰之事務雖多其要惟五耳一貴多厰耿橘之論是也二貴得人陸續之事是也三貴巡察鍾化民之所行是也四貴犒賞畢懋康之所頒是也五貴得法席侍郎之所奏是也以此五法得余忠宣之捐俸陳堯佐之先民何患乎粥厰之不盡善盡美也乃知無逺涉之苦門外之嗟者厰多故也無廢弛之事冒破之求者得人故也不事虛名立平賑竈者巡察故也人人竭力不忍相欺者犒賞故也實惠均沾不填溝壑者得法故也茍能若是不特逺邁於房主簿且可與公叔文子及北韓南郭並傳不朽矣禮記云使民有父之尊母之親如此而後可以為民父母則凡父母斯民者一粥之賑其可緩乎欽定康濟録卷三上
