body:
  text: 摘要備觀摘要總論救荒要務己備於前但古人偶值凶年目擊心傷有一種殷殷無己之心或見於行事㦯見於立言皆救人活命之良規既不敢盡棄而不收又不能悉載而備覽以是不得不摘其要者而存之臨民者果能潤澤其間民䝉其福矣但此種皆隨見隨録以便增添其先後之次第蓋未嘗列序也歷朝田制井田區田匱田梯田架田圃田沙田塗田圍田井田之制創自黃帝三代因之寓兵於農伏險於順法至善也今惟鄭州其井田尚存餘或可行於土曠人稀之處周禮凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路百里之內川與路縱橫各九而澮與道則各九十也欲開井田不必盡泥古法縱橫曲直各隨地勢淺深髙下各因水勢則長運可息民力可蘇矣見勸農書區田始自伊尹教民糞種負水澆稼禦旱濟時之良法也按舊說長濶相乘通共可作二千七百區空一行種一行於所種行內隔一區種一區除隔除空外可種六百六十二區每區深一尺用熟糞一升和勻壅其根旁苖出鋤不厭頻結子時再鋤空區之土向根上加培以防大風搖擺邱陵傾阪及髙亢之處皆可為之近水更佳每畝可收六十六石學種者或半之熟糞者不拘何糞積於灰草之中待其浥蒸氣透而用之非用火煨也見國脉民天匱田築土護田似圍而小其面俱置瀽穴順置田段便於耕蒔若遇水荒田制既小堅築髙峻外水難入內水則車之易涸淺沒處宜種黃穋稻此稻自種至收不過六十日能避水溢之患如水過澤草自生糝稗可收髙涸處亦宜陸種諸物皆可濟飢此救水荒之上法也蓋因壩水溉田亦曰壩田與此名同而實異矣見農桑訣梯田謂梯山為田也夫山多地少之處除峭壁巉巖不可種其餘有土之山下自橫麓上至危顛裁作重磴皆可藝種如土石相半則須壘石相次包土成田若山勢峻極人須傴僂蟻沿而上耨土而種自下登陟俱若梯磴故總而名之曰梯田如上有水源則可以種秫稻粳稻如止陸種亦冝粟麥蓋田盡而地地盡而山山鄉細民求食若此之艱良可慨也見農桑訣架田架猶筏也亦名葑田考之農書云若深水藪澤則有葑田以木縳為田丘浮繫水面以葑泥附木架上而種藝之其木架田丘隨水髙下浮泛自不淹沒自初種以至收刈不過六七十日夫架田附葑泥而種既無旱暵之災復有速收之效水鄉無地者冝效之見農桑訣圃田種蔬果之田也周禮以場圃任園地注曰圃樹果蓏音祼之屬其田繞以垣墻或限以籬塹負郭之間但得十畝足贍數口若稍逺城市可倍添田數至半頃而止結廬於上外周以桑課之蠶利內皆種蔬惟務取糞壤以為膏腴之本慮有天旱臨水為上否則量地鑿井以備灌溉比之常田嵗利數倍此園夫之業可以代耕若養素之士亦可托為隱所不亦美哉見農桑訣沙田謂沙淤之田也今通州等處皆有之而民間率視為棄地若江淮間有此田則為腴地矣蓋此田大率近水其地常潤澤可保豐熟四圍冝種蘆葦內則普為塍岸可種稻秫稍髙者可種棉花桑麻或中貫湖溝旱則便溉或傍繞大港潦則泄水所以無水旱之虞但沙漲無時未可以為常也見農桑訣塗田者見於瀕海之地潮水往來淤泥常積上有鹹草叢生此須挑溝築岸或樹立樁橛以抵潮泛其田形中間髙兩邊下不及數十丈即為一小溝數百丈即為一中溝數千丈即為一大溝以注雨潦為之甜水溝初種水稗斥鹵既盡可種粱稻所謂㵼斥鹵兮生稻粱即此是也此因潮漲而成與淤田無異者也見勸農書圍田者四圍築長堤而護之內外不相通之謂也江以南地卑多水民間之田皆築土為岸環而不斷隨地形勢四面各築大岸以障水中間又為小岸或外水髙而內水不得出則車而出之以是常稔而不荒今北方之地坦平無岸潦則不能禦水旱則不能蓄水焉能不荒今須勉有力之家度視地形亦各為長堤大岸以成大圍岸下須有溝以泄水則外水可護而內悉為膏腴之稼地矣又何慮乎水旱之為災也謹案田制雖多臨民者貴乎隨地制冝因時命樹否則何補於農人雖然教之得其法矣使不念其胼胝之勞薄其賦斂寬其徭役彼方慕游食之樂以為樂九年之蓄可得而致哉養種法凡五穀豆果蔬菜之有種猶人之有父也地則母耳母要肥父要壯必先仔細揀種其法量自己所種地約用種若干石其種約用地若干畝即於所種地中揀上好地若干畝所種之物或穀或豆等即顆顆粒粒皆要精選肥實光潤者方堪作種此地糞力耕鋤俱要加倍愈多愈妙其下種行路比别地又須寬數寸遇旱則汲水灌之則所長之苖與所結之子比所下之種必更加飽滿下次即用所結之實仍揀上上極大者作為種子如法加晒加糞加力其妙難言如此三年則穀大如黍矣若菜果應作種者不可留多如瓜止留一瓜茄止留一茄餘開花時俱要摘去用泥封其枝眼見國脉民天古人云凡五穀種同時而得時者穀多榖同而得時者米多米同而得時者飯多飯同而得時者久飽而益人舜典曰食哉惟時此之謂也此外有古今救民書集未得採入者祈博覽者補之黎民幸矣鄧御天農歷一百二十卷馮慕岡重農考鄺廷瑞便民圖纂王炳活民救荒書汜勝之書賈思協齊民要術賈元道農經王珉要術苗好謙栽桑圖說王盤農桑輯要孟祺書周憲王救荒本草胡文煥救荒本草王盤野菜譜張西山荒政論明季倉糧考㑹典祖宗設倉貯穀以備饑荒其法甚詳凡民願納穀者或賜奬敕為義民或充吏或給冠帶散官令有司以官田地租稅契引錢及無礙官錢糴穀收貯近時多取於罪犯抵贖以所貯多少為考績殿最云例具於後洪武初令天下縣分各立預備四倉官為糴穀收貯以備賑濟就擇本地年髙篤實民人管理正統五年奏准各處預備倉凡侵盜私用冒借虧缺等項糧儲查追充足免治其罪其侵盜證佐明白不服賠償者准土豪及盜用官糧治罪成化六年令在外軍民子弟願充吏者納米六十石定撥原告衙門遇缺收參𢎞治十八年議准在外司府縣問刑應該贖罪等項贓罰等物盡行折納糴買稻穀上倉以備賑濟並不許折收銀兩及指揮别項花銷正德二年令雲南撫按同三司掌印等官查勘各庫藏所積除軍前支用銀物外其餘堪以變賣及官地湖地等項可以召人佃種收租者儘數設法糴米穀上倉專備賑濟十四年令遼東比照宣大事例將巡按并大小衙門問過一應贖罪銀兩存留本處以備買糧賑濟嘉靖三年令各處巡撫按官督各該司府州縣於嵗收之時多方處置預備倉糧其一應問完罪犯納贖納紙俱令折收米穀每季具數開報撫按衙門以積糧多少為考績殿最如各官任內三年六年全無蓄積者考滿到京户部參送法司問罪八年又令各處撫按官督所屬官將贓罰稅契引錢一應無礙官錢糴買稻穀或從便冝收受雜糧以備荒歉各該官員果能積穀及數聼撫按官核實旌異若不用心舉行照例住俸萬歷七年議准各省直撫按酌量所屬知府地方繁簡貧富定擬積穀分數其積不及數者與州縣一體查參其升遷離任者照在任一體參究謹案不知善法之當遵惟恃催科之足據吝於己而刻於人未有不危其國者也如明季以贓罰銀兩積穀備荒非法之至善哉但為數太多急於取足因愛民之心反變而為害民之政豈祖宗發帑相資之意隆慶間王君賞上疏言凡罪贖銀兩當視地方貧富獄訟繁簡為差不可槩限之以重數也疏上稱善可云兩得矣然則過多其數固非善政略無所備亦豈良圖奈何自嘉靖起雖有備荒之名而無備荒之實災荒屢見萬姓流離至於泰昌天啓崇禎尤不可問積穀之典既曠復兼加徵助餉分外徵求是直驅民作賊耳即明季而觀有備者纍世太平無蓄者因災即覆凡有牧民之職者可不為蒼生作饑饉之謀上慰聖主愛養黎元之意耶救荒全法董煟救荒之政有人主所當行者有宰執所當行者有監司太守縣令所當行者各有不同今悉條列於後人主所當行計六條恐懼修省減膳撤樂降詔求賢遣使發廪省奏章而從諍諫散積藏以厚黎元宰執所當行計八條以調燮為己責以饑溺為己任啓人主敬畏之心慮社稷顛危之漸進寬征固本之言建散財發粟之䇿擇監司以察守令開言路以通下情監司所當行計十條察鄰路豐熟上下以為告糴之備視部內災傷大小而行賑救之䇿通融有無紏察官吏寬州縣之財賦發常平之滯積毋崇遏糴毋啓抑價毋厭奏請毋拘文法太守所當行計十六條稽考常平以賑糶准備義倉以賑濟視州縣三等之饑而為之計小飢則勸分發廪中飢則賑濟賑糶大飢則告奏截漕乞鬻爵借內帑錢為糶本視鄰郡三等之熟而為之備才覺旱潦即發常平錢遣牙吏往豐熟處告糴以備賑濟米豆雜料皆可申明遏糴之禁寬弛抑糴之令計州用之盈虛存下一嵗官吏支遣餘皆以救荒不給則告糴他邦察縣吏之能否縣吏不職劾罷則有迎送之費姑委佐二官以輔之不然對移他邑之賢者委諸縣各條賑濟之方因民情各施賑濟之術差官禱祈存恤流民早檢放以安人情預措備以寬州用因所利以濟民飢興修水利整理城垣之類散藥餌以救民疾守令所當行計二十條方旱則誠心祈禱已旱則一面申州告縣不可邀阻檢旱不可後時申上司乞常平以賑糶申上司發義倉以賑濟勸富室之發廩誘冨民之興販防滲漏之奸戢虛文之弊聼客人之糶糴任米價之低昻請提督擇監視參考是非激勸功勞旌賞孝弟以勵俗飢年骨肉不能相保有能孝養公姑竭力供祖父母者當即行旌奬散施藥餌以救民寬征催除盜賊上共六十條謹案此六十條因位立言隨時行政條條盡善種種回天饑年得此民可再生雖隋侯之珠卞和之玉不足以易其一字也願聖主賢臣以寶六經之法寶之始稱允當救荒無定法風土不一山川異冝惟在豫先講究而已應令諸州守臣到任一月以後詢究本州管下諸縣鎮可以備救荒及其措置之䇿斷然可行者條奏取㫖各令自守其說任內設遇旱潦即簡舉施行不得自有違戾外委監司內委臺諫常切覺察又救荒有賑糶賑濟賑貸此三者名既不同其用亦各有體賑糶者用常平米其法在於平凖市價默消閉糴之風比市價减三分之一如若不足當委官循環糴糶務在救民不計所費賑濟者用義倉米施及老幼殘疾孤貧等人米不足或散錢與之即用庫銀糴豆麥菽粟之類亦可務在選用得人賑貸者或截留上供米或借省倉米或向朝廷乞封樁米或各項倉厫權時那用家不過二石嚴戒出納諸弊死亡不能償者已之豈在責其必償哉論賑放賑亦有三城市則減價出糶常平米一也村落則一賴支散義倉錢二也其不係賑濟之人則有逐都上户領錢興販循環糶糴之法三也明僉事林希元曰若宋董煟救荒全法一書可謂兼備矣元張光大取而續增之本朝朱熊又補其遺世稱為完書刻板現在南京國子監臣愚竊欲重加編集以進此嘉靖八年林公所題之疏也荒政叢言疏林希元臣昔待罪泗州適江北大飢民父子相食盜賊蜂起之際臣之官適當其任蓋嘗精意講求於民情利弊救荒事冝頗聞詳悉今欲陳於陛下者負暄之意也臣聞救荒有二難曰得人難曰審户難救荒有三便曰極貧之民便賑米曰次貧之民便賑錢曰稍貧之民便轉貸救荒有六急曰垂死貧民急饘粥曰疾病貧民急醫藥曰病起貧民急湯米曰既死貧民急募瘞曰遺棄小兒急收養曰輕重繫囚急寬恤救荒有三權曰借官錢以糴糶曰興工役以助賑曰借牛種以通變救荒有六禁曰禁侵漁曰禁攘盜曰禁遏糴曰禁抑價曰禁宰牛曰禁度僧救荒有三戒曰戒遲緩曰戒拘文曰戒遣使其綱有六其目二十有三備開於後編次以進總曰荒政叢言陛下倘不以臣言為愚拙為迂疏乞敕部院詳議可否即賜施行戒遲緩臣聞救荒如救焚惟速為濟民迫飢寒其命在於旦夕官司若遲緩而不速為之計彼待哺之民豈有及乎凡申報荒災務在急速與走報軍機者同限失誤飢民與失誤軍機者同罰如此則人人知警待哺之民庶有濟矣禁宰牛凡年嵗凶荒則人民艱食多變鬻耕牛以茍給目前不知方春失耕嵗計亦旋無望臣按問刑條例私宰耕牛再犯纍犯者俱發邊衛充軍但民果貧不能存活許其赴官陳告官令富民收買仍令牛主收養即以本牛種田照鄉例與富民分收待豐年或富民得牛或牛主取贖如此則牛可不殺而春耕有賴矣河南賑荒事實鍾化民多示諭蠲令已行奸猾里書借口分别里分之災傷為減免以邀賄賂任情移奪村僻愚民不知免數難沾實惠公查照題准分數每項原𣲖銀若干今減免銀若干出示四郊使民共曉里書莫能上下其手民悉沾恩禁刑訟飢饉之年幸留殘喘小民無知猶逞其訟有司不能勸息反為受理一紙之追絶人數日之糧一番之駁窘證犯數家之命一人卧痛數口待亡公則通行府縣除人命大盜外盡行停止惟以粥厰為務憐寒士讀書者不工不啇非農非賈青燈夜雨常無越宿之糧破壁窮簷止有枵雷之腹一遇荒年其苦萬狀公則從厚給之搜節義時當歉嵗義夫節婦孝子順孫公必多方采訪而表章之撫蘇事冝周孔教言救荒有六先曰先示諭先請蠲先處費先擇人先編保甲先查貧户有八冝曰次貧之民冝賑糶極貧之民冝賑濟逺地之民冝賑銀垂死之民冝賑粥疾病之人冝救藥罪繫之人冝哀矜既死之人冝募瘞務農之人宜貸種有四權曰奬尚義之人綏四境之內興聚貧之工除入粟之罪有五禁曰禁侵欺禁寇盜禁抑價禁溺女禁宰牛有三戒曰戒後時戒拘文戒忘備其綱有五其目二十有六先處費飢有三等曰小飢多取足於民中飢多取足於官大飢多取足於上取足於民如通融有無勸民轉貸之類是也取足於官如處糴本以賑糶處銀穀以賑濟是也取足於上如截上供米借內帑錢乞贖罪乞鬻爵之類是也先示諭時值飢荒民情洶洶冝當民之未飢多揭榜示曰將散財將發粟將請蠲稅銀糧米將平糶粟米吾民毋過憂毋出境毋棄父子毋為寇盜則民志定矣宜賑糶賑濟冝精賑糶冝溥一甲之中惟以穀均人不因人計穀穀數同銀數同聼其通融來糴則官不煩民不擾而惠利均沾穀價自不騰湧矣官之糴本或出自官糧或借官銀或勸令冨家出錢收糴照價出糶而量增其船腳工食之費皆成法也明陳龍正曰此萬歷間周中丞孔教所頒行也古今救荒之事無不撮載然提綱皆本於林希元而其間損益則因乎時地耳荒政議逺地之民冝賑銀古之諸倉皆在民間粟既藏於民故及民也易今之粟藏於官故及民也難近且難之况於逺乎移粟就民則偷竊伴和滋其弊矣檄民支粟則腳費米價適相當矣故凡百里以外地不産米而河路不通者惟當以銀賑之包銀紙上用銀匠姓名穿錢索上用錢鋪姓名如有低僞聼其赴官陳告救荒活民書張光大每讀中統建元之詔能因旱暵憫念黎元哀矜惻怛之心溢於意言之表被災去處從實减免不被災地面亦令量減分數此天無私覆地無私載堯舜一視同仁之意也郡縣之官一遇水旱各私其民誦之寧不有愧荒政要覽俞汝為論禁淤湖蕩云川主流澤主聚澤不得川不行川不得澤不止二者相為體用故澤廢是無川矣况國有大澤潦可為容不致驟當衝溢之害旱可為蓄不致遽見枯竭之形必究晰於此而水利之說可徐講矣勸農書袁黃今以農事列為數欵里老以下人給一冊有能遵行者免其雜差一州之中土脉各異有強土有弱土有輕土有重土有緊土有緩土有燥土有濕土有生土有熟土有寒土有暖土有肥土有瘠土皆須相其冝而耕之孝經援神契曰黃白土冝禾黑土冝麥赤土冝菽汙泉冝稻爾民類以汙下之地為劣而不知其冝稻惟不講故也救荒活民補遺朱熊仁哉王者之用心於民也兢兢夕愓一夫不得其所必思有以濟之不使其有嗟怨之聲愁戚之態也彼天下之人將熙熙然鈞陶於春風和氣之中然後為治耳當五季之時戈㦸雲擾蛇蟠虎踞者比比皆是不有真聖人出伐其罪而弔其民何以見天地循環乎一命之士茍存心於愛物於人尚有所濟况君臨天下者哉宋太祖平江南李煜臣賀而君泣命出米十萬賑之冝其善始令終子孫享有天祿垂三百年至今與聖主明王配享盛德之所致也荒政考屠隆災變之來必也順風俗相時冝酌人情權事勢如漢永平年間詔五穀不登其令郡國種蕪菁以助人食陳珦知徐州久雨珦謂待晴種時已過募冨家得豆數千石貸民布之水中水未盡涸而豆甲已露遂不艱食則凡可以佐百姓之急者不可不多方為之擘畫也天子端居九重安能坐照萬國如有災傷百姓急須告災於有司有司急須申災於撫按撫按急須奏災於朝廷萬不可遲遲則易於起疑而救災又恐無及是誰之咎也屠隆自序曰嵗或不登四境蕭條百室枵餒子婦行乞老稚哀號積骨若陵漂尸填河百姓之災傷困厄至此為民父母奈何束手坐視而不為之所哉因作荒政考以告當世貽後來維司牧者留意焉農政全書徐光啓水而得一邱一垤旱而得一井一池即單寒孤子聊足自救惟蝗則不然必藉國家之功令必須百郡邑之協心必須千萬人之同力一身一家無獨力自免之理此又與水旱異者也總而論之蝗災甚重除之則易必合衆力共除之然後易耳救荒䇿國朝魏禧救荒之䇿先事為上當事次之事後為下先事者米價未貴百姓未飢吾有䇿以經之四境安飽而吾無救荒之名所謂美利不言是也當事者米貴而未盡民飢而未死有䇿以濟而民無所重困所謂急則治其標是也事後者米已乏竭民多殍死遷就支吾少有所活所謂害莫若輕是也凡先事之䇿八當事之䇿二十有八事後之䇿三一收買物件飢荒時貧民多賣衣服器用以給食而冨民乘人之急甚至損其價之九而買之此時官府宜那移錢糧設人收買使貧民不至大虧則謀生之路寬矣秋冬間仍行發賣便可補數至於草薪之類亦當以此時收買俟寒雨賣之仍可得利一重強糴之刑時方大飢民易生亂若縱其強糴則有穀者愈不肯糶四方客粟聞風不來立飢死矣且強糴不禁勢必搶奪搶奪勢必虜殺當著為令曰有不依時價強糴一升者即行重處蓋彼原欲少取便冝今且性命不保則強糴者鮮矣一贖重罪重罪本無贖理然能多出穀救荒則雖枉法以生一人而實救數千人之死亦權道也惟本年所犯不可令贖恐富人乘機報復故也先憂集陳芳生緝社倉之制專以賑貸凡官貸者必多侵冒民貸官者必受追呼民與民貸必出倍息惟社倉無此三害雖非荒年亦可借作種食年年出納久之自豐所積雖豐亦不必停其出息其無故不肯還者申官追足為民生計久逺難容姑息耳禁宰耕牛必須驗死牛而後可以塞盜源平時固當力行凶年尤冝首重牛之私宰者利最厚故凶年盜牛居多今惟禁屠家無得夜殺夜殺者同盜牛法坐十家無許住村僻住鄉僻者同私宰法坐十家首者免罪私宰者或可熄迹矣又聞江右近有凶徒造毒藥淬利針見農家有牛暗以針刺牛其牛見血立死其所用藥大約射罔之屬與刺虎窩弓同類迹之亦易得也凡盜牛賣黃昏至者半價夜半至者價得十之三五更至止與一飯而無價故私宰耕牛多在夜間而無白晝之理荒政叢書余森緝觀朱夫子社倉諸記及各規約法可謂備矣然變通亦在其人隨其時地之冝而用之未可執一也按黃震通判廣德軍時社倉大弊衆以始自文公不敢他議震曰法出於聖人猶有通變安有先儒為法遂不得救其弊哉即别買田六百畝以其租代社倉息非凶年不得輒貸貸不取息此可謂善於法朱子者矣招來啇米八則蔡懋德一不定官價凡米到行家悉聼時價之髙下二清追牙缺市牙侵啇米價者務令呈官追給啇米發糶即要追足價銀俾可速運得利三免稅鈔凡米船過關務五尺以下者盡行免鈔部勒有碑不可不遵四免官差凡係米船埠頭不許混行差撥五禁發米處奸棍阻遏遏米原非美政且已移文開禁奸棍借口留難者禀官拏究六禁沿途白捕嚇詐水鄉假冒巡船指稱搜鹽因而搶奪許鳴官重處七禁役需索請批掛號官備紙劄聼米啇隨領隨給衙役不許私索分文併稽半刻八米到悉聼民便或積或賣官俱不問止許銷批倒換新批此上八議明注批中往來貿易轉相告諭要使逺近熙攘之輩皆羡子母什一之贏願出我途而源源灌輸於不窮或於荒政未必無少補也荒政要覽俞汝為按地平天成禹鍚元圭後畢世經營只是濬渠築岸以養稼穡夫子稱之曰卑宫室而盡力乎溝洫此之謂也或疑言疏瀹不兼言封築則堤岸似屬餘事不知井田之制百步為畝深尺廣尺為田間水道而不立封限百畝為遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路言致力溝洫則畛涂在其中禹貢稱九澤必曰既陂是彭蠡震澤之底定亦藉陂障圍瀦成澤開濬封築信非兩事也於是想見唐虞三代之用民力專用之而已佃農廣開闢洪武初令各處人民先因兵燹遺下田土他人開墾成熟者聼為己業業主已還令有司於附近荒田撥補十三年詔陜西河南山東北平等布政司及鳳陽淮安揚州廬州等府民間田土許儘力開墾有司毋得起科天順三年令各處軍民有新開無額田地及願佃種荒閒地土者俱照減輕則例起科每畝糧三升三合草一斤存留本處倉場交收不許坐𣲖逺運成化二十一年令遼東地方軍舍餘人等有開墾不係屯田拋荒土地者上等田每一百畝納穀一石豆一石中等田納穀一石豆五斗嘉靖六年募民開墾荒田時給事中夏言疏內有云太祖髙皇帝立國之初檢覆天下官民土田徴收稅糧俱有定額乃令山東河南地方額外荒田任民儘力開墾永不起科至後又令北直𨽻地方比照山東河南例民間新開荒田不問多寡永不起科所以然者蓋緣北方地土平廣中間大半㵼鹵瘠薄之地葭葦沮茹之場且地形率多窪下一遇數日之雨即成淹沒不必霖雨之久輒有害耕之苦祖宗列聖蓋有見於此所以有永不起科之例又有不許額外丈量之禁是北方人民雖有水潦災傷猶得隨處耕墾以幫取糧差不致坐窘衣食夫何近年以來權幸親䁥之臣不知民間疾苦不知祖宗制度妄聼奸民投獻輒自違例奏討將畿甸州縣人民奉例開墾永業指為無糧田土一槩奪為己有由是飢寒愁苦靡所底止豈祖宗列聖之法治世和民之道哉萬歷十一年議准陜西延寧二鎮丈出荒田但不在屯田舊額之內者俱聼軍民隨便領種永不起科各邊但有屯餘荒地堪墾者俱照例行王家屏答王對滄巡撫書有云開荒之議大是難言以為不可開而却有可開之地以為可開而却有不願開之人人所以不願開者冨有田者盡力於熟田不肯治荒田也貧無田者又無力可治荒田必仰給牛種於官官給牛種豈召之來而遂給之耶必報姓名必關里甲必遞領狀皆不得徒手得必有費矣還牛種於官又有費矣起收子粒追呼之使相屬又必有費矣此三項者皆正費也未為纍也田未墾時荒田也官田也既墾而田主人至矣田主人缺糧則拉與賠糧缺差則拉與賠差非必真正田主人也本非其田而賴之使賠者亦有之矣賴之於官非必不才有司聼其賴也即才有司而急於差糧之完屈之使賠者亦有之矣非直一嵗賠也嵗嵗佃之則嵗嵗賠之不棄其田賠未已也故人之視荒田不啻坑穽官雖召之不應也雖給之牛種寬其租粒不往也何也差糧之纍難支而官府之令不信也此百姓之所以益逃而田土之所以益荒也乃諸鎮以墾田入奏者動輒數千百頃每視其籍惟有恨且嘆耳將誰欺乎夫田既日墾則租當日多租日多則餉當日減今各鎮一面報開荒一面請餉則其未嘗開荒可知矣張瀚淮鳯墾田疏內有云合於淮鳯二府特設一僉事擇實心幹濟者畀之專敕給以關防駐劄適中州縣撫按同心董其事各道不得侵其權有司豪勢不得撓其法假以嵗月不責近功開一頃即一頃之利招一民即一民之安三年果有成績進秩而不遷再考再進秩久且超遷之其所轄有司即以開墾地土招來人民多寡為殿最亦各久任超遷如是十年不臻富庶之效無是理也専官之責其效在廣開溝洫夫水土不平耕作無以施力必先度量地勢髙下跟尋水所歸宿濬河以受溝渠之水開溝渠以受潢潦之水官道之衝設大堤以通行偏小之村亦增單以成徑惟欲於道傍多開溝洫使接續通流水由地中行不占平地又度低窪處所多開塘堰以瀦蓄之夏潦之時水歸溝塘亢旱之日可資灌溉髙者麥低者稻平衍地多則木棉桑果皆得隨時樹藝土本膏腴地無遺利遍野皆衣食之資矣屠隆曰近日建議北方新開水田於北人甚利蓋北方地勢髙燥故冝種二麥但其間豈無可開種水稻者兼而行之始以為難數年以後為利溥矣巨室沮撓持議不决殆可深惜居業録曰天下之衣食盡出於農工啇不過相資而已故程子舉先王之法合當八九分人為農一二分人為工啇今以數計之工啇居半又有待哺之兵及僧道尼巫師祝富盛之家皆不耕而食機織本女子之事今機匠以男為之耕者少食者多天下如何不飢困冝自百官士人之外止將一分作工啇以通器用貨財有無其餘盡驅之於農既盡生財之道又免坐食之費四海必將殷冨矣謹案固本莫如積粟冨民不外墾田棄地利而縱游民天時稍逆盜賊立興民可失業而田可不耕乎此君臣之賢者無不以開荒為急也但開墾之法其說多矣有欲貸牛種於窮黎而開墾者有欲選健卒而為屯田者有欲令冨民墾之而為世業者紛紛不一既以措費為不易又恐冒濫其功程遂多沮遏嘗竊計之其費有不必取給於朝廷而費自足其功有不必慮其冒濫而冒濫自除者曷勿勉之其法惟令公侯貴戚文武大官自為籌畫召募開荒今則廢地後作俸田且為世業官雖遷而田莫奪疏濬堤防有勿急乎然開荒之時須以溝洫分明者受上賞次者受中賞茍且完事必令重濬之如有力而怠於從事者則有罰簡一有風節賢臣専董其事看地勢之髙下辨蓄泄之淺深為首務次查其出本幾何開闢幾何養活農民若干衆一嵗一奏五年之內奬以勵之八年之外以此俸之不敷然後足之以俸銀誰不樂從然朝廷之起科須待其去官之日而後徵之又宜大減於常賦使小民之還租亦得半納於宦家否則何益於窮民恥游惰而事農事果得均相有益民未有不樂為之耕官未有不樂為之費者也又何必以工本為艱難而専欲取給於內帑哉富公安流法擘畫屋舍安泊流民事富弼當司訪聞青淄登濰萊五州地分有河北災傷流移人民逐熟過來其鄉村縣鎮人户不那䟎安泊多是暴露並無居處目下漸向冬寒切慮老小人口凍餓而死甚損和氣特行擘畫下項一州縣坊郭人户雖有房屋又緣出賃與人居住難得空間房屋今逐等合那䟎房屋間數開後第一等五間第二等三間第三等兩間第四等一間一鄉村等人户小可屋舍逐等合那䟎間數開後第一等七間第二等五間第三等三間第四等五等二間急將前項那䟎房屋間數報官災傷流民老小在州者州官著人在縣者縣官著人在鎮者監務著人引至抄㸃下房屋間數內計口安泊本縣及當職官員躬親勸誘量其口數各與桑土或貸種救濟種植度日如內有現在房數少者亦令收拾小可材料權與蓋造應之若有下等人户委的貧虛别無房屋那應不得一例施行如更有安泊不盡老小寺院菴觀門樓廊廡亦無不可務令安居不致暴露失所謹案人當顛沛流移之日身無一文扶老携幼旅店不容安歇道塗橋上棲身冷雨淋膚寒風刺骨即壯健者已將病疫况餓體愁人有不轉於溝壑哉富公於青州首重安頓流民之法故無暴露失所之人則凡有流民入境者安可不倣佛前賢先有以安其身哉青州勸誘人户量出斛米救濟飢民示有云河北一方盡遭水害老小流散道路填塞坐見死亡之厄豈無賑恤之方又緣倉廩所收簿書有數流民不絶濟贍難周欲盡救災必須衆力庶幾凍餒稍可安存况乎今年田苗既大豐於纍載而又諸郡物價數倍於常時蓋因流民之來遂收涌貴之直豈可只思厚己不肯救人共覩災傷諒皆痛閔五州鄉村人户分等第並令量出口食以濟急難施斗石之微在我則無所損聚千萬之數於彼則甚有功凡在部封共成利濟今具逐家均定所出斛米數目如後第一等二石第二等一石五斗第三等一石第四等七斗第五等四斗客户三斗已上並米豆中半送納內有係大段災傷人户委的難為出辦即不得一例施行亦不得為有此指揮别生弊幸透漏有力人户稍有違戾罪不輕恕一凡有一官令專十耆將雕造印板所印刷票子給與流民印押其頭後留餘紙三四張編定字號所差官員便令親自收執分頭下鄉勒耆壯引領排門抄㸃凡見流民盡底喚出不論男女當面審問的實填定姓名口數便各給票子一道收執以便請領米豆不得差委他人混給票子冒支米豆凡有土居貧窮或老年或殘疾或孤寡或貧丐等人除在孤老院有糧食者不重給餘皆一體給票領銀一凡給米豆每人日給一升十三嵗以下每人日給五合三嵗以下男女不在支給之例仍於票子上預算明白不得臨時混算一官如管十耆每日只給兩耆以五日給遍十耆一給五日官員須早到給所辦事不得令流民遲歸晚去凍露道途一官員受米豆先要看耆內何處人家可以寄頓只要便於流民請領始為得當一勘㑹二麥將熟諸處之流民盡欲歸鄉令監散官自五月初一日算至五月終一併支與流民充作路糧以便歸鄉一指揮青淄等州須曉示道店不得要流民房宿錢謹案此皆富公青州安流之法不但人無路宿而且口食有資寧若後人雖本境飢寒尚無術以處之哉自公分養之法一立愈於聚民城市薰蒸成疫者多矣故録其大槩以示後來使知前賢處事之悉當也陸路運糧法董摶霄奏議海寧一境不通舟楫軍糧惟可陸運瀕海之人屢經冦擾且冝曲加存撫權令軍人運送其陸運之方每人行十步三十六人可行一里三百六十人可行十里三千六百人可行一百里每人負米四斗以夾布囊盛之用印封識人不息肩米不著地排列成行日五百回計路二十八里輕行十四里重行十四里日可運米二百石每運可供二萬人此百里陸路運糧之法也欽定四庫全書欽定康濟録卷四下之二賑粥須知賑粥論曰粥厰之當開其事雖見之於古人粥厰之宜備其法又宜宣之於後世庶幾一目瞭然何者當先何者宜後斷宜選擇者何人必不可少者何事悉以古人之法為法既無遺漏又不泛施使餓莩藉之而生枵腹賴之而活雖云一粥是人生死關頭須要一畨精神勇猛注之庶幾閙市窮鄉皆沾利益又聞昔伊川先生論賑粥云惟有節則所及者廣又云救飢者欲其免死而己非欲其豐肥也觀於此言又可知賑濟之中亦應有節制之道矣官長開厰賑粥法陕西畢巡按發刻張司農救荒十二議一親審貧民先令里長報明貧户正印官親自逐都逐啚驗其貧窘給與吃粥小票一張填寫里甲姓名許執票入厰仍登簿萬不可令民就官往返等候先有所費要耐勞耐久細心查審明胡其重曰若賑可稍緩則須親審若州縣遼闊遍歷不完而賑又不可緩則須於寄居官等擇其有德有品者分任其事亦可二多設粥厰衆聚則亂散處易治昔富鄭公設公私廬舍十餘萬區而安處其民又多設粥厰今議州縣之大者設粥厰數百處小者亦不下百餘處多不過百人少則六七十人庶釡㸑便而米粥潔鈐束易而實惠行謹案司農之得手處全在此一條妙在厰多則人不雜各賑各方而且易於識認又無途宿風雨之苦三審定粥長數百貧民之命懸於粥長之手不得其人弊竇叢生務擇百姓中之殷實好善者三四人為正副而主之即富鄭公用前資待缺官吏之意也四犒勞粥長飢民羣聚易於起爭粥長約束任勞任怨上不推恩激勸待以心腹誰肯效力盡心故宜許其優免重差特給冠帶匾額近則又有一法半月集粥長於公堂任事勤勞者以盒酒花紅勞之惰者量行懲戒以警其後謹案此法極善可以鼓舞衆人而且易為但有善人能人不妨任粥長當堂禀用官即具帖請來厰中協力料理五親察厰弊粥厰素稱弊藪惟在稽察嚴密然非守令躬察則不知警又有以逸代勞之法限粥長三五日執簿赴堂領米諄諄囑其用心察其勤惰又要時加密訪置大籖四根書東南西北四字日抽一籖如東字單騎東馳不拘逺近直入厰中果有弊者造作不精者分輕重而懲治之不可貸也六預備米穀倉廩不實支取易匱或動支官銀糴買或勸借義民輸助必須多方設法預為完備凡煮粥之米既交粥長或搬運或變賣任從其便只要有采煮粥不許吏胥因而索詐七預置柴薪厰中器皿不可强借惟鐡杓必須官給兩個恐有大小故也煮粥之柴其費最多粥長等既任其勞那堪再行賠纍即令粥長在所領米內扣出其米變賣作價可也八嚴立厰規馭飢民如馭三軍號令要嚴眀規矩要畫一印簿照收到先後順序列名鳴鐘會食唱名散籖凡散粥或單日自左行散起或雙日自右行散起或自上散或自下散或自中散互為先後則人無後時之嘆不至垂涎以起爭端敢有起立擅近粥竈者即時扶出除名粥長不遵規矩亦有所懲九收留子女預示飢民不可擅棄子女然而饑寒困苦難保其無萬一有之令里老保甲老人等收起抱赴官局收飬仍給送來之人數十文以作路費庶可酬其奔走之勞十禁止賣婦賣婦者當嚴為禁止倘有迫切真情將夫妻盡收入厰中婦令撫嬰男歸厰用事完聽去十一收養流民最苦者飢民逃竄以路為家須於通衢寬空處叧立流民厰叧置流民簿隨到隨收如若滿百須增厰舍若乞丐又立花子厰不得與流民共食十二散給藥餌凶年之後必有癘疫疫者萬病同證之謂也不論時日早晚人參敗毒散極效或九味羌活湯香蘇散皆可但須多服方有效驗合動官銀令醫生速為買辦合厰散數十帖以濟貧民至夏間有感者為熱病敗毒散加桂苓甘露飲神效敗毒散內不用人參加石膏為佳再令時醫定奪必不誤也謹案畢公諱𢡟康賑粥於陕西萬歷二十九年事也其入關之始見饑民嗷嗷待哺乞生無路乃云莫如煮粥最善故將張司農救荒十二議即發刻施行薦拔勤員特參惰慢務令有司以一段真精神救護元元可稱賢大夫矣山西巡撫呂坤賑粥法一廣煮粥之地飢民無定方而煮粥有定處若不多設處所以粥就民恐奔走於場難宿於家或朝食一來暮食一來十里之外不勝奔疲不便一也壯丁就粥便可隨在歇止而老病之父母幼弱之小兒羞怯之婦女餓死於家其誰看管不便二也乞粥以歸不惟道逺難携亦且妄費難察不便三也不如十里之內就近村落寺觀之處各設一場庶於人情為便一擇煮粥之人舊日監督主管多委里甲老人嗟夫難言之矣無迫切之心則痛癢不關而事必茍無綜理之才則㸃察失當而事恆不詳無鎮壓之力則强者多暴者先而惠不均故定煮粥之法當選煮粥之人先令之講求講求既明正印官親與問難如於立法之外另有良法者即行奬賞則人人各奏其能而仁術益精詳矣一行勸諭之令善不獨行當與善者共之正印官執一簿籍少帶人數各裹餱糧遍到鄉村看得衣食豐足房舍齊整之家便入其門親自勸勉或願捨米糧若干或願煮粥若干日飼養若干人務盡激勸之言無定難從之數如有所許即令自登簿籍先送牌坊等樣為之奬勵一别食粥之人凡來食粥者報名在官立簿一扇分為三等六班老者不耐餓另為一等粥先給稍加稠病者不可羣另為一等粥先給少壯另為一等最後給此謂三等造次顛沛之時男女不可無辨男三等在一邉女三等在一邉是為六班一定散粥之法擂鼓一通食粥之人男坐左邉以老病壯為序女坐右邉亦然每人一滿碗周而復始大率止於兩碗老病者加半碗一碗可也每日夕人給炒豆一碗一分管粥之役大粥場立總管一人掌簿二人司積二人管米豆俱以廉幹者為之每鍋竈頭一人炊手一人壯婦人更好柴夫一人水夫十人皆以食粥中之壯者為之但有惰慢及作弊者即時杖逐一計煮粥之費凡米須積在粥厰嚴密之處司積者自帶鎖鑰每日每人以三合為率食粥之人每日增減不同掌簿先一夕日落報名數於司積令某鍋煮米若干司積冒破米豆者每一升罰一擔竈頭尅減米豆者不論多少重責革出一查盈縮之數不分軍民良賤不論本土流民除强壯充實男女不可輕收外其餘但係面黃肌瘦之人尫羸襤褸之狀即准收簿每簿分男女二扇每班常餘紙數葉以備早晚續到之人其人以日為序如正月初一日趙甲某府某縣人見在何處居住有子無子初二初三以次登記一備煮粥之具布袋若干條大鍋若干口木杓若干隻約與碗大木碗若干箇碗令食粥者自備甚便但大小不一恐多寡不同大木杓若干箇水桶若干隻柴薪不可多得即差少壯食粥之人令其拾採一廣煮粥之處須行各州縣一齊通煮使窮民各就其便而流來之人不致結聚但一場過五百人即將流民撥於别場有父子夫妻一同隨撥蓋結聚易離散難老病婦女何害少壯男子不散必為盜於地方接熟之日照歸流民法各發原籍更為得所一備草薦饑病之人坐卧無所亦易生疾州縣將穀稻藁桔織為草薦令之鋪地庶不受濕有力之家平日肯織千百或冬月施與丐子或飢年散給粥場大隂德事事完另行奬勵一奬有功如果有功無過者原委人役大則送牌小則花紅鼓樂送至其家以示優厚一旌好義看其費米之多寡而定其旌賞之重輕或送牌坊或給免帖或給冠帶可也一賑流民過往流民倘過粥場每人給粥三碗炒豆一碗仍問姓名登記以便查考一貯煮粥器皿天道無十年之熟一切煮粥器皿須令收藏備造一册存庫委付一人收掌不許變價及被人花費謹案此上皆呂公之良法其論粥厰必使數里一厰令人無奔走後時之失一厰止收二百人令人無雜聚成疫之害可為曲盡人情以余論之如辰刻令人食粥一餐隨以米三合給之代其下次之粥民不因官守候二餐誤其一日之他圗官不為民令人過勞日有兩畨之料理較於廣其食粥之地别其食粥之人不尤為要哉崇禎庚辰年浙江海寧縣雙忠廟賑粥人食熱粥方畢即死每日午後必埋數十人與宋時湖州賑粥粥方離鍋猶沸滚器中饑人急食之食己未百步而即死者無異後杭人何敬德知之遂於夜半煮粥置大缸中明旦分給死者寡矣其所以必死之故人知之乎凡食粥者身寒腹餒必然之勢身寒則熱粥是好腹餒則飽餐自調殊不知此皆殺身之道立死無疑故賑飢民其粥萬不可過熱令其徐徐食之戒其萬勿過飽始可得生賑粥時尤須大書數紙多貼於粥厰左右上書餓久之人若食粥驟飽者立死無救若食粥太熱者亦立死無救猶當令人時時髙唱於粥厰之中使瞽目者與不識字之人皆知之庶可自警否則烏能知其久饑與不久饑而豈可概薄其粥令其不飽哉不論官賑民賑皆宜如是人之生死係焉仁人幸無忽也舊傳新鍋煮粥煮飯煮菜飢民食之未有不死者故厰中須用舊鍋萬一舊鍋不足須將新鍋或向菴堂寺院或向飯鋪酒家換取舊鍋備用庶不致損人之命此又一要法也不論男婦到厰吃粥倘懷中有嬰兒者許給一人之粥令其携歸哺之彼利此粥不致棄子造福更大也少婦處女初次到厰吃粥之後當給半月之糧令其吃完此米再到厰中來吃一次如前給之後皆倣此不可令彼含羞忍恥日日到厰挨擠於稠人廣衆之中也萬歷二十八年河南大飢郭家村劉一鵾既貧且病囑其妻曰與其相守而俱亡何若自圗生計其妻泣曰夫者婦之天死則俱死耳寧忍相棄乎後賴御史鍾化民令縣官多設粥厰食之而得生謹案可見救人之死莫如粥厰但此厰貴早而不貴遲枵腹者不能再候也貴近而不貴逺貧病者不能逺步也貴久而不貴暫禾麥未熟不能自食也一鵾可鑑其他可知倘此厰急促不能立辦菴堂寺院皆可代也明末州縣官之賑粥也探聽勘荒官次日從某路將到連夜於所經由處寺院中設厰壘竈堆儲柴米鹽菜炒豆髙竿掛黃旗書奉憲賑粥四大字於上集村民等候官到鳴鐘散粥未到則枵腹待至下午官去隨撤厰平竈寂然矣皆耳聞目覩之事由是推之民安得不困國安得不擾後世官長賑粥可不視此為戒哉凡賑粥當在十月初旬為始此際草根樹皮無從得覔無粥則有死而已其止當在三月初旬此時草木既已萌芽飢者或有賴於一二也因里設厰賑粥法魏禧言施粥者必須因里設厰若勞其逺行恐半途仆斃又須立人監理令飢民至者隨其先後來一人則坐一人後至者坐先至之下已坐者不許再起一行坐盡又坐一行以面相對以背相倚空其中路可令擔粥人行走坐至正午擊梆一通髙唱給第一次食令人次序輪𣪚有速食先畢者不得混與一次散訖然後擊梆二通髙唱給第二次食如前法共三次即止蓋久饑之人腸胃枯細驟飽即死惟飢民中稱有父母妻子卧病在家者量行給與携歸處分已訖方令散去散去之法令後至坐外者先行挨次出厰庶不擁擠踐踏又多人羣聚易於穢染生病須多置蒼术醋碗薰燒以逐瘟氣又不時察驗嚴禁管粥者尅米將生水攙稀食者暴死其碗箸各令飢民自備按米多亦不得施飯久饑食飯有立死者謹案魏君之論粥厰簡而當切而備非實與斯民休戚相關以飢饉為念者不能也故其救荒䇿皆可為後世法不獨一粥厰也擇地聚人賑粥法城四門擇空曠處為粥場蓋以兩棚坐以矮凳繩列數十行每行兩頭豎木橛繫繩作界飢民至令入行中挨次坐定男女異行有病者另入一行乞丐者另入一行預諭飢民各携一器粥熟鳴鑼行中不得動移每粥一桶兩人舁之而行見人一口分粥一杓貯器中須臾而盡分畢再鳴鑼一聲聽民自便分者不患雜蹂食者不苦見遺限定辰申二時亦無守候之勞庶法便而澤周也謹案古人賑粥擇四門之寬廣處而分食之既免冗雜薰蒸之苦又無遺出門外之悲法云妙矣但四鄉若不倣此賑之恐飢民盡奔城市仍難安頓故不可不廣為之計也挑擔就人賑粥法擔粥法無定額無定期亦無定所每晨用白米數斗煮粥分挑至通衢若郊外凡遇貧乞令其列坐人給一杓每擔需米五六升可給五六十人之餐十擔便延五六百人一日之命或數日或旬日更有仁人繼之諸命又可暫延無設厰之勞有活人之實既可時行時止又且無功無名量力而行隨人能濟衆每日有仁方矣此崇禎辛巳嘉善陳龍正賑粥之法也明張氏曰擔粥須用有蓋水桶外用小籃備鹽菜碗筯荒年有外具衣冠內實饑餒不能忍恥就食者如託人瓶鉢取食勿生疑阻倘訪知果赤貧無人轉託者更宜挑擔上門量給之以米代粥分給法沈少參正宗謂擔粥法止可代流亡之在其途者若救土著之飢民煮粥叢弊不若分地挨户給以粥米既可活人又不叢聚但須分給得當時加親察勝如因粥釀疫者多矣謹案分給粥米之法果能託親覔友老成忠厚之人分布城市鄉村一體從事何善如之垂死飢人賑粥法邊海有失風船飄至塘船中人餓將絶者急與食往往狼吞而致死後有煮稀粥潑桌上令飢人漸漸吮食之方能得生蓋飢腸微細不堪頓食也謹案以此觀之凡飢人不可令其吃熱粥而頓飽也明矣僉事林公故有云垂死貧民急饘粥粥要極稀毋令至飽此皆厯有徵驗之言不可不遵也黃虀雜煮增粥法取菜洗淨貯缸中用麥麵入滚水調稀漿澆菜上以石壓之不用鹽六七日後菜變黃色味有微酸便成黃虀矣此後但以菜投入虀汁中便可作虀更不復用麵取虀切碎和米煮粥食之每米二斗可當三斗之用雖不及純米養人而充塞饑腸聊以免死亦儉嵗縮節之一法也謹案凶年增數口之粥即救人幾日之命豈可視為泛泛故用黃虀煮粥凡米二升可作三升之用非法之至善者歟物力維艱之際不可不急為預備也欽定四庫全書欽定康濟録卷四下之三捕蝗必覽捕蝗總論小雅大田之詩曰去其螟螣及其蟊賊無害我田稚田祖有神秉畀炎火其後姚崇遣使捕蝗即引此詩為證然其說未詳而其法亦未大備世云蝗有蒸變而成者有延及而生者不知延及而生實始於蒸變而成若致力水涯不容蒸變禍端絶矣既成之後非多人不能撲滅古人言法在不惜常平義倉米粟慱換蝗蝻雖不驅之使捕而四逺自輻輳矣倘尅減遲滯則捕者氣沮誠哉是言也故將蝗之始末盛衰條分於後蓋知之詳則治之切以助為政者之萬一耳一蝗之所自起蝗之起必先見於大澤之涯及驟盈驟涸之處崇禎時徐光啓疏以蝗為蝦子所變而成確不可易在水常盈之處則仍又為蝦惟有水之際倐而大涸草留涯際蝦子附之既不得水春夏鬱蒸乘濕熱之氣變而為蝻其理必然故涸澤有蝗葦地有蝗無容疑也任昉述異記云江中魚化為蝗而食五穀太平御覽云豐年蝗變為蝦此一證也爾雅翼言蝦善遊而好躍蝻亦好躍此又一證也有一僧云蝗有二鬚蝦化者鬚在目上蝗子入土孶生者鬚在目下以此可别二蝗之所由生蝗既成矣則生其子必擇堅垎音劾黑土髙亢之處用尾栽入土中其子深不及寸仍留孔竅勢如蜂窩一蝗所下十餘形如豆粒中止白汁漸次充實因而分顆一粒中即有細子百餘蓋蝻之生也羣飛羣食其子之下也必同時同地故形若蜂房易尋覔也老農云蝻之初生如米粟不數日而大如蠅能跳躍羣行是名為蝻又數日羣飛而起是名為蝗所止之處喙不停嚙故易林名為飢蟲又數日而孕子於地地下之子十八日復為蝻蝻復為蝗循環相生害之所以廣也三蝗之所最盛蝗之所最盛而昌熾之時莫過於夏秋之間其時百穀正將成熟農家辛苦拮据百費而至此適與相當不足以供一啖之需是可恨也按春秋至於勝國其蝗灾書月者一百一十有一內書二月者二書三月者三書四月者十九書五月者二十書六月者三十一書七月者二十書八月者十二書九月者一書十月者三以此觀之其盛衰亦有時也四蝗之所不食蝗所不食者豌豆菉豆豇豆大麻􅔾麻芝麻薯蕷及芋桑水中菱芡蝗亦不食若將稈草灰石灰二者等分為細末或灑或篩於禾稻之上蝗則不食有王禎農書及吳遵路諸事可考植之不但不為其所食而且可大獲其利五蝗之所自避良守之所在蝗必避其境而不入故有牧民之責者果能以生民為己任省刑罰薄稅斂直寃枉急賑濟洗心滌慮雖或有蝗亦將歸於烏有而不為害矣如卓茂宋均魯恭諸君子載在前集皆班班可考也六蝗之所宜禱蝗有禱之而不傷禾稼者禱之未始不可如禱而無益徒事祭拜坐視其食苗其禱也不亦大可冷齒耶萬歷四十四年六月丹陽有蝗從西北來蔽天翳日民爭刲羊豕禱於神有蒲大王者尤號靈異凡禱之家止嚙竹樹茭蘆不及五穀有一朱姓者牲醖悉具見蝗已過遂止而不禱須臾蝗復回集於朱田凡七畝盡嚙而去鄰苗不損一頴其事亦可異也至於開元四年山東大蝗祭拜之而坐視其食苗此一禱也不可謂愚之至哉七蝗之所畏懼飛蝗見樹木成行或旌旗森列每翔而不下農家若多用長竿掛紅白衣裙羣然而逐亦不下也又畏金聲炮聲聞之逺舉鳥銃入鐡砂或稻米擊其前行前行驚奮後者隨之而去矣凡蝗所住之處片草不存一落田間頃刻千畝皆盡故欲逐之非此數法不可以類而推爆竹流星皆其所懼紅緑紙旗亦可用也八蝗之所可用蝗若去其翅足曝乾味同蝦米且可久貯而不壞以之食畜可獲重利明陳龍正曰蝗可和野菜煮食見於范仲淹疏中崇禎辛巳年嘉湖旱蝗鄉民捕蝗飼鴨鴨最易大而且肥又山中人養猪無錢買食捕蝗以飼之其猪初重止二十斤旬日之間肥而且大即重五十餘斤始知蝗可供猪鴨此亦世間之物性有宜於此者矣又有云蝗性熱積久而後用更佳九蝗之所由除蝗在麥田禾稼深草之中者每日清晨盡聚草稍食露體重不能飛躍宜用筲箕栲栳之類左右抄掠傾入布囊或蒸或煮或搗或焙或掘坑焚火傾入其中若只掩埋隔宿多能穴地而出蝗在平地上者宜掘坑於前長濶為佳兩旁用板或門扇等類接連八字擺列集衆發喊手執木板驅而逐之入於坑內又於對坑用掃帚十數把見其跳躍往上者盡行掃入覆以乾草發火燒之然其下終是不死須以土壓之過一宿乃可一法先燃火於坑內然後驅而入之詩云去其螟螣及其蟊賊毋害我田稚田祖有神秉畀炎火此即是也蝗若在飛騰之際蔽天翳日又能渡水撲治不及當候其所落之處糾集人衆各用繩兜兜取盛於布袋之內而後致之死此上三種之蝗見其既死仍集前次用力之人舁向官司或錢或米易而均分否則有産者或肯出力無産者誰肯殷勤古人立法之妙亦嘗見之於纍朝矣列之於後十蝗之所可滅有滅於未萌之前者督撫官宜令有司查地方有湖蕩水涯及乍盈乍涸之處水草積於其中者即集多人給其工食侵水芟刈斂置髙處待其乾燥以作柴薪如不可用就地燒之有滅於將萌之際者凡蝗遺子在地有司當令居民里老時加尋視但見土脈墳起即便去除不可稍遲時刻將子到官易粟聽賞有滅於初生如蟻之時者用竹作搭非惟擊之不死且易損壞宜用舊皮鞋底或草鞋舊鞋之類蹲地摑搭應手而斃且狹小不傷損苗種一張牛皮可裁數十枚散與甲頭復可收之聞外國亦用此法有滅於成形之後者既名為蝻須開溝打捕掘一長溝溝之深廣各二尺溝中相去丈許即作一坑以便埋掩多集人衆不論老幼沿溝擺列或持掃帚或持打撲器具或持鐡鍤每五十人用一人鳴鑼蝻聞金聲則必跳躍漸逐近溝鑼則大擊不止蝻驚入溝中勢如注水衆各用力掃者自掃撲者自撲埋者自埋至溝坑俱滿而止一村如此村村若此一邑如是邑邑皆然何患蝻之不盡滅也謹案四法果能行之於未成將成已成之後醜類自滅何至蝗陳如雲荒田如海但窮民非食不生茍不厚給活其身家誰肯多人合力不盡滅之而不已哉雖然給之厚矣有司若不親加料理烏知弗為吏胥之所侵食也故撲除之法有二一在責重有司一在厚給衆力敢録前人之善政以為後世之芳規視之者幸無忽焉責重有司之例唐開元四年夏五月敕委使者詳察州縣勤惰者各以名聞謹案有此明詔有司尚敢因循而不捕乎故連嵗蝗灾而不至大飢者罰在有司故也宋淳熙敕諸蝗初生若飛落地主鄰人隱蔽不言耆保不即時申舉撲除者各杖一百許人告報當職官承報不受理及受理而不親臨撲除或撲除未盡而妄申盡淨者各加二等謹案此敕初責地主鄰人未嘗不是末重當職官貟尤為敦本之論得捕蝗之要法所缺者耆保諸人告而能捕者絶無賞給尚無以為鼓舞之道耳明永樂九年令吏部行文各處有司春初差人巡視境內遇有蝗蟲初生設法捕撲務要盡絶如或坐視致令滋蔓為患者罪之若布按二司不行嚴督所屬巡視打捕者亦罪之每年九月行文至十月再令兵部行文軍衛永為定例謹案此則專罪有司之不力而又委其任於布按噫法至是而無以加矣昔徐光啓疏中有云主持在各撫按勤事在各郡邑盡力在各小民美哉數語也又陳氏有云捕蝗之令當嚴責其有司蓋亦一家哭何如一路哭之意古之良吏蝗不入境有事於捕已可愧矣捕復不力雖嚴罰豈為過耶斯言誠可採也厚給捕蝗之例晉天福七年飛蝗為灾詔有蝗處不論軍民人等捕蝗一斗者即以粟一斗易之有司官貟捕蝗使者不得少有掯滯謹案捕蝗一斗得粟一斗非捕蝗而捕粟矣小民何樂而不為有司若果奉行蝗必盡捕而無疑矣宋熙寧八年八月詔有蝗蝻處委縣令佐躬親打撲如地方廣濶分差通判職官監司提舉分任其事仍募人得蝻五升或蝗一斗給細色穀一斗蝗種一升給粗色榖二升給銀錢者以中等值與之仍委官燒瘞監司差官覆按倘有穿掘打撲損傷苗種者除其稅仍計價官給地主錢數謹案此詔給榖既云詳盡而又償及地主所損之苗不但免稅而且償其價數噫捕蝗而至此詔可云無間然矣紹興間朱熹捕蝗募民得蝗之大者一斗給錢一百文得蝗之小者每升給錢五百文謹案蝗蝻有大小之分賢者别之最清蓋害人之物除之宜早不可令其長大而肆毒也故捕蝗者不可惜費得蝗之小者寧多給之而勿吝也蓋小時一升大則豈止數石文公給錢大小逈異不可為捕蝗之良法歟明萬歷四十四年御史過庭訓山東賑饑疏內有云捕蝗男婦皆饑餓之人如一面捕蝗一面歸家吃飯未免稽遲時候遂向市上買麵做餅挑於有蝗去處不論逺近大小男女但能捉得蝗蟲與蝗子一升者換餅三十箇又查得崮山鄰近兩厰領糧饑民一千零二十名令其報效朝廷今後將彼地蝗蟲或蝗子捕半升者方給米麵一升以為五日之糧如無不准給與謹案過御史何見之不廣而責效甚速也尹鐸之保障晉陽馮歡之焚劵薛地何嘗責其必報然亦未嘗不報也今過御史命人擔餅易蝗亦云小惠且崮山飢民升數之粟必令有蝗而始給彼老弱殘疾艱於行動力不能捕蝗者不盡死於此疏耶凡欲行捕蝗之法可見不外嚴責有司厚給捕者而已但二者相因為用缺一不可要知捕蝗易粟官亦易於勵衆衆亦樂於從官若使不准開銷於何取給不亦仍成畫餅耶故天子不可惜費近臣不可䝉蔽君臣一體朝野同心再法十宜而力行之何患乎蝗之不除而蝻之不滅哉一宜委官分任責雖在於有司倘地方廣大不能遍閲應委佐二學職等貟資其路費分其地段注明底册每年於十月內令彼多率民夫給以工食芟除水草於驟盈驟涸之處及遺子地方搜鋤務盡稱職者申請擢用遺惡者記過待罰二宜無使隱匿向係無蝗之地今忽有之地主鄰人果即申報除易米之外再賞三日之糧如敢隱匿不言被人首告首人賞十日之糧隱匿地主各與杖警即差初委官貟速往搜除無使蔓延獲罪三宜多寫告示張掛四境不論男婦小兒捕蝗一斗者以米一斗易之得蝻五升者遺子二升者皆以米三斗易之蓋蝻與遺子小而少故也如蝗來既多量之不暇遍稱稱三十斤作一石亦古之制也日可稱千餘斤矣惟蝻與子不可一例同稱當以文公朱夫子之法為法也四宜廣置器具蝗之所畏服者火炮彩旗金鑼及掃帚栲栳筲箕之類鄉人一時不能備辦有司當為廣置給與各厰社長分發多人令其領用事畢歸繳庶不徒手倣徨此即工欲善其事必先利其器之意也五宜三里一厰為易蝗之所令忠厚溫飽社長社副司之執筆者一人協力者三人共勷其事出入有簿三日一報以憑稽察敢有冒破從重處分使捕蝗易米者無逺涉之苦無久待之嗟無擠踏之患六宜厚給工食凡社長社副執筆等人有弊者既當重罰無弊者豈可不賞或給冠帶或送門匾或免徭役隨其所欲而與之其任事之時社長社副執筆者共三人每日各給五升斛手二人協力者一人每日共給一斗分其髙下而令人樂趨七宜急償損壞因捕蝗蝻損壞人家禾稼田地既無所收當照畝數除其稅糧還其工本俱依成熟所收之數而償之先償其七餘三分看四邊田鄰所收而加足勿令久於怨望八宜淨米大錢凡換蝗蝻不得插和粞榖糠粃如或給銀照米價分發不許低昂如若散錢亦若銀例不許加入低薄小錢巡視官應不時訪察以辨公私九宜稽察用人社長社副等有弊無弊誠僞何如用鍾御史拾遺法以知之公平者立賞侵欺者立罰周流環視同於粥厰其弊自除十宜立參不職躬親民牧縱蟲殺人倪若水見誚於當時盧懷慎遺譏於後世飛蝗尚不能為之滅飢賊奚能使之除司道不揭督撫安存甚矣有司之不可怠於從事也謹案蝗之為害甚於水旱民之不能去盡者以無良法故也今以十所闡發蝗之生滅以十宜細說蝗之可除曷勿事之且古之聖王川澤有禁山野有官既不濫殺豈肯縱惡此即驅虎豹蛇龍之意也宋王荆公罷相鎮金陵是秋江左大蝗有無名子題詩賞心亭曰青苗免役兩妨農天下嗷嗷怨相公惟有蝗蟲感盛德又隨鈞斾過江東荆公一日餞客至亭上覽之不恱命左右物色之竟莫能得謹案古云瑞不虛呈必應聖哲妖不自作必候昏淫荆公恃才妄作天怒人怨乖戾之氣隨之而行勢所必有不思撲滅蝗蝻反欲捕捉詩人即或得之亦不過江左之詩人而能捕天下後世之詩人哉識見不逹新法可知怨者多矣錢穆甫為如臯令會嵗旱蝗大起而泰興令獨紿郡將云縣界無蝗已而蝗亦大起郡將詰之令辭窮乃言縣本無蝗蓋自如臯飛來仍檄如臯請嚴捕蝗無使侵鄰境穆甫得檄書其紙尾報之曰蝗蟲本是天灾實非縣令不才既是敝邑飛去却請貴縣押來未幾傳至郡下無不絶倒謹案二令皆可罷也當此飛蝗食稼困害良民之際不思自罪敬警格天一欲委罪於人一以批辭為戲則其平日之政必不善矣可受百里生民之寄乎賀德邵號戎菴湖廣荆門人為諸生時徒步入城路過麻城拾遺金二百兩留三日待其人來舉而還之後宰臨邑遇荒旱設法賑濟全活數萬人鄰境之蝗蝻雲湧而臨邑獨無人皆異之至今從祀不絶謹案仰不愧於天俯不怍於人始可為政賀君晝返遺金豈來暮夜此蝗蝻之所以不入其境也如以有為無除之不急其為害也不特傷稼且將食人寧獨蔽天而已哉明顧仲禮保定人幼孤事母至孝遇嵗凶負母就養他郡七年始歸時蝗蟲遍野食其田苗仲禮泣曰吾將何以為養母之資乎言未已狂風大起蝗蟲盡被吹散苗得不傷謹案人知官清則蝗不入其境不知人孝則風亦能吹之而散所以忠孝感神捷如桴鼓怨天尤人者徒自增其罪戾耳欽定四庫全書欽定康濟録卷四下之四社倉條約社倉論曰救荒之術賑濟貴乎速轉運貴乎近利賴貴乎恆久而不在乎一時之權宜若是乎社倉之不可不設也審矣但建之而不得其法或相强於未行之前或粉飾於舉行之際託非其人乾沒是患開發或濫浮冒正多推其意原本於鄉黨相賙而久且為閭里之擾纍豈非徒騖虛名而毫無實裨者乎用集文公之條約敢瀆司牧之聽聞果能倣佛前賢設施四境未饑者咸歌大有將饑者悉免倒懸能變通以善其用則紫陽復生而仁民之術溥矣崇安社倉記朱熹乾道戊子春夏之交建人大飢豫居崇安之開耀鄉知縣事諸葛侯廷瑞以書來屬豫及其鄉之耆艾左朝奉郎劉侯如愚曰民飢矣盍為勸豪民發藏粟下其直以賑之劉侯與豫奉書從事里人方幸以不飢俄而盜發浦城距境不二十里人情大震藏粟亦且竭劉侯與豫憂之不知所出則以書請於縣於府時徐公嚞知府事即日命有司以船粟六百斛沂溪以來劉侯與豫率鄉人行四十里受之黃亭步下歸籍民口大小仰食者若干人以率受粟民得遂無飢以死無不恱喜歡呼聲動旁邑於是浦城之盜無復隨和而束手就擒矣及秋又請於府曰山谷細民無蓋藏之積新陳未接雖樂嵗不免出倍稱之息貸食豪右而官粟積於無用之地後將紅腐不復可食願自今以往嵗一斂散既以紓民之急又得易新以藏俾願貸者出息什二又可以抑僥幸廣貯蓄不欲者勿强嵗或不幸小飢則弛半息大䘲則盡蠲之於以惠活鰥寡塞禍亂源甚大惠也請著為例王公報皆施行如章劉侯與豫又請曰粟若分貯民家於守視出納不便請倣古法為社倉以貯之於是為倉三亭一門牆守舍無一不具司會計董工役者貢士劉復劉得輿里人劉瑞也既成而劉侯之官江西幕府豫又請曰復與得輿皆有力於是倉而劉侯之子將仕郎琦嘗佐其父於此其族子右修職郎玶亦廉平有謀請得與并力府以豫言悉具書禮請焉四人者遂皆就事方且相與講求倉之利病且為條約豫惟成周之制縣都皆有委積以待凶荒而隋唐所謂社倉者亦近古之良法也今皆廢矣獨常平義倉尚有古法之遺意然皆藏於州縣所恩不過市井游惰輩至於深山長谷力穡逺輸之民則雖飢餓瀕死而不能及也又其為法太密使吏之避事畏法者視民之殍而不肻發往往全其封鐍遞相付授至或纍數十年不一訾省一旦甚不獲已然後發之則已化為浮埃聚壤而不可食矣夫以國家憂民之深其慮豈不及此然而未之有改者豈不以里社不能皆有可任之人欲一聽其所為則懼其計私以害公欲謹其出入同於官府則鈎校靡密上下相遁其害又必有甚於前所云者是以難之而弗暇耳今幸數公相繼其憂民慮逺之心皆出乎法令之外又皆不鄙吾人以為不足任故吾人得以及是數年之間左提右挈上說下教遂能為鄉閭立此無窮之計是豈吾力之獨能哉因書其本末如此刻之石以告後之君子云社倉條約一逐年十二月分委諸部社首保正副將舊保簿重行編排其間有停藏逃軍及作過無行止之人隱匿在內仰社首隊長覺察申報尉司追捉解縣根究其引至之家亦乞一例斷罪次年三月內將所排保簿赴鄉官交納鄉官㸃檢如有漏落及妄有增添一户一口不實即許人告審實申縣乞行根治如無欺弊即將其簿紐算人口指定米數大人若干小兒減半候支貸日將人户請米狀拖對批填監官依狀支散一逐年五月下旬新陳未接之際預於四月上旬申府乞依例給貸仍乞選差本縣清强官一貟人吏一名斗子一名前來與鄉官同共支貸一申府差官訖一面出榜排定日分分都支散先逺後近一日一都曉示人户産錢六百支以上及自有營運衣食不缺不得請貸各依日限具狀狀內開說大人小兒口數結保每十人結為一保遞相保委如保內逃亡之人同保均備取保十人以下不成保不支不陳龍正曰不成保不支將聽畸零窮民之餓乎如金華縣規附甲為妥正身赴倉請米仍仰社首保正副隊長大保長並各赴倉識認面目照對保簿如無僞冒重疊即與簽押保明其社首保正等人不保而掌主保明者聽其日監官同鄉官入倉據狀依次支散其保明不實别有情弊者許人告首隨事施行其餘即不得妄有邀阻如人户不願請貸亦不得妄有抑勒一收支米用淳熙七年十二月本府給到新漆黑官桶及官斗仰斗子依公平量其監官鄉官人從逐㕔止許兩人入中門其餘並在門外不得近前挨拶攙奪人户所請米斛如違許被擾人當㕔告覆重作施行一豐年如遇人户請貸官米即開兩倉存留一倉若遇飢歉則開第三倉専賑貸深山窮谷耕田之民庶幾豐荒賑貸有節一人户所貸官米至冬納還不得過十一月下旬先於十月上旬定日申府乞依例差官將帶吏斗前來公共受納兩平交量舊例每石收耗米二斗今更不收上件耗米又慮倉厫折閲無所從出每石量收三升准備折閲及支吏斗等人飯米其米正行附冊收支一申府差官訖即一面出榜排定日分分都交納先近後逺一日一都仰社首隊長告報保頭保頭告報各户遞相紏率造一色乾硬糙米具狀同保共為一狀未足不得交納如保內有人逃亡即同保均備納足赴倉交納監官鄉官吏斗等人至日赴倉受納不得妄有阻抑及過數多取其餘並依給米約束施行其收米人吏斗子要知首尾次年夏支貸日不可差換一收支米訖逐日轉上本縣所給印冊事畢日具總數申府縣照會一每遇支散交納日本縣差到人吏一名斗子一名社倉算交司一名倉子兩名每人日支飯米一斗約半月發遣裹足米二石共計米一十七石五斗又貼書一名貼斗一名各日支飯米一斗約半月發遣裹足米六斗共計四石二斗縣官人從七名鄉官人從共一十名每名日支飯米五升十日共計米八石五斗已上共計米三十石二斗一年收支兩次共用米六十石四斗逐年蓋墻并買藳薦修補倉厫約米九石通計米六十九石四斗陳龍正曰每人日支飯米一斗太多矣應減為一升五合另給酒菜銀數分上下均便張文嘉曰支收交納各有定限為日不多在鄉官士人知此義舉斷不計利至於吏人倉子安肯空勞每名支飯米一斗即寓相犒之意若減為一升五合又給酒菜之資不惟反多煩瑣抑恐不足服此輩之心其鄉官并僕從恐有貧薄者亦必須支米五升方足薪水之用固知朱子非過厚也又按朱子當日始創此事故須官府彈壓倘今舉行社倉則保簿赴官交納及申縣乞差吏斗諸事俱不必行止須支給司社及倉守效勞宣力諸人可也一排保式某里第某都社首某人今同本都大保長隊長編排到都內人口數下項甲户大人若干口小兒若干口居住地名某處或産户開說産錢若干或白烟耕田開店買賣土著外來係某年移來逐户開餘開右某等今編排到都內人户口數在前即無漏落及增添一户一口不實如招人户陳首甘伏解縣斷罪謹狀年月日大保長姓名隊長姓名保正副姓名社首姓名一請米狀式某都第某保隊長某人大保長某人下某處地名保頭某人等幾人今遞相保委就社倉借米每大人若干小兒減半候冬收日備乾硬糙米每石量收耗米三升前來送納保內一名走失事故保內人情願均備取足不敢有違謹狀年月日保頭姓名甲户姓名大保長姓名隊長姓名保長姓名社首姓名一社倉支貸交收米斛合係社首保正副告報隊長保長隊長保長告報人户如闕隊長許人户就社倉陳說告報社首依公差補如闕社首即申尉司定差一簿書鎖鑰鄉官公共分掌其大項收支須監官簽押其餘零碎出納即委鄉官公共掌管務要均平不得狥私容情别生奸弊一如遇豐年人户不願請貸至七八月而産户願請者聽一倉內屋宇什物仰守倉人常切照管不得毁損及借出他用如有損失鄉官㸃檢勒守倉人賠償如些小損壞逐時修整大段改造臨時具因依申府乞撥米斛宋陸九淵曰社倉固為農之利然農田常熟則其利可久苟非常熟之田一遇歉嵗則有散而無斂來嵗缺種糧時乃無以賑之莫若兼置平糶一倉使無貴賤之患折所糴為二每存其一以備歉嵗代社倉之匱實為長利也舊說青苗者田未熟而貸之錢田已熟而收其利安石嘗行此於一邑甚善然猶躬通下情隨其願與不願也至當國時欲以此行之天下而守令者又阿重臣意㫖以多散錢多得利為稱職不問貧富緩急强與之又寄權人役出納之際輕重為奸而民遂怨咨載道矣謹案社倉之建至凶嵗而益見其妙若聽民之願與不願而議建十不得一矣何也小民以他人之物而為一己之所有則恆喜以一己之需而為公家之所存則多惡此必然之勢也如懼其惡而不令建張詠命去茶植桑不嘗致惡於四境乎其後何以復為其所喜等而上之魯人之歌孔子鄭人之歌子産皆彰彰可驗也是彼一時之喜惡何足以惑吾永逺之深仁哉欽定康濟録卷四下之四
