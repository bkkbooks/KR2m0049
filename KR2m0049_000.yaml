  text: 欽定四庫全書史部十三康濟録政書類三邦計之屬
  hash: sha256:7f995b40479348f7d718d3d842f00dd79bbfd4b21a77e09935986c26d6e89118
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0049_WYG_000-1a, image: WYG0663/WYG0663-0223a.png}
body:
  text: 提要臣等謹案康濟録六卷乾隆四年御定初仁和監生陸曽禹作救飢譜吏科給事中倪國璉為檢擇精要釐為四卷會詔翰林科道輪奏經史講義國璉因恭録進呈皇上嘉其有禆於實用命內直諸臣刪潤其詞剞劂頒布因賜今名其書凡分四門二曰前代救援之典所録故實上起唐虞下迄元明按朝代先後編次二曰先事之政分子目六三曰臨事之政分子目二十四曰事後之政分子目五又附録者四事皆先引古事後系論斷案金穰木飢天道恆然堯水湯旱聖朝不免其挽回氣數則在於人事之修舉周禮荒政十有二多主於省事以節財蓋預備之道已散見于各職故也我皇上宵衣旰食軫念民依或嵗星偶沴禾麥不登賜蠲貸者動輒數十百萬賜賑恤者亦動輒數十百萬即遇貪墨敗度借極災以蝕帑者尚恐封疆大吏因噎廢餐杜侵冒之風或靳撫綏之費綸音宣諭至冉至三含識之倫罔弗共喻仁宏博濟實邁唐虞是以國璉是編特邀睿賞臣等校録之下仰見勤求民瘼之心與俯察邇言之意均回軼千古也乾隆四十九年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書史部十三欽定康濟録政書類三邦計之屬吏科給事中臣倪國璉謹奏為進呈書籍事仰惟我皇上軫念民瘼仁恩周浹遇各省偶有歉收隨即多方補救蠲賑備施不惜宵旰之勤勞以謀斯民之安飽然猶聖不自聖安益求安旱潦未形疇咨早切視民如傷之懷有加無己建極錫福之道曲成不遺凡屬內外大小臣工孰不思罄竭愚忱以仰佐聖治於萬一者臣黍居言職輪該進書因見同鄉已故錢塘縣監生臣陸曾禹所集救飢譜一書未經刋刻其書每條前列經史後加論説與今所進經史之體無異是以不揣愚昧録其大要共為四卷恭呈睿覽雖書中所列條目總不出聖政之範圍然其編輯詳明似尚有可取者伏惟聖慈垂鑒俯採芻蕘之一得宥其草野之蠢愚臣曷勝惶悚待命之至謹奏乾隆四年十月二十日奉上諭吏科給事中倪國璉奏進救飢譜四卷猶有鄭俠繪圖入告之遺意甚屬可嘉著南書房翰林詳加校對略為刪潤命名曰康濟録交與武英殿刋刻頒發倪國璉著賞賜表裏各二匹以示奬豫欽此乾隆五年閏六月十四日奉旨開列經理諸臣銜名監理和碩和親王臣𢎞晝總閲字位過密無法顯示臣鄂爾泰字位過密無法顯示臣張廷玉經筵講官太子太保東閣大學士兼禮部尚書臣徐本南書房校對吏部右侍郎世襲一等輕車都尉臣蔣溥經筵講官户部右侍郎臣梁詩正內閣學士兼禮部侍郎臣汪由敦日講官起居注詹事府詹事臣鄂容安日講官起居注翰林院侍讀學士世襲三等伯臣張若靄日講官起居注翰林院侍讀臣彭啓豐日講官起居注翰林院侍講臣介福翰林院修撰臣金德瑛翰林院編修臣秦蕙田翰林院修撰臣莊有恭武英殿校對經筵講官刑部右侍郎臣張照工部右侍郎臣許希孔原任刑部左侍郎臣勵宗萬日講官起居注詹事府詹事兼翰林院侍讀學士臣陳浩日講官起居注詹事府少詹事兼翰林院侍講學士臣吕熾日講官起居注詹事府少詹事兼翰林院侍講學士臣周學健署日講官起居注右春坊右中允兼翰林院編修臣朱良裘翰林院編修臣田志勤翰林院編修臣董邦逹翰林院檢討臣唐進賢翰林院編修臣李清芳翰林院檢討臣郭肇鐄校刋拔貢生臣費應泰拔貢生臣盧明楷拔貢生臣薛世楫拔貢生臣廖名揚拔貢生臣徐顯烈拔貢生臣王積光優貢生臣王男恩貢生臣曾尚渭拔貢生臣李長發拔貢生臣程元林監造內務府南苑郎中兼佐領加六級紀録八次臣雅爾岱內務府錢糧衙門郎中兼佐領加五級紀録六次臣永保內務府廣儲司員外郎加二級臣雙玉內務府慶豐司員外郎加一級紀録二次臣西寧內務府廣儲司司庫加二級臣胡三格監造臣恩克監造加一級臣永忠庫掌臣于保柱庫掌臣鄭桑格庫掌臣姚文彬欽定四庫全書欽定康濟録總目第一卷前代救援之典第二卷先事之政目六一教農桑以免凍餒三建社倉以使賑貸二講水利以備旱潦四嚴保甲以革姦頑五奏截留以資急用六稽常平以杜侵欺第三卷臨事之政目二十一急祈禱以回天意三命條陳以開言路二求才能以捍災傷四先審户以防冒恩五借國帑以廣糴糶七禁遏糴以除不義六理囚繫以釋含寃八發積儲以救窮困九不抑價以招商運安流民以免顛沛十開粥厰以活垂危勸富豪以助濟施乞蠲賑以紓羣黎育嬰兒以慈孤幼興工作以食餓夫視存亡以惠急需弭盜賊以息姦宄撲蝗蝻以保稼穡甘專擅以奮救援貸牛種以急耕耘第四卷事後之政目六一贖難賣以全骨肉三必賞罰以風繼起二憐初泰以大撫綏四籌匱乏以防薦飢五尚節儉以裕衣食六敦風俗以享太平附録摘要備觀社倉條約賑粥須知捕蝗必覽欽定四庫全書欽定康濟録卷之一前代救援之典總敘聖賢之治天下豈不欲斯民含哺鼓腹日遊于太和之世哉無如水旱之災堯湯不免使無良䇿以處之致民有飢餒之憂流離之患如保之懷肯恝然乎於是以不忍人之心行不忍人之政荒政從之而出矣是政也非譜而何夫古有治譜欲其前後相師以修其政令何獨至于救飢而不以前人為譜哉爰集聖賢之言行已昭救濟之謀猷者或總列於前或分陳於後果能倣而行之惠我元元如登大有是譜也不猶有腳之陽春力可回天者耶常目在焉蒼生幸矣唐堯之為君也存心於天下加志於窮民一民飢曰我飢之也一民寒曰我寒之也一民有罪曰我陷之也百姓戴之如日月親之如父母謹案三稱我字是聖人以全副精神注之一肩任來之意四海雖大若以我之為君有一民為飢寒所困而陷於法網者非我之教養有虧歟故朝乾夕惕澤潤生民舉天地間盡在春風和氣中也虞舜彈五絃之琴歌曰南風之薰兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮謹案大舜認定民是吾之民慍必為之解財必為之阜方遂其惠養元元之意肯令凶年飢嵗流離失所而不急為軫恤哉商湯因旱禱於桑林以六事自責曰政不節歟民失職歟宫室崇歟婦謁盛歟苞苴行歟讒夫昌歟何以不雨而至斯極也言未已大雨方數千里謹案湯在位三十祀而遇大旱之年共有七民無菜色者要非無備而能然也禱之尚如是之切上蒼有不為之感動哉是六事之責不可少而九年之蓄尤不可缺也周武王立重泉之戍令曰民有百鼓之粟者不行民舉所最粟以避重泉之戍而國榖二十倍最聚也謹案榖不足不足以救飢令不嚴不足以懼民嚴令積榖聖王權變之道也即豫備不虞之典也尚父不云乎敬勝怠者吉怠勝敬者凶安不忘危敬勝之事也故雖禾黍油油必令倉箱盈足誠以豐年多蓄則飢饉可無虞耳周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依注云魚無水則死木無土則枯民非稼穡則無以生也四民之事莫勞於稼穡生民之功莫盛於稼穡周公發無逸之訓以戒成王懼其知逸而不知無逸也豈獨成王之所當知哉實千萬世人主之準則也孔子自魯適齊時齊旱飢景公問曰如之何對曰凶年力役不興馳道不修祈以玉帛祀以下牲此賢君自貶以救民之禮也謹案時當飢饉若不節一人之用度救萬姓之流離天命民碞之際豈不大可畏耶故夫子以此告之使景公急以救民為事也易經益卦象曰益損上益下民説無疆自上下下其道大光大全云恩由上究非僅一切轉移之術始為益之名者也要在制民常産之外若山林川澤之利損以與民貨稅田租之類量加蠲免如是益下而民有不欣欣然盡發愛戴之心者歟書經帝曰棄黎民阻飢汝后稷播時百榖謹案舜之民曷嘗阻於飢哉然舜以黎民非百榖不能生其身非后稷莫能教其耕故必諄諄戒勉益見聖主賢臣安不忘危豫備不虞之意耳詩經大雅倬彼雲漢昭回于天王曰於乎何辜今之人天降喪亂飢饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽又曰靡人不周無不能止宋董煟曰靡神不舉靡愛斯牲説謂慰安人心然山川禱祀從古有之亦見古人憂畏之切至七章言靡人不周無不能止非當時有實惠及于民安能如是春秋魯僖公二年冬十月不雨三年春王正月不雨夏四月不雨僖公憂閔元服避舍躬節儉絀女謁輟樂休工釋更徭之逋罷軍冦之誅去苛刻慘毒之政所蠲浮令四十五事放讒佞郭都之等十三人誅領人之吏受貨賂趙侃等九人率羣臣禱于山川天即為之大雨謹案天以水旱困人正欲長民者之惠愛蒼生耳茍能遇災而懼恤民之瘼更新善政天將消其災而錫之福矣從古天人相感之理如響應聲夫豈獨僖公一事哉禮記王制云國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有凶旱水溢民無菜色然後天子食日舉以樂謹案無三年之蓄尚非其國後之各省其所蓄不知有幾隋唐行之而有效紫陽施之而見功者社倉也庶幾乎其得之歟夫粟既積之於京師復遍之於天下倉箱足而積貯豐小民將擊壤而歌矣聖人所以能樂民之樂也周禮大司徒以荒政十二聚萬民一曰散財貸種食也二曰薄征輕賦稅也三曰緩刑省刑罰也四曰弛力息徭役也五曰舍禁山澤無禁也六曰去幾去關防之幾察使百貨流通七曰眚禮殺吉禮也八曰殺哀節凶禮也九曰蕃樂謂閉藏樂器而不作十曰多昏多昏配則男女得以相保十一曰索鬼神求廢祀而修之也十二曰除盜賊安良民也大司徒以保息六養萬民一曰慈幼二曰養老三曰振窮四曰恤貧五曰寬疾六曰安富謹案語云三代而上有荒嵗而無荒民其所以無荒民者必上之人有以豫備故也即富者尚欲安之況老幼貧窮疾病之類有不在其懷保之中耶嗟夫政之不可偏廢如人身之脈絡不可一經不治致令其受病也世之為政者果能視此而無愧焉康阜之休旁敷四海矣榖梁傳一榖不升謂之嗛二榖不升謂之飢三榖不升謂之饉四榖不升謂之荒五榖不升謂之大祲大祲之禮君食不兼味臺榭不塗弛候廷道不除百官布而不制鬼神禱而不祀嗛同歉不滿之意也明邱濬曰君食不兼味以下即周禮膳夫所謂大荒則不舉者也譬如父母焉其子不哺而已乃日餘膏粱于心安乎齊糴賤桓公恐五榖之歸于諸侯欲為百姓藏之問於管子管子曰今者夷吾過市有新成囷京者二家君請式璧而聘之桓公從之民爭為囷京以藏榖謹案桓公之慮固深管子之智更美倘不賞一二人以風衆人其誰我從此所謂藏富于民而君不致獨貧者也曷嘗盡斂于太倉之內哉夫國無三年之蓄者國非其國然則交相致益而後富強可甲于天下周惠王十七年十二月衛文公立公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘謹案治國不可以縱欲守位貴從乎民好膺民社者治本是圖躬行節儉則恩膏沛于萬姓菽粟足于倉箱矣懿公好鶴而文公能勤民布政不數年間國以富厚民用和輯人主好惡之間不可不慎也如此周敬王四十年夏五月熒惑守心宿名心宋之分野也景公憂之司星子韋曰可移于相公曰相吾之股肱曰可移于民公曰君者待民曰可移于嵗公曰嵗飢民困吾誰為君子韋曰天髙聽卑君有君人之言三熒惑宜有動於是候之果徙三度謹案觀景公之言蓋不專為一身而憂之矣相是股肱民為邦本此數語何嘗有意格天而天則為之格矣可見天人感應之理原在乎呼吸間子韋知其理而候之果徙三度仁哉景公智哉子韋也魏文侯時租賦增倍于常或有賀者文侯曰今户口不加而租賦嵗倍此由課多也譬如冶焉令大則薄令小則厚治人亦如之夫貪其賦稅不愛民人是虞人反裘而負薪也徒惜其毛不知皮盡而毛安所附是兩匱之勢也謹案理勢明則言辭逹文侯之論增賦不事支流旁幹直能探本窮源賀者應慚偽者應懼君子知此民困必蘇非社稷之福哉李悝為魏文侯作平糴法曰糴甚貴則傷民甚賤則傷農若民傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使民無傷而農益勸故大熟則上糴三而舍一中熟糴二下熟糴一使民適足價平而止小飢則發小熟之斂中飢則發中熟之斂大飢則發大熟之斂以糶于民故雖遇水旱飢饉糴不貴而民不散行之魏國日益富強謹案收糴于豐熟之時出糶于荒歉之日務必平價而止民農皆不令傷非法之出于萬全耶有何水旱之足慮嘉謀若此食祿何慚在位者鑒此類推廣其仁術不負敦本愛民之君子矣漢文帝二月詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨困窮之人或阽于危亡而莫之省憂為民父母將何如其議所以賑貸之謹案文帝以草木羣生之樂其樂因念吾民窮困之顛連廣其仁術賑貸並行是陽春之所不及者文帝得而及之矣否則枯木有時暢茂窮簷赤子樂嵗終身苦是草木之弗若不亦深可歎乎撫黎元者能觸景念民勿忘先王對時育物之懷則太和元氣長流行于宇宙中矣文帝癸酉十二年眺錯上言曰夫人情一日不再食則飢終嵗不製衣則寒夫腹飢不得食膚寒不得衣雖慈父不能保其子君安能以有其民哉是故明君貴五榖而賤金玉方今之務莫若使民務農而已欲民務農在于貴粟貴粟之道在于使民以粟為賞罰今募天下之人入粟于邊以受爵免罪不過三嵗塞下之粟必多矣帝從之令民入粟于邊拜爵各以多少級數為差謹案自古以民飢而擾天下者不一而足未聞無珠玉而擾其國者也錯勸其君賤珠玉寶五榖足國之本務其在是乎所以稱智囊也景帝後元二年夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女工者也農事傷則飢之本女工害則寒之原也夫飢寒並至而能亡為非者寡矣今嵗或不登民食頗寡其咎安在或詐偽為吏吏以貨賂為市漁奪百姓侵牟萬民其令二千石各修其職不事官職耗亂者丞相以聞請其罪謹案此詔專重農桑委其責于太守政治之方莫若此矣况又令丞相不時奏聞此大法小亷民安物阜周之成康漢之文景皆以賢君稱也武帝時董仲舒對策曰郡守縣令民之師帥所以承流而宣化也師帥不賢則主德不宣恩澤不流是以隂陽錯繆氛氣充塞羣生寡遂黎民未濟也謹案仲舒以承流宣化責成郡守縣令此真握要之言大吏貴而不切散官踈而無權惟府縣官有守土之專政令聲教易與相通末俗頺風力能振作劉向素稱董仲舒有王佐之才者以其論事切中機要而立意本于正大也武帝征和四年四月以趙過為搜粟都尉過教民為代田一畝三畎畎者田中之溝也廣一尺深一尺嵗代處代易也嵗易其處故曰代田每耨輒附根根深耐風與旱其耕耘田器皆有便巧用力少而得榖多民皆便之謹案詩云誕后稷之穡有相之道從古教稼任地各有便宜以盡輔相裁成之責武帝為民治農事必使良才賢牧講求于隴畝之間以人工代天巧神明變化總期便民而不敢逸于圖治休哉盛業其漢治之隆歟光武帝建武二十五年冬十月監軍謁者宋均見蠻方飢餒困厄均與諸將議曰夫忠臣出境有可以安國家者專之可也乃矯制告諭羣蠻而降之蠻地遂平均未至先自劾矯制之罪上嘉其功迎賜以金帛謹案天災可畏飢遍蠻方設或再加困鬭血刃者固多僵仆者要亦不少豈好生之心哉監軍矯制而諭之降既得上國之體且服小醜之心以仁布德以智全仁宜乎上之奬賞矣後之銜命閫外者其將以此為法乎明帝永平三年大起北宫時天大旱尚書僕射鍾離意謁闕免冠上疏曰昔成湯遭旱以六事自責切見北宫大作民失農時自古非苦宫室小狹但患民不安寧宜且罷止以應天心上即時罷之遂應時澍雨謹案蒼蒼者天耶孰謂理居元渺一時無以格之哉當時勞民傷財人心不安而天意示警僕射免冠切諫上即罷役時雨降而禾稼生可見風雨之調和原在人心之喜豫蓋心和而氣和氣和而隂陽交泰矣王政本符乎情理天心總寄于民心信哉和帝永元五年遣使分行三十餘郡凡貧民之不能自食者悉開倉賑給謹案和帝年十四五能恤貧民能除竇憲亦云賢矣苐天性聰明不如聖學日躋深邃孰謂師保翼助之功迂闊而不可近哉安帝時皇太后鄧氏每聞民飢或逹旦不寐躬自減徹以救災危故雖有水旱交侵宇內復寧嵗仍豐稔是勤政之效也謹案民不賴君何能活于凶嵗君不得民何以享其太平此君民一體之意也假如手足有病而心腹獨能舒泰乎皇太后逹旦不寐以救飢民世稱賢后良有以也桓帝永夀三年春或上言民之貧困以貨雜錢薄宜改鑄大錢事下四府羣僚及太學能言之士議之太學生劉陶上議曰當今之憂不在于貨在乎民飢竊見比年以來良苖盡于蝗螟之口杼軸空于公私之求民所患者豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石化為和玉使百姓渴無所飲飢無所食雖羲皇之純德唐虞之文明猶不能以保蕭墻之內也蓋民可百年無貨不可一朝有飢故食為至急也謹案古之帝王每求直言時開言路民情得以上逹使閭閻疾苦無時不昭揭于九重是以政令所布深愜民懷惠澤所流且周百世而嘉謀嘉猷并藉以垂光于千載耳吳孫權赤烏三年民飢詔遣使開倉廩賑貧者謹案國之賴民猶魚之藉水魚無水則不生國無民則難與治三國之主強半稱雄肯置其蒼生于溝壑哉但遣使之中又貴擇人必得公平亷幹精明寬厚之臣而後可蓋百萬生民之命懸于一人之手豈云細事細閲其史一無所貶亦曰知人北魏髙宗和平四年十月以定相二州霣霜殺稼免民田租承明元年八月以長安二蠶多死免民賦之半謹案稼與蠶小民養生之本也茍於此而無所得衣食已虧催科再急不迫人于盜藪也鮮矣今魏不特因霜害稼而免其田租且緣蠶息無收而蠲其半賦恩何溥也仁哉斯制矣髙祖太和二十年以久旱自癸未不食至於乙酉羣臣皆詣中書省請見髙祖在崇虛樓遣舍人辭焉且問來故豫州刺史王肅對曰今四郊雨已沾洽獨京城微少庶民未乏一餐而陛下輟膳三日臣下惶惶無復情地髙祖使舍人應之曰朕不食數日猶無所感比來中外貴賤皆言四郊有雨朕疑其欲相寬免未必有實方將遣使視之果如其言即當進膳如其不然朕何以生為當以身為萬民塞咎耳是夕大雨謹案君心即是天心君能以萬民為心天未有不以一人為念者也民未飢而君已飢天肯負愛民之君乎此魏髙祖輟膳三日而時雨降可見感通之理原在君心君之愛民正所以愛身天之愛君原欲其愛民天也君也民也分之則有三合之則一體理本相通道無二致敬天勤民者所當三復斯旨城陽王徽為并州刺史先是州界夏霜禾稼不熟民庶逃散安業者少徽輒開倉賑之文武共諫止徽曰昔汲長孺郡守爾尚輒開倉賑救民災况我皇家親近受委大藩豈可拘法而不救民困也先給後表孝明嘉之加安北將軍謹案皮之不存毛將安附備位大藩而不知為朝廷旬宣布化子惠黎元忝厥職也甚矣觀安北將軍之明斷先給後表一轉移間深合古名臣愛護百姓之至意後之君子可勿鑒諸宋文帝元嘉十二年吳郡大水錢唐升米三百以揚州治中從事史沈演之兼散騎常侍巡行拯恤許以便宜從事演之開倉廩賑飢民凡有生子者口賜米一斗刑獄有疑枉者悉判遣之百姓蒙賴謹案美哉元嘉之政可見稱于天下後世者蓋由飢饉之年令臣便宜從事無一人之不被其澤也民當枵腹離散之際誰不思邀惠于朝廷以生其骨月倘巡行拯恤者惠此而失彼有始而無終民受虛名仍無實濟何煩此使為哉演之得便宜之權免掣肘之患小者不遺于黃口壯者可釋于囹圄尚有淚如淫雨並垂于空釡鶉衣之上歟古云上有便宜之令下無專擅之臣信哉此言也唐元宗開元十五年八月制曰河北州縣水災尤甚言念蒸民何以自給朕當寧興思有勞旰昃在豫之責用軫于懷宜令所司量支東都租米二十萬石賑給二十二年十一月敕曰百姓屢空朕孰與足言念于此良所疚懷又聞京畿及關輔有損田百姓等屬頻年不稔久乏糧儲雖今嵗薄收未免辛苦宜從蠲省勿用虛弊至如州縣不急之務差科徭役并積久欠負等一切並停其今年租八等已下特宜放免地稅受田一頃已下者亦宜放免謹案開元之政大有可觀即此二詔憂勤寬大之意露于言表此時也官廷肅穆輔理承化者多稱賢佐是以有災即得上聞遇荒即行補救委曲詳盡有實惠而無虛名總之賤貨尊賢去蔽去吝四者古昔聖賢所為翼翼小心守之而勿失者也豈獨為荒政云爾哉實萬世致治之常道也郭子儀因河中軍士常苦乏食乃自耕荒田百畝將校以是為差於是士卒皆不勸而耕是嵗河中野無曠土軍有餘糧謹案羊祜鎮襄陽墾田八百餘頃祜之始至也軍無隔日之糧及至季年有十年之積汾陽之在河中身體而力行之上不致吾君憂國帑之無輸下不苦吾民有助餉之拮據一事舉而愛及于君民非賢將而能若是乎德宗賑給種子詔春陽布和萬物暢茂實兆庶樂生之日農夫致力之時今兹吾人則異于是迫以荒饉愁怨無憀有離去井疆業于庸保有乞丐途路困于死亡鄉閭依然煙火斷絶種餉既乏農耕不興若東作愆期西成何望為人父母得不省憂雖國計猶虛公儲未贍濟人之急寧俟盈豐罄其有無庶拯艱厄京兆府百姓並宜賜種子二萬石同華州各賜三千石陜虢兩州賜四千石委州長吏即與度支計會請受差公清仁恤之吏與縣令親至村閭隨便給付仍加勸課勿失農時應諸倉所有逺年粟麥宜令節度更分二萬石京兆尹即差官逐便搬載賑賜貧人先盡鰥寡孤惸目下不濟者務令均給全活流庸謹案制云東作愆時西成何望知此而有不錫之以種乎於是流離者可以歸鄉倣徨者可以止懼窮民而無告者可以生全雖曰衰草荒田不日而見青禾之盈目矣德宗時諸州大水陸贄請賑帝曰淮西缺賦不宜賑贄曰寧人負我無我負人謹案陸贄精白一心忠誠愛國凡所敷陳總以布逹君上鴻恩體恤閭閻窮困為主所為行益道以事君者也故稱千古名臣之最憲宗元和間南方旱飢遣使賑恤將行憲宗戒之曰朕宫中用帛一匹皆計其數惟賑恤百姓則不計所費卿輩當體此意謹案憲宗儉于宫中而厚于百姓且欲令羣臣悉體此意仁哉聖心抑何自奉亷而施恩溥也從古奢靡之主恩賞雖濫而于百姓無關由其內蔽于欲而於兆庶始屯其膏耳是故致治之道先以清靜根本之地為主文宗開成四年七月丙午滄景節度使劉約奏請義倉粟賑遭水百姓詔曰本置義倉只防水旱先給後奏敇有明文劉約所奏已為遲晚宜速賑恤謹案文宗實乃精勵求治之主所以聞百姓之災傷咎節度之不能先給耳後之良有司蓋深明乎救災拯患之不可少緩所以干擅發廪之愆不避同事之譏一切為己利身之想毫忽不介于心一朝出粟億兆得生其慈仁智勇詎不足以昭示後人也耶後周太祖廣順三年春正月或言營田有肥磽者不若鬻之可得錢數十萬緡以資國用周太祖曰利在民猶在國也朕用此錢何為於是罷户部營田務除租牛課謹案惠在一時名垂千載于周太祖見之矣彼時若鬻田與民斂錢在國國亦未必因是而強而已非損上益下之誼是故牧民者貴知立國之本圖而不必斤斤焉講求于功利則善矣世宗顯德五年遣使均定境內田租世宗留心農事常刻木為農夫田器蠶婦等置之殿廷欲均田面租稅先以元貞均田圖賜諸道至是詔散騎常侍艾頴等三十四人分行諸州均定田租謹案世宗非五代之聖主耶明逹不下于唐太宗愛養仿佛乎漢文帝殿廷刻木而重農桑諸道頒圖而均田賦在上者知儲蓄之當先得安不忘危之要道在下者明耕耘之宜急有未雨綢繆之至計非仁政歟顯德六年淮南飢世宗令以米貸之或曰民貧恐不能償世宗曰民猶子也安有子倒懸而父母不為解者安在其必償也謹案世宗以仁愛之心發而為矜民之語大哉王言被之當時而恩意浹于人心垂之簡册而仁政昭于後世君民一體之理深切而著明矣願致治者之日鑒在兹也宋太祖乾德元年四月詔諸州長吏視民田之旱甚者蠲其租不俟報宋董煟曰民之災傷至易曉也今州縣或遇水旱兩次差官檢覆使生民先被騷擾之苦然後量減租數幾不償所費矣宜以乾德之詔為法真宗咸平二年春閏三月求直言轉運副使朱台符上言略曰陛下踐祚以來彗星一見時雨再愆彗星見者兵之象也時雨愆者澤未流也宜重農以積粟簡卒以省費專將帥之任以安邊慎守令之選以惠民捨此數事雖有智者不能為計矣謹案治天下者果能以朱台符之言而力行之立見清寧太平可奏故為政而得其要者若煙微而火熾氷渙而水通無往而不得民安物阜之盛也張詠知益州以蜀地素狹遊手者衆事寧之後生齒日繁稍遇水旱民必艱食時斗粟值錢三十六乃按諸邑田稅如其價嵗折米六萬斛至春籍城中細民計口給劵俾如原價糴之奏為永制其後七十餘年雖有災饉米甚貴而民無餒色謹案收榖粟代銀錢至春仍依原價糶與窮民此權宜通變之至計也要其心無刻不以蒼生為念故能隨時處置各適乎事勢之當然而民舉受其實惠耳自詠守蜀而朝廷無西顧憂誠哉是言矣祥符六年秋七月知濵州吕夷簡請免稅河北農器帝曰務穡勸農古之道也豈獨河北哉詔諸路並除之發明云治國之道莫大于革弊政而恤民瘼真宗禁內臣干預公事除農器稅皆治國之善政也仁宗天聖七年六月河北大水壞澶州浮橋七月命三司刑部郎中鍾離瑾為河北安撫使仍詔瑾所至發官廩以賑貧乏其被溺之家見存三口者給錢二千不及者半之溺死而不能收斂者官為瘞埋其經水倉庫營壁亟修完之卑下者徙髙阜處水損官物先為給遺坊監亡失官馬者更不加罪止令根究所部官吏貪暴不能存恤者奏劾之見繫獄囚委長吏從輕決遣其偹邊事機民間疾苦悉具經畫以間宋董煟曰祖宗救災非特旱傷禱祈蠲減而已有水旱卒然而至漂蕩民廬浸濕官廩其賑恤經營之方尤為詳悉真可端拜為矜式也仁宗慶歷元年十一月以京師榖價踴貴發廩一百萬石減價出糶以濟民謹案減價出糶其法最善在官無損在民有益但所發不多如以杯水救車薪之火又何益哉今以百萬石濟之不重米而重民知米由民出得反本還原之道窮民得食歡呼有不格上蒼而召和氣致豐年哉仁宗每見天下有奏災傷州郡必加存恤嘉祐中河北蝗潦時霸州汶水縣不依編敕告示災傷百姓狀訴及本州不以時差官檢視轉運以為言上曰朝廷之政寄於郡縣郡縣之政寄於守令守宰之官最為親民民無災傷尚當存恤况有災傷而不為受理豈有心於恤民乎自判官知縣司户主簿罰銅各有差等上謂左右曰所以必行罰者欲使天下官吏知朝廷恤民之意謹案昔人云諒輔為五官掾大旱禱雨不獲積薪自焚火發而雨大至戴封在西華亦然古之良吏為民心切竟至於此今霸州諸吏蠧國病民惟銅是罰當時朝廷雖寬其責千載而下議者孰肯恕其草菅民命之愆乎文彥博在成都米價騰貴因就各城門相近之寺院共十八處減價糶米仍不限其數張榜通衢翌日米價遂減謹案飢年富家藏米待價故爾踴貴今官米減價出糶自不得不爭先出米而賤賣然非循環糴糶彼知官米有限仍弗賤也吳遵路既俵米與民又令採芻薪出官錢收買向常平倉糴米歸養老稚計買柴共二十二萬束比至嚴冬雨雪市無柴薪即依原價令其買去發賣官不傷財民再獲利謹案出官錢收柴草既不令彼苦于難賣寒冬仍令販去又得趂錢一小事而令民兩番獲利非救荒之竒䇿而何齊州飢河北流民道齊境不絶眺補之請粟于朝得萬斛為流者給舍次具器用人既集則日給廩粥藥物躬臨治之凡活數千人擇髙原以葬無主者男女異墟使者頗妬其功欲有以撓之既至境按事乃更歎服明陳龍正曰男女異墟禮行于亡魂矣心之精微至此此使者見而感服蓋仁政之動人有以化其偏私而發其天良也蘇耆陜西轉運司景祐中洛陽大旱榖貴百姓飢殍東京轉運司亦無以為賑洛陽留守移書求耆粟二十萬斛遂移文陜府如數與之仍奏于朝時同職謂耆曰陜西沿邊之地屯軍甚多若有餘止可移之以實邊郡奈何移之别路耆曰天災流行春秋有恤鄰之義生民皆繫于君無內外之别奈何知其垂亡而不以竒贏賑恤耶苟有饋運耆當自謀必不以此相纍朝廷甚嘉之謹案民之竟日而不可無者食也至數日則死矣手握生民之權坐視而不救仁者當如是乎蘇耆深明春秋之義寧甘自罪不纍同僚識力擔當獨超千古豈庸愚之有司所可及哉許元知丹陽縣縣有練湖決水一寸為漕渠一尺故法盜決湖者罪比殺人會嵗大旱元請借湖水溉田不待報決之州守遣吏按問元曰便民罪令可也溉民田萬餘頃嵗乃大豐謹案民可救而恩未逮心雖切而事不奮雖有仁心而不繼以仁政終未有以溥朝廷之德澤也許尹決水溉田寧甘自罪有猷有為非良牧而何神宗熙寧七年夏四月大旱帝語翰林承旨韓維曰天久不雨朕日夜焦勞奈何維對曰陛下憂閔旱災損膳避殿此乃舉行故事恐不足以應天變當痛自責己廣求直言因上疏極言青苖及開邊之弊會鄭俠繪所見為圖上之於帝閲後竟夕不寢遂慨然行之詔出人情大恱是日果大雨逺近沾洽謹案昔范鎮云水旱之作由民生不足憂愁無聊之歎上薄天地之和耳故新法一罷民心恱而天道應時雨立沛凡君臨天下者可不以民情而感通天意耶吳越大旱時趙抃知越州當民之未飢為書問屬縣災所被者有幾鄉當廩於官者有幾何溝防興築可僦民使治之者有幾所庫錢倉米可發者有幾許富家可募出粟者有幾姓僧道士所食之羡餘書於籍者其幾有存使各書以對而謹其備時得粟四萬八千餘石自十月朔人日給粟一升幼小者半之憂其相蹂也使男女異日受粟人受兩日之糧憂其流亡也城市鄉村立給粟之所共五十七處使各以便而受之告富人無得閉糴又出官米平價而糶糶所共一十八鋪使糴者便於受粟給工食大修城池病者醫死者埋收棄兒廩窮人至五月而止事有未便者公一以自任不以纍其屬有上請者或便宜輒行事無巨細必躬親之民賴以生舊評云其施雖在于越中其仁足以示天下其事雖行於一時其法足以傳後世災沴之行治世不能使之無而能為之備民病而後圖之與夫先事而為之計者則有間矣不習而有為與夫素得之者則有間矣故采於越得所施行樂為之識徐寧孫賑濟飢人其策有三第一策本州縣當職官盡實抄劄果係孤老殘疾并貧乏不能自食者大人小兒籍定姓名數目將義倉米逐鄉逐鎮逐坊逐巷分散賑濟處處請鄉官或士人各三人如無上户士人處則請耆老忠厚者置册收支給散關子每五日一次併而給之大人日給一升小兒減半凡州縣市鎮鄉村並令同日同時支散以革重疊冒請之弊乞丐等人亦同日同時别作一處支米不得滚入飢民賑給第二策糶賣米麥本濟窮民奈有在市牙儈與有力滑徒令匪人假為窮民裝飾冒糴冒支且又串同斛手單賣與姦詭相知之輩不及村落無食之民即有糴得窮民已是將畢之際強半粞榖粳粃弊竇無窮逐令本州縣立賞錢一百貫令人舉首務要及於鄉民無許冒濫其第三䇿賑濟當支散日用五色旗分為五處每處分差指使二員吏二名抄劄飢民每一名給與牌子并小色旗候支散及數前來賑濟散了一旗再散一旗不許亂赴請所蓋事貴循序不得併在一處挨擠喧閙謹案此三策皆救荒之要則缺一不可不然飢民不得實惠者有之猾吏姦民而倍得者有之因賑給而擠踏至死者有之􅍄此則人事既多克全何患天災之忽降也元祐初河東京東淮南災傷監察御史上官均言賑恤有五術一曰施與得實二曰移粟就民三曰隨厚薄施散四曰擇用官吏五曰告諭免納夏秋二稅上嘉納之謹案五事得行民在堯湯之世矣雖災而不受災之害非蒼生之幸歟不知蒼生之幸即國家之福不可二視蘇軾知杭州時值大旱飢疫并作軾請于朝蠲本路上供米三分之一故米不翔貴復得度僧牒百張易米以救飢者明年方春即減價糶常平米民遂免大旱之苦謹案蘇軾之有益於杭也最稱久逺築堤引水利濟民田至今猶多賴之蓋不獨救荒一事之請蠲減糶也從古名賢入則虔共爾位曲體君心出則利濟蒼生為國霖雨固非僅恃文辭末技鋪張揚厲以干名譽已耳繼軾而為刺史者其無務為文章以與軾相較優劣然後可吳中大水詔出米百萬斛緡錢二十萬賑救諫官謂訴災者為妄乞加驗考給事中范祖禹封還其章云國家根本仰給東南今一方赤子呼天赴訴開口待哺以脫朝夕之急奏災雖少過實正當略而不問若稍施懲譴恐後無敢言者矣謹案知明處當然後可以論國家大體祖禹賢臣也洞悉民情因申説奏災之不可罪言簡而理勢盡該正足以濟其封還奏章之力髙宗紹興中詔拯濟原為貧民近世拯濟止及城郭市井之內而鄉村之逺者未嘗及之須令措置州下縣縣下鄉雖幽僻去處亦分委官屬必躬必親明陳龍正曰守令之賑城市遺鄉村豈非身在城市據所見忘所不見耶夫窮民惟鄉村最多以彼蠢愚無知或平生畏見官長忍餓不敢出或事歸里正保長任意欺瞞或保正胥吏勒索使費強匿户口種種情弊百出不窮此處正宜盡心查察可聽其遺漏而一任窮民之無告哉孝宗淳熙九年七月以江西常平義倉及樁管米四十萬石付諸司預備賑糶出南庫錢三十萬緡付浙東提舉朱熹以備賑糶詔發所儲和糴米百四十萬石補淳熙八年賑濟之數於沿江屯駐諸州樁管九月以錢引十萬緡賜瀘州備賑糶十一年六月詔諸州嵗買稻種備農之闕謹案小民得分釐之惠感激已殷況在飢年其欣幸也莫可言狀又况賑糶賑濟行之不倦更日有所得哉故南渡之賢君當推孝宗為第一浙東大飢命朱子提舉常平茶鹽既拜命即移書他郡廣募米商蠲其稅及至客舟已輻輳矣日與僚屬鈎訪民隱至廢寢食分畫已定案行所部窮山長谷靡所不到拊問存恤所活不可勝計每出皆乘單車屏徒從一身所需皆自賫以行毫不及州縣以故所歷雖廣而人不知郡縣官吏憚其風采倉惶驚懼常若使者壓其境由是所部肅然朱子又嘗言于上曰臣曾摹得蘇軾與林希書謂熙寧中荒政之弊費多而無益以救遲故也其言深切可為後來之鑒謹案愛民之政身不力行知之無益行之不早救之無益所以朱子一聞上命即刻力行招商訪困不辭獨歷深山以生餓殍使州縣聞之無不惶懼奉行是一人之所活有限而諸吏之救人無窮矣非賢者而能之乎朱子文章不可及其政事乃如此此其忠君愛民之心曷常有須臾之間哉楊仲元調宛邱簿民訴旱守拒之曰邑未嘗旱此狡吏導民而然仲元入白曰野無青草公日宴黃堂宜不能知但一出郊可見矣狡吏非他實仲元也竟得免稅謹案愛民之人當此一邑流離之日恨不能奮身以救故見親民之官惟以宴飲為樂而不計及民瘼一腔慈惠之心不得不激為直戅之語矣凡諸守令所當廣厥聰明不蔽于近始可與言為政之道元世祖至元二十年詔停燕南河北山東租賦發明云世祖因御史臺臣之言詔停燕南等路租賦一舉而聽言恤民之事皆在其中是亦可謂惠愛乎斯世斯民者矣至元二十二年江西行省以嵗課羡鈔四十七萬貫來獻太子怒曰朝廷但令汝等安百姓百姓安錢糧何患不足百姓不安錢糧雖多能自奉乎盡却之謹案帝王家能有一人以百姓為念者則四海盡受其福矣况太子哉羡餘之獻皆民脂民膏加派苛政而來者也聚斂之臣聞此言也亦可以知所警矣至元二十七年十月丁丑尚書省臣言江隂寧國等路大水民流移者四十五萬八千四百七十八户帝曰此亦何待上聞當速賑之凡出粟五十八萬二千八百八十九石謹案急于救民者有不待再計而決也使稍有所吝或令檢踏或令移民必有無限躊躇之事矣總之惟明惟斷乃能推實惠以豫民成宗大德七年詔比嵗不登賑飢乏蠲差稅貸積逋近聞百姓困乏者尚衆今內郡曾經賑濟人户其大德七年差發稅糧盡行蠲免飢民流移他所多方存恤從便居住如貧之不能自給者量與賑給口糧被災處所有好義之家能出己財周給貧乏者具實以聞量加旌用謹案不登之嵗蠲賑之外窮黎賴富室以得生富民因濟困以榮身亦荒政權宜之一法也大德十一年江浙飢中書省臣言杭州一郡嵗以造酒糜米二十八萬石禁之便謹案以必需之物置之可省之途者以米作酒是也無酒人不害無米人不生禁之便武宗至大二年詔被災曾經賑濟百姓至大二年腹裏江淮夏稅並行蠲免至大二年正月以來民間逋欠差稅課程照勘並行蠲免三年十月詔大都上都中都比之他郡供給繁擾與免至大三年秋稅其餘去處今嵗被災人户曾經體復依上蠲免已徵者準下年數謹案蠲之為言惠民之政也然亦貴及時否則追呼早迫杼軸已空恩詔來自九重而國課已納于百室此際上有隆恩下無實惠中間吏胥有私飽其囊槖而已奉宣德意者所當實心實力剔弊釐姦為要順帝至正十二年春正月中書省臣言今當春首耕作之時宜委通曉農事官員分道巡視督勒守令親詣鄉都勸諭農民依時播種務要人盡其力地盡其利其有曾經水早盜賊等處貧民不能自備牛種者所在有司給之仍令總兵官禁止屯駐軍馬踏踐田畝以致農事廢弛從之謹案蒼生愚賤全恃朝廷之經綸以安果如是之經理咸宜施無不當則民自享盈寧之福矣撫民者所當條列其事而行之庶無負司牧之責明太祖吳元年六月不雨上日減膳素食羣臣請復膳上曰亢旱為災實吾不德所致今雖得雨然苖稼焦損必多縱食奚能甘味得乎民心則得乎天心今欲弭天災但當謹于修己誠于愛民庶可答天之眷下令免今年田租謹案太祖以蠲租為寬民之力以民心為天心是窮源而得本矣尚肯困民而拂天乎有明數百年開國規模最稱寬厚于此亦可得其一二洪武初陜西旱飢漢中尤甚鄉民多聚為盜莫能禁戢是時府倉儲糧十萬餘石知府費震即日發倉令民受粟自是攘竊之盜與鄰境之民來歸者令為保伍驗丁給之賴以全活者甚衆至秋大熟民悉以粟還倉上聞而嘉之謹案民之為盜多迫于無可如何耳有司已得其情自宜及早招來豫以自新之路仍為治世良民但救之貴早遲則積惡多而不可屈國法以徇民救之貴有權有力否則適以餌盜而姦民易肆其詐譎此一等處置非精明強幹而又能保惠黎元者皆不足以語此洪武二十六年二月上諭户部曰朕捐內帑之資付天下耆民糴粟以儲之正欲備荒歉濟飢民也若嵗荒民飢必候奏請道途往返動經數月則民之飢死者多矣爾户部即令天下有司自今凡遇飢嵗則先發倉廩以貸民然後奏聞著為令謹案飢民之待食如烈火之焚身救之者刻不可緩即以一日試之亦無不驗使必待往返而後發粟賑濟生者尚可邀恩死者焉能復活太祖命先貸後聞四字之中仁心仁政悉包羅無遺矣成祖永樂十年敕户部朕為天下主所務在安民而已近者河南民飢有司不以聞而往往有言榖豐者若此欺罔獲罪于天此亦朕任匪人之過其速令河南發粟賑民凡郡縣及朝廷所遣官目擊民艱不言者悉追下獄十一年正月上謂通政司曰朕令來朝有司言民利病率云田榖豐稔比聞山西民乃食樹皮草根自今悉記之境內災傷己不自言他人言者必罪謹案守土之人往往不肯以災傷報者意欲處于賢人君子之列以為我能愛民而天災不至殊不知匿災不逹遲誤之愆正大成祖深明其事非睿哲之主乎永樂十八年十一月皇太子過鄒縣民大飢競拾草實為食太子見之惻然乃下馬入民舍見男女衣皆百結竈悉傾頺歎曰民隱不上聞若此乎顧中官賜之鈔時山東布政石執中來迎責之曰為民牧而視民窮如此亦動念否乎執中言災荒處已經奏免秋糧太子曰民飢且死尚及徴稅耶汝往督郡縣速取勘飢民口數近地約三日逺地約五日悉發官粟賑之事不可緩執中請人給三斗太子曰且與六斗毋懼擅發豫見皇上當自奏也至京果即奏之上曰昔范仲淹之子猶能舉麥舟濟其父之故舊况百姓皆朕之赤子哉謹案太子之過鄒也始以民隱不上間為可歎繼責執中身為民牧絶不動心為可恨三言飢民與死為鄰猶語秋糧為可笑心切愛民語皆循序堯舜之仁不過如此後永樂復以麥舟為喻父子一心善人是則國祚之永宜矣仁宗洪熙元年四月時有至自南京者上問道路所過何似對曰民多乏食而有司徵糧如故遂召問少師蹇義所對亦然上坐西角門召大學士楊士竒等令草詔免稅糧之半併罷官買士竒對曰當令户工二部知之上曰救民之窘當如拯溺救焚慮國用不足者多有不決之意命中官具紙筆令士竒等草詔于西角樓遣使齎行上顧士竒曰今可語二部矣左右或言地方千里其間未必盡荒無收亦宜别之庶不濫恩上曰恤民寧過厚為天下主寧與民寸寸計較耶謹案仁宗此詔莫言蠲租即此一番婉轉深心亦不易覯令人見之感德于數百年之後而况身逢其世乎含宏廣大直與天地同符宣宗宣德九年正月巡撫周忱奏內有云臣將各府秋糧查其數內有北軍京職俸米一百萬石該運南京各衛上倉聽候支給計其船腳耗費每石須用六斗方得一石到倉臣嘗奏乞將前項俸米一百萬石于各府存收著令北京軍職家屬就來關支可省船腳耗米六十萬石又免小民搬運之勞荷蒙聖恩準行遂得省剩耗米六十萬石欲于蘇松常三府所屬縣分之各設濟農倉一所收貯前項耗米後遇青黃不接車水種田之時人民缺食者支給賑濟奉旨準行小民俱有賴焉謹案位鎮封疆原非凡品此時若不救濟蒼生上紓君父之憂以為本固邦寧之計豈不有辜屏翰撫綏之職乎今奏減六十萬石以惠窮黎大臣經濟于此始稱無愧世宗嘉靖八年山西大飢參政王尚絅上救荒八議一曰愍飢饉乞遣使行部問民疾苦二曰恤暴露乞有司祭瘞消釋厲氣三曰救貧民乞支散庾積秋成補還四曰停徵斂乞截留住徵以俟豐年五曰信告令乞勸分菽粟六曰推糴買乞令無閉遏七曰謹預備乞申舊例措置積貯勿使廪庾空虛八曰恤流亡乞所過州縣加意存恤勿使羣聚思亂户部覆議行之謹案嘉靖繼統之後連嵗飢荒其所以寧輯者諸臣匡救之力耳王參政八議與林僉事同在一時誠皆一路之福星也嘉靖三十二年程文德疏水災異常言官屢奏持議未見歸一臣謂今日內帑不必發大臣不必往夫救荒莫便于近莫不便于拘宜各遣行人賫詔宣諭令各州縣自為賑給聽其便宜處置凡官帑公廪贖納勸借茍可濟民一不限制又近日户部申明開納事例亦許就本地上納即粟麥黍菽凡可救飢皆得輸于倉庫計值請劄受官仍登計全活之數定為等則以憑黜陟即撫按守巡賢否亦以是稽之制可謹案時當儉嵗人肯以便宜請則民之全活者多矣何也救荒貴速而惡遲文德所言凡可以救民之飢者皆得上納是收涓滴之清流而沛恩膏于涸轍矣飢者不飢流者不流非若寒谷之回春歟欽定康濟録卷一欽定四庫全書欽定康濟録卷之二先事之政計有六先事論曰哲后經國立治積儲九稔謂之太平蓋雖時際豐熙嵗書大有而聖德仁恩之厚勤勞天下宵旰勿遑凡夫滋茂衣食便安黎民之道至大至詳有舉無廢用是萬方乂安坐臻上理當是時也時有飢荒國無歉乏補偏救弊之術無所事諸後世耕者日少户口日繁災傷之民救之于未飢則用物約而所及廣救之于已飢則用物博而所及微天災偶行民情遽迫非長民者早為之所則設施無序緩急無倫何以慰九重厪念之懷措萬姓安全之地乎用集厯代探夲之治條為先事六則敬備廟廊採擇之端賢吏仁民之法古政具在神眀通變動遵乎古而仍不泥乎古自在道國愛民者之善為潤澤也已一教農桑以免凍餒月令帝漢景齊管子張堪唐劉思立敕後唐天成五代梁乾化敕宋太宗諭張詠知鄂州元至元詔江翺令魯山明太祖諭月令孟春之月天子乃以元日祈榖于上帝乃擇元辰天子親載耒耜措之於參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推是月也天氣下降地氣上騰天地和同草木萌動王命布農事命田舍東郊皆修封疆審端徑術善相邱陵阪險原隰土地所宜五榖所殖以教道民必躬親之田事既飭先㝎凖直農乃不惑季春之月天子乃薦鞠衣于先帝命野虞毋伐桑柘鳴鳩拂其羽戴勝降于桑具曲植籧筐后妃齊戒親東向躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰謹案民之大事端在農桑上以備宗廟之粢盛下以致民生之蕃庶所謂和協輯睦財用蕃殖悉于是乎興焉其為典甚巨而布之政令尤不可不亟為經綸也自古聖王祈榖以勤民耕藉以敬天宫廟之中后妃肅理蠶桑虔奉祭祀如此由是有及時勸課之令俾草野農人得先時整飭器具合天道以盡人功德至溥也意至深也所以敦龎淳固民和而天錫之福蓋恪勤乎子惠黎元之本計無時而敢有怠心生于其間也齊管子曰一農不耕民有飢者一女不織民有寒者倉廩實而知禮節衣食足而知榮辱謹案從古賢臣致治之才莫如管仲觀其相齊設施經緯真足輔相天地之宜所以桓公之時最稱富盛似此雄材宜乎専力山海之間以充實百姓乃今其言如是是蓋洞眀魚鹽之利總非夲富泉貨之用亦有窮時莫如使兆民之衆舉知天地自然之利而盡力于南畝則飢寒勿及其身天良愈培純厚禮節之大由富庶而自入範圍榮辱所關處豐亨而每多顧惜國之綱維胥立于是矣非為政之急務而足民之要圖也哉漢景帝勸農桑詔農天下之本也黃金珠玉飢不可食寒不可衣以為幣用不識其終始間嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物吏發民若取庸采黃金珠玉者坐贓為盜二千石聽者與同罪謹案金玉雖貴無益于人之溫飽米粟雖賤有關乎人之身家以身家較珠玉則米粟之不可不寶審矣故文帝之勸農桑重在有司景帝之勸農桑勿貴珠玉皆得致治之本所以文景之世天下豐盈百姓皆敦崇孝弟砥礪亷隅治幾刑措化洽羣生道國之夲務得也張堪拜漁陽太守開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張公為政樂不可支謹案富民而不令致力于農田使野多曠土民安惰逸有利亦非長久之策也良有司深眀乎此則有隙地即有良田蓋其經營所到無非實在為民之妙用勸導所感自多歡欣鼓舞之精神其草野謳吟之意有動于不自知者張太守特開八千頃之稻田使民向往于其間人有不富而家有不足者哉何處無田何田無守能以張公為法民樂何如唐髙宗時河南北旱遣御史中丞崔謐等分道賑給侍御史劉思立上疏曰麥秀蠶老農事方殷聚集參迎妨廢不少既緣賑給須立簿書本欲安存更成煩擾伏望且委州縣賑給疏奏謐等遂不行謹案自古未有人無衣食而國能太平者也故愛國必先愛民即賑給之使尚不敢遣恐妨蠶麥而肯擅用其力役哉此唐之初世衣食足而民心固雖有賊臣擾國不致喪危得固本之道耳治國者于蠶忙農務之時可不深為體恤以裕其衣食之源耶五代梁太祖乾化元年二月敕曰今載春寒頗甚雨澤仍愆司天監占以夏秋必多霖潦宜令所在郡縣告諭百姓備淫雨之患謹案無知之小民烏能測上天之水旱司天監既有眀占理宜諭衆使知所備雖未悉當要亦不逺總賴後之治民者得思患預防之道時時敬體天心不使一毫怠忽斯為上策後唐眀宗天成二年敕訪聞京城坊市軍營有殺牛賣肉者仰府縣軍巡嚴加紏察如得所犯人準條科斷如是死牛即令貨賣其肉斤不得過五文鄉村死牛但報本村莭級然後準例納皮天下州縣準此處分謹案事能細心揆度自能永逺遵行如肉令賤賣則殺牛者必寡報官方許開剝納皮則偷宰者必無有犯者若再許人告首即以此牛賞之誠得禁宰耕牛之善法矣宋太宗嘗謂近臣曰耕耘之夫最可矜憫春蠶既登併功紡績而繒布不及其身田禾大稔充其腹者不過疏糲若風雨乖候將如之何謹案知稼穡之艱難者須厚恤耕耘之勞苦也否則知之亦無益今太宗慮遭凶嵗早為籌畫得未雨綢繆之道矣然不薄其賦寬其役緩其征則俯仰無資小民不能盡力于南畝三年之蓄不可得何由成郅隆之治哉張詠知鄂州民以茶為業詠曰茶利厚官將𣙜之命拔茶植桑民以為苦其後𣙜茶他縣皆失業而夲地桑已成絹嵗至百萬匹民以殷富謹案實心為民者任勞任怨在所不計如張公之方命去茶也民心豈能無怨後桑成而利溥不致失業農桑惠人非固夲之君子歟江翺建安人為汝州魯山令邑多苦旱乃自建安取旱稻種耐旱而繁實且可久蓄髙原種之嵗嵗足食種法大率如種麥治地畢豫浸一宿然後打潭下子用稻草灰和水澆之每鋤草一次澆糞水一次至于三即秀矣謹案土有髙下燥濕之分父母斯民者原貴有以教之也如宋真宗因江淮兩浙旱荒命取福建占城稻而種之者避旱荒也程珦因沛縣大雨募富民之豆而布之者救水災也汜勝之云稗既堪水旱種無不熟之時何不擇其秸長而粒大者種之水旱皆可避也魯山令能立法救荒于兹數者可無愧矣元世祖至元二十八年詔頒農桑雜令每村以五十家立一社擇髙年曉農事者為長增至百家别設長一人不及五十家者與别村合社地逺不能合者聼自立社専掌教督農民凡種田者立牌橛于田側書某社某人于上社長以時點視勸戒不率教者籍其姓名以授提點官行罰仍大書所犯于門候改過除之不改則罰其代充本社夫役社中有喪病不能耕種者合衆力助之一社災病多者兩社均助浚河渠以防旱暵地髙者造水車貧不能造者官給材木田無水者穿井井深不能得水聼種區田又每丁課種棗三十本雜種十本土性不宜者種榆栁等其數以生成為率願多種者聼其無地及有疾者不與各社種苜蓿以防飢近水之家許鑿池養魚牧鵝鴨蒔蓮藕菱芡蒲葦以助衣食荒間之地悉以付民謹案農桑令當以此為苐一詳而到備而切人有怠惰者衆勵之土有不宜者别樹之民有不足者官給之極裁成輔相之道也何以後之理財者但知為己而不知為民識者能不為之遐思良吏廣孚聖澤于九有耶眀太祖初渡江時即以康茂才為營田使諭之曰比年兵擾隄防頽圮民廢耕作而軍用浩繁理財莫先于務農故設營田司命爾此職巡行隄防水利之事俾髙無患乾卑不病潦務以時蓄泄毋負委托謹案開基之聖主自具有經國之大綱紀隋時未嘗不大開河道不過為一日之逰觀眀太祖命人巡行水利惟欲軍民之足食乃知以農事為重者不可不急興水利也二者相因為用猶木之附土火之賴薪非此不足以致盛大而享豐盈之福也籌國者宜以此為法教農桑總論曰世有日月則長眀人非稼穡則勿生故聖賢獨于耕耨之間靡不諄諄告戒而于法亦無不備也憂旱之為災命樹之以區田慮水之為害教之以匱田傍山者則曰梯田為善臨水者又曰架田可耕圃田宜于郭外圍田利于澤間管子有瀆田趙過作代田此外尚有塗田沙田不能盡述教無不備樹無不精使以農事為可緩諸君子何皆亹亹而不倦也昔人云漢代去古未逺髙帝立孝弟力田之科深眀乎乏九年之蓄者適逢飢饉不足以使民無菜色也故其崇夲抑末之志略不稍貶其科條觀此則不工不商之遊惰蟊食于農者不當痛懲乎讀月令管子文立法未嘗不善而何以時見飢寒之衆要知雖有絶妙之良規究不若愛民之司牧使其不見于設施終無實際何益之有故惟慎選循良重農積粟處處無羣居之遊惰村村盡敦夲之農夫何患乎太平之不奏也孔子曰民之所以生者衣食也上不教民民匱其生飢寒切于身而不為非者寡矣衣食可勿足乎農桑可勿教乎二講水利以備旱潦魏史起漢倪寬韓鄭國晉杜預隋文帝越王五代吳唐李泌白居易宋范仲淹元虞集錢增眀周恭魏文侯時西門豹為鄴令有令名至文侯曽孫襄王時與羣臣飲酒王為羣臣祝曰令吾臣皆如西門豹之為人臣也史起進曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其傍西門豹不知用是不知也知而不興是不仁也仁知豹未之盡何足法也于是以史起為鄴令遂引漳水溉鄴以富魏之河內民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古瀉鹵兮為稻粱謹案水利者猶人身之血脈也血脈不行安得無病水利無資田將安溉而况有漳水在其旁乎觀稻粱之歌則知史起之責豹也宜矣秦始皇時韓欲疲秦使無東伐乃使水工鄭國行間説秦令開涇水自中山西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間為韓延數年之命然渠成亦秦萬世之利也乃使卒就渠渠成用溉注填閼之水溉瀉鹵之地四萬餘頃收皆畝一鍾于是關中為沃野無凶年秦以富強名曰鄭國渠謹案凶年之起水旱不時耳渠成則蓄泄有時民遂以富是韓之智鴆酒止渴也秦之愚塞翁失馬也願治國者寧為秦之愚而無為韓之智也漢元鼎間倪寬為左內史奏請穿鑿六輔渠在鄭國渠之裏今尚謂之輔渠亦曰六渠以益溉鄭國傍髙仰之田上曰農天下之本也泉流灌浸所以育五榖也令吏民勉農盡地利平徭行水勿使失時謹案天下地勢南北不同江之南雖多山澤然通舟楫而惟溝洫為要江之北若河南山東兩淮等地亦通運河而所重者在溝洫至于山西陕右昔時運道尚皆湮塞而况溝洫哉倪寬奏開六渠天子可之誠得蓄泄之要矣西晉武帝咸寧四年七月螟傷稼詔問主者何以佐百姓度支尚書杜預上疏以為今者水災東南尤劇宜敕兖豫等諸州留漢氏舊陂繕以蓄水餘皆決瀝令飢者盡得魚菜螺蚌之饒此目下日給之益也水去之後填􅌎之田畝收數鍾此又眀年之益也典收種牛有四萬五千餘頭不供耕駕至有老死不穿鼻者可分以給民使及時耕種榖登之後責其稅租此又數年以後之益也帝從之民賴其利謹案當陽侯以三益利萬民識鑒宏逺螟雖傷稼飢者有食豈他人所能及哉武庫之稱可以無愧隋文帝開皇十八年以山東頻年霖雨杞宋陳亳曹戴譙頴等諸州逺于滄海皆困水災所在沉溺帝遣使將水工巡行川源相視髙下發隨處近丁疏導之困乏者開倉賑給前後用榖五千餘萬石遭水之處租調皆免自是頻有年矣謹案水之為道蓄泄由人則有益旱潦任之則為災文帝知其然不惜所費隨地疏通非帝王經濟之宏模歟朱文公政訓曰賑濟無竒策不如講水利若到賑濟時成得甚事不意文帝已先行之矣則其國計之富足不當甲于厯代耶唐杭州本江海之地水泉鹽苦居民稀少刺史李泌始引湖水入城鑿六井民足于水生齒始繁後白居易復浚西湖放水入運河自河入田灌溉千頃始稱富足但湖水多葑自唐及錢氏嵗輒開治宋則廢而不理湖中葑積為田一十五萬餘丈而水無幾矣運河失湖水之利則取給于江潮河水渾濁而多淤三年一淘為市大患六井亦幾廢矣宋蘇軾守杭州浚茅山鹽橋二河以茅山一河専受江潮以鹽橋一河専受湖水復造堰閘以為湖水蓄泄之限而潮亦不入市矣且去葑田積于湖之中為長隄通南北之路而行者便無環湖之逺也植桃李于隄上望之如畫杭人名之曰蘇公隄謹案六井不開居民不聚運河無水灌溉何從二公之力不在錢王之下然非東坡之去葑田淤塞水無容處湖外之良田又將沉而為湖矣疏導之功可不講哉五代吳越王錢氏築石堤以禦潮汐堤外又植大木十餘行謂之滉柱寶元康定間人有獻議取滉柱可得良材數十萬杭帥以為然既而舊木出水仍皆朽敗而不可用滉柱既空石堤為洪濤所激嵗嵗摧決蓋昔人埋柱以折其怒勢不與水爭力故江濤不能為患也及杜偉長為轉運使乂有人獻議自浙江稅場以東移退數里為月堤以避怒水此善䇿也衆水工皆以為便獨一老水工以為不然密諭其黨曰移堤則嵗嵗無水患矣若輩衣食何從而得于是衆人從而和之偉長不悟其計費以巨萬而江堤之患何嵗無之後亦有講月堤之利濤害稍稀然終不若滉柱之利為久也謹案怒潮併力而來滉柱分株而受水之觸堤者即有急而有緩石之受攻者亦或震而或寧此塘之所以可久耳奈何去其分濤之砥柱任其沖激之狂瀾無惑乎嵗有所築而塘終不能不壞也一勞永逸之道豈竟莫之知乎嗚呼沿江沿海風浪滔天塘或傾欹絶無攔絆大則漲吞城邑小則繞郭居民悉遭漂沒水即易退而人難復活矣惟望在位仁人勿以錢王舊制費重為嫌則免席捲一空之害而澤國永拜拯溺之恩矣宋范仲淹為揚州府興化令海水為患田不可耕仲淹乃築堤于通泰海三州界長數百里以衛民田歲享其利謹案范公之有益于興化猶錢王之有益于杭州皆以築堤見功蓋海水為患茍不速防不獨害于田畝人民不將盡為魚鱉耶元仁宗時虞集拜祭酒講罷因言京師恃東南海運而實竭民力以航不測乃進曰京東瀕海數十里皆雈葦之場北極遼海南濵青齊海潮日至􅌎為沃壤久矣茍用浙人之法築堤捍水為田聽富民欲得官者分授其地而官為之限能以萬夫耕者授以萬夫之田為萬失長千夫百夫亦如之三年視其成則以地之髙下㝎額于朝而以次征之五年有積蓄乃命以官就所儲給以祿十年則佩之符印俾得以傳子孫則東南民兵數萬可以近衛京師外禦島夷逺寬東南海運之力內獲富民得官之用遊食之民得有所歸自然不至為盜矣説者不一事遂寢舊評曰其後托克托言京畿近水地利召募江南人耕種嵗可收粟麥十萬餘石不煩海運京師足食元主從之又倣此法于江淮召募能種水田及修築圃堰之人各千人為農師降空名添設職事敕牒十二道募農人百人者授正九品二百人者正八三百人者從七就令管領所募之人所募農夫每人給鈔十錠期年散歸遂大稔眀嘉靖時河臣周恭疏內有云臣竊見中土之民困于河患實不聊生至于運河以山東濟南東昌兖州三府州縣地方雖有汶沂洸泗等河然與民間田地支節脈絡不相貫通每年太山徂徠諸山水發漫為臣浸潰決城郭漂沒廬舍亦與河南河患相同或不幸而值旱暵又自來並無修繕陂塘渠堰蓄水以待雨澤遂至齊魯之間一望赤地蝗螟四起草榖俱盡東西南北橫五千里天災流行此皆溝渠不修之故也臣惟善救時者在乎得其大綱善復古者不必拘于陳迹所謂修溝洫者非謂一一如古亦惟各因水勢地勢之相因隨其縱橫曲直但令自髙而下自小而大自近而逺盈科而進委之于海而已國朝陳芳生曰平時預修水利則蓄泄有備而無旱潦之患荒年為之則飢民得以力食即可免于流離凡有父母斯民之志者所宜急為講求也眀户科錢增疏請修水利言蘇松常鎮杭嘉湖七郡之水以太湖為腹以大海為尾閭以三江入海為血脈蓋自吳淞淹塞東江微細獨存婁江一派而婁江之委七十里曰劉家河乃婁江入海之道東南諸水全恃此以歸墟不至橫溢泛濫者則帶水靈長之利也近日漲沙淤塞于是東流之水逆而向西涓滴不入灌溉無資嵗逢旱魃田禾立稿何從而救涸轍之民乎然此猶就旱暵言耳萬一大浸稽天七郡洪流傾河倒峽震澤不能受散漫橫潰勢必以七郡之田廬為壑而城郭人民皆不可問東南數百萬財賦盡委逝波其如國計何哉其時蘇松巡按周元泰亦言劉家河急宜開濬俱下該撫察議謹案人憂旱暵之為災而不知橫流之更惡淫雨無休去路􅌎塞不特泛濫滔天民將魚鱉即禾苖遭久溺安得有收成錢公特疏請開劉家河蓄泄有備旱潦無虞其利澤逺矣况近日之江濤洶湧堤岸難防設有不測直入內河而去水不速七郡之田廬百姓不大為可憂哉是不得不望封疆大臣特展經營急為開濬豫防不測于無形耳講水利總論曰凡用水而水不蓄去水而水不流豈特有害于農田人民亦恐由此而喪命此經濟名賢以仁智自任者未有不急急于此也史起之責西門豹得之矣雖然仁智豈易言哉韓之誘秦大開涇水而富其國可謂智乎元之不聼虞集惟竭民力以航不測可謂仁乎故治水者當以倪寬為最舍此惟隋文帝之法更佳故得頻年稱大有也築塘而捍水患者文正公仲淹也決堤而去水災者當陽侯杜預也此皆蓄泄以時者矣唐之鑿六井宋之去葑田獨非水利之善者乎至若錢王于築堤之外更列滉柱十餘行破散洪濤併力之勢衛護江塘經久之基于仁智兩得矣可恨者杭帥之愚昏聼小人之言而去之也眀季河臣周恭所言頗有可採户科錢增之請關係非常留心民瘼者皆宜深究也于此而不知所急謂仁智克全而經濟無歉者恐亦未之確也故凡水利之當去留在郡縣者郡縣任之在數郡者司道任之有屬通省者督撫任之有關鄰省者移會而分任之必無不可為之事矣何憚之有國語云美哉禹功眀德逺矣微禹吾其魚乎後人雖不敢望聖王于萬一但旱乾水溢不為救治豈父母斯民之道哉穿井法凡開井當用數大盆貯清水置各處俟夜色眀朗觀所照星何處最大而眀其地必有甘泉此屢試屢驗者見農政全書三建社倉以便賑貸隋長孫平李欣唐戴方胄宋張平蘇汝渭趙愚魏掞之朱熹金世宗相明王廷元趙天麟鍾化民隋文帝開皇間長孫平請令諸州百姓勸諭同社共立義倉收穫之日各出粟麥藏焉社司執帳檢校多少嵗或不登則發以賑之謹案以同社之輸蓄而濟同社之急社司執帳官吏尚有侵吞之事乎民安物阜睦俗敦倫悉由于此故長孫平之社倉與李悝之平糶皆可為神農之髙弟后稷之功臣唐太宗貞觀初戴胄議自王公以下計墾田秋熟各輸榖粟所在為義倉嵗凶以給民太宗善之謹案所在為義倉則與社倉無異矣且以王公而出粟給為庶民之所資得損上益下民悅無疆之道矣社稷不有磐石之固乎此賢主所以善之也人能倣此社倉之建誰曰難之德宗時尚書李欣有云去嵗京師不稔移民就豐既廢營生困而後達又于國體實有虛損若豫儲倉粟安而給之豈不愈于驅督老弱糊口千里之外哉宜敕州縣年豐糴粟積之于倉榖貴平價糶之于民數年之中榖積而人足雖災不為害也謹案救民而害民者移民之政也扶老擕幼跋涉道途風雨困厄未至而亡者十已六七矣李公欲令州縣處處建倉積粟救民其深仁厚澤非淺鮮者所能及也宋仁宗時張方平上倉廩論有云比者敕書有諭州縣使立義倉之言于兹三年天下皆無立者凡今之俗茍且因循有位者無心有心者無位在上可行者務暇逸而從茍且在下樂行者或牽束而不得専以故民間利不克時興害不克時去彼義租社倉者齊隋唐氏既嘗為之矣果令天下之縣各于逐鄉築為囤廪中户以上為之等級課入榖粟縣掌其籍鄉吏守之遇嵗之飢發以賑給協于大易裒多益寡稱物平施之義符于周官黨使相救州使相賙之法誠為國之大事也謹案此論倉之所以不能建可謂曲盡人情而言言中的矣仁人君子果能晰其理易其轍去其弊奮勇力行不獨濟貧且得理財正辭禁民為非之義矣熙寧初陳留知縣蘇渭言臣領畿邑請為天下倡令户分五等自二石至一斗出粟有差每社有倉各置守者耆為輸納官為籍記嵗凶則出以賑民藏之久則又為立法使新陳相登即詔行之既而王安石沮之遂不果行謹案文公之前即有欲立社倉而為天下倡者天子已可其奏奈為荆公所沮蓋青苖法専重取利社倉法専在濟民立意不同自相水火嗟夫景星慶雲不與暴風疾雨同時可見者也甌寧縣有洞曰回源劇賊范汝為向曽竊據民性悍小遇飢饉羣起殺掠進士魏掞之謂民易動蓋緣艱食乃請常平米一千六百石以貸鄉民至冬而還遂置倉于邑之長灘浦自後每嵗散斂如常民得以濟不復思亂草寇遂息明陳龍正曰社倉之利一以活民一以弭盜非特弭夲境之盜也且以清鄰寇焉文公賑粟于崇安而擒盜于浦城魏掞之置社倉于長灘浦而回源洞之悍民以化如一邑有若干鄉區每鄉每區各立社倉誠為至計孝宗時趙汝愚知信州乞置社倉疏有云臣伏見州縣之間遇水旱賑濟賑糶往往施惠止及城郭不及鄉村鄉村之人為生最苦幸而得錢近者數里逺者一二十里奔走告糴則已居後于是老幼愁嘆有避荒就熟輕去鄉里之意其間強而有力者又不肯坐受其斃奪攘摽掠無所不至以陷于非辜城郭之民率不至此故臣謂城郭之患輕而易見鄉村之害重而難知臣愚欲望聖慈逺采隋唐社倉之制明詔有司逐鄉置厫每嵗輪差上户兩名以充社司主其出納不如法者治之使幸而連年豐稔在在得有儲蓄則鄉里晏然若有所恃雖遇歉嵗姦宄之心無自生也謹案趙公此疏如親厯窮鄉目覩貧民之苦凡陷于剽掠者皆因飢寒逼迫而致之豈樂此喪身亡家之禍哉果社社建倉資生有路誠救人于法網之先矣非南渡之賢臣耶孝宗淳熙八年浙東提舉朱熹上社倉議有云乾道四年臣熹居崇安之開耀鄉民艱食請到本府常平米六百石賑貸無不歡呼于是存之于鄉夏則聽民貸粟于倉冬則令民加息以償每石息米二斗如遇小歉即蠲其息之半大飢則盡蠲之係臣與夲鄉土居官及士人數人同共掌管凡十有四年以六百石還府現儲米三千一百石以為社倉不復收息故一鄉之中雖有飢年人不缺食伏望聖慈特賜施行孝宗從其言遍下諸路倣行其法國朝陳芳生曰社倉之制専以賑貸凡官貸民者必多侵冒民貸官者必受追呼民與民貸必出倍息惟此三害俱無雖非荒年亦可借作種食年年出納久之所積自豐矣金世宗語戶部曰隨處時有賑濟往往近地無糧取于他處往返既逺人愈難之何不隨處起倉年豐則多糴以備賑濟設有緩急豈不易辦乎而徒使錢充府庫將安用之謹案金世宗不願錢充府庫而欲以之備粟又欲隨處起倉以儲此粟大得萬物一體之懷若使賢臣敬承其旨廣推仁愛之意以錫福斯民豈非仁術之至大者哉元世祖時趙天麟上策曰至元六年有旨每社立一義倉社長主之遇大有年聽自相勸督而增數納之飢饉不得已之時計口數之多寡而散之官司不得拘檢借貸併許納雜色如是非惟共相賑救而義風亦行謹案堯湯有水旱之災而不為其所困者有備故也苟社社有倉雜色可納飢以濟之小荒不致流移大荒免為餓莩較于臨事而圗者相去不甚逺耶眀嘉靖時兵部侍郎王廷相言備荒之政莫善于義倉宜儲之里社定為式一村之間約二三百家為一會每月一舉第上中下三等人户捐榖多寡各貯于倉而推有德者為社長善處事能會計者副之若遭凶嵗則計户給散先中下者後及上户上户責之償中下者免之凡給貸悉隨于民苐登記册籍以備有司稽考既無官府編類之煩亦無奔走道途之苦謹案侍郎之言最為得法一村之間有二三百家者即為一會共建一倉隨其社之大小而命其積榖之多寡又使自為主之非即社倉而何有備無患閭里雍熙豈無上世鼓腹而歌之樂哉萬厯間御史鍾化民奏內有云臣聞古有水旱之災而民無捐瘠以蓄積多而備先具也今地方一遭災荒輒仰給于內帑此一時權宜之計豈百年經久之規哉惟以本鄊所出積于夲鄉以百姓所餘散于百姓則村村有儲家家有蓄緩急有賴周濟無窮矣臣令各府州縣掌印官每堡各立義倉一所不必新創房屋以滋破費即菴堂寺觀就便設立每倉擇好義誠實之人兼有身家者共相主之此乃積于粒米狼戾之時比之勸借于田園荒蕪之後難易殊矣謹案鍾御史令每堡各立社倉一所誠救民之良法後之有司果能世守勿失何至有飢民嘯聚之患哉建社倉總論曰甚矣仁人之心至社倉而至廣至大也常平與義倉皆立于州縣惟社倉則各建于各鄉故凡建于民間者皆社倉也烏得以一義字而疑之此倉之美不特救小民之困厄實可以舒大君之憂心飢寒聚集叛亂立興雖即旋亡豈無軍餉故恤國費者此倉宜建欲免勦賊者此倉宜建善培國本者此倉宜建口食得而上下安枵腹飽而人心附較之就食别境領賑官司者逺矣何也無跋涉之費也無後期之失也無宿途之苦也他鄉外省不必驅馳父母妻兒豈猶輕棄故諸賢無不惓惓于此倉也然而得其妙者文公為最行之久而知之詳且欲遍行天下而何以後人莫之法也豈以民間亦有不欲行者乎大功之成不謀乎衆自古有之况聞近世之常平既不令人擅于取用民間之社倉則又廢而不建是迫人于溝壑驅民于法網矣豈不深為可歎哉書云皇天無親惟德是輔民無常懷惟惠之懷社倉建而天有不為之輔民有不為之懷者乎君子勉之四嚴保甲以革姦頑周禮鞅秦衛齊管子宋張詠熙寧法范仲達程伯淳朱熹董守煟王仁眀張朝瑞周孔教周禮大司徒施教法于邦國都鄙使之各以教其所治民令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓注云保猶任也居相親近則易為督察也相受者居同門閭則可相容納也相賓者賢能皆備于中相與賓而興之也齊管子禁藏萹云夫善牧民者非以城郭也輔之以什司之以伍伍無非其人人無非其里里無非其家故奔逃者無所匿遷徙者無所容不求而約不召而來故民無流亡之意吏無備追之憂故主政可往于民民心可繫于主謹案昔施伯對魯莊公言管子天下之才也所在之國則必得志于天下今觀其所重不外于保甲法則保甲之不可不急于行也眀矣秦以衛鞅為左庶長㝎變法之令鞅使民為什伍而相收司連坐其法以五家為保十家相連收司相紏察也一家有罪九家舉發若不紏舉則十家連坐司猶管也為什伍之法使之相兼管也謹案此非衛鞅保甲之法乎心雖殘忍才頗雄長欲民之守其法遵其令亦若舍此不能蘇東坡云帝秦者商君也危秦者亦商君也美哉斯言也使以是法而範羣黎悉歸仁厚焉知不能以王道而化成天下何至立法自斃而遭後世之僇哉宋張詠守蜀季春糶廩米其價比時減三分之一以濟貧民凡十户為保一家犯事一保皆坐不得糴民以此少敢犯法王文康知益州獻議者改詠之法窮民無所濟復為盜文康奏復之其賑糶法人日二升團甲給票赴場請糴始二月一日至七月終嵗出米六萬石蜀人大喜為之謡曰蜀守之良先張後王惠我赤子俾無流亡何以報之俾夀而康謹案張公以十家而共除一人之弊此弊之所以除也法變則盜興王文康亟奏復之蜀人不但為之喜而且為之謡其法之有益于民而不可廢也審矣膺牧民之任者思欲共躋于升平當以張公之所行為善則神宗熙寧三年十二月立保甲法其法十家為保五十家為大保十大保為都保選衆所服者二人為都保正副凡保丁聽自置弓箭習武藝于是諸州藉保甲聚而教之謹案至難行者保甲蓋里閭紛紜民居最稱繁雜一時清理豈易稽查此事總在賢能縣宰隨時審勢逐假分清積久認真漸有就緒王安石夲意亦欲寓兵于農但訓練無時妨農騷擾民又何堪此苦是以行之而無成耳欲行保甲者當不泥乎古而仍不背古斯稱大經濟程伯淳令留城度鄉村之逺近為立保伍使其力役相助患難相扶孤煢殘疾者責之親黨令無失所出其途者疾病皆有所養擇其子弟之秀者聚而教之鄉民社會為立科條旌别善惡使之有勸有耻在邑三載民愛之如父母謹案保伍之法賢人君子之所必重者蓋以舍此則無以聫絡人情而使之交相勸勉也故程夫子于鄉民社會之時特立科條使其有亷有耻患難相扶且拔其秀者而教之皆由别之清故能勵之切使非保伍為立科條何從下手范仲達為袁州萬載令善行保伍法自來言保伍法無及之者雖有姦細一無所容每有疑似無行止之人保伍不敢著互相傳送至縣縣驗其無他方令傳送出境訖任滿無一寇盜後張㝎叟知袁州欲覔其法而不可得偶有一縣吏略記保甲之大槩云縣郭四門外置隅官四人此最緊要蓋所以防衛而制變者也一個隅官須各管得十來里方可若諸鄉則置彈壓之類而不復置隅官默寓大小相維之意其用人子弟必使竭力料理非比泛泛每以旌賞拔擢而激勸之謹案留心濟世者無時不以善政為念者也若仲達行之于前定叟訪之于後惜乎不能盡得其妙惟隅官之置知其所重要知防衛而制變者即社長之類是也總之奬賞之事眀則彈壓之用切匪類不容于甲矣朱熹于建寧府崇安縣因荒請米既建社倉乃立保甲法其法以十家為甲甲推一首五十甲推一人通曉者為社首逃軍無行不得入甲凡得入者又問其願與不願惟願者開其大小口若干共登一簿以便稽查謹案保甲法雖不為社倉而建但既建社倉此法斷不可少不然司事者無人舉報者無人賢否無由而别虛實何從而知故欲富國強兵者在所首重而欲敦倫善俗者亦不可少緩也朱子學貫天人豈漫無所據而力行哉從政郎董煟曰官司平日宜豫先抄劄五家為甲有死亡遷徙當月里正申縣改正凡知縣到任責令用心抄劄存縣庶免臨期里正有賣㺯之弊謹案臨期抄劄其弊無窮古今一轍惟保甲行而貧富瞭然矣然得之于平日者始為至當故豫為抄劄濟世之良模也眀張朝瑞行保甲法或言往嵗賑飢皆領于里甲今編保甲以代之何也曰國初之里甲猶今時之保甲昔相鄰相近故編為一里今年逺人散每見里長領賑輒自侵隱甲首住居窵逺難以周知及至知而來來而取取而訟訟而追追而得計所得不足以償所失故強者怒于言懦者怒于色只得隱忍而去甚有鰥寡孤獨之人里甲曰彼保甲報之于我何與保甲曰彼里甲報之我何與焉互相推委使民死于溝壑無可控訴者難以數計不若立為畫一之法俱歸保甲蓋凡編甲之民萃聚一處其呼喚易集其貧富易知昔熙寧就村賑濟張詠照保糶米徐寧孫逐鎮分散朱文公分都支給皆用此法也謹案除姦剔弊莫善于保甲故留心賑救者首當重也蓋保甲不行則審户不實無論恩施之大小悉為姦人冒破侵欺鰥寡孤獨以致嗷嗷待食者仍絶粒而填于溝壑也保甲顧不重哉王守仁巡撫江西行十家牌法曰凡置十家牌須先將各家門面小牌挨審的實如人丁若干必查某丁為某官吏或生員或當差役習某技藝作某生理或過某房出贅或有某殘疾及户籍田糧等項俱要逐一查審的實十家編排既㝎照式造册一本留縣以備查考及遇勾攝及差調等項按册處分更無躲閃脫漏一縣之事如指諸掌謹案十家牌一行真實無虛則保甲之法已得八九但須注眀左右鄰居及每季更換之人方稱至當否則遷移物故仍然混雜而無稽周孔教撫蘇時曰弭盜安民莫良于保甲法是法也為弭盜而設是以治之之道編之也人情莫不偷安故其成之也難為賑濟而設是以養之之道編之也民情莫不好利故其成之也易今令各府州縣擇亷能佐二一員専董其事大概先將城內以治所為中央每保統十甲各設保正副等人每甲統十户設甲長一人分東西南北以東一保東二保東三保等為號南與西北亦如之其在鄉四方保正副又以在城保正副分方統之假如在城東一保統東鄉一保在城東二保統東鄉二保餘則皆以此為法是保甲者舊法也以城中之保而分統鄉間之保者新設之法也若鄉間保長抗令即添差助城中保長協力處分凡公事可以立辦矣謹案保甲之法固不可緩若以在城保甲統在鄉保甲未免近于穿鑿不若文公所行之法簡便而穩當也嚴保甲總論曰保甲之法不立城市錯雜鄉村窵逺在位君子烏能知其賢否併有餘不足之家也惟行之有素按籍而稽姦宄不得容留貧富暸然在目冒破者無有矣則保甲不與社倉相為表裏者歟故不論賑濟賑貸賑糶飢年皆不可少雖平居無事之時亦不可不以周禮為先也管子行之于齊而桓公得霸衛鞅施之于秦而孝公富強蜀人之頌美張王二公皆不離于此也熙寧之可歎者安石欲寓兵于農反妨農時致民飢饉不足道矣程伯淳令于留民以此而戴之如父母朱文公建于閩貸以是而不敢有侵欺賢人君子尚不能舍此而致治後之為政者何皆夢夢而不知所重也惟范仲達行之而亦臻其妙後張㝎叟欲訪之而不得其傳蒼生之有幸有不幸也一至于此世道人心何從得古深為可歎繼此則董煟與張朝瑞言之鑿鑿悉中弊端不可不閲也王陽眀之十家牌不踰此意周孔教之撫蘇法賴此成規總之保甲之法行任彼千頭萬緒散漫難稽我則有條有理坦然眀白賞罰既當風俗自敦孟子亦言之矣死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦非此意耶五奏截留以資急用唐開元詔熙寧詔宋大中祥符詔王岩叟元祐詔吕頤浩韓仲通乾道詔胡林銓明聰元尚書省臣唐眀皇開元二十五年九月詔曰大河南北人户殷繁衣食之原租賦尤廣頃年水旱厫庾尚虛今嵗屬和平時遇豐稔而租所入水陸運漕緣腳錢雜必甚傷農務在優饒惠彼黎庶息其轉輸大實倉儲今年河南河北應送含嘉太原等倉租米宜折粟留納本州謹案不知者以為上供急知之者以民食亦不可緩也留上供以備飢年即趙威后對齊使云茍無嵗何有民茍無民何有君之意耳宋真宗大中祥符間詔江淮發運司嵗留上供米五千石以備飢年賑濟宋董煟曰祖宗之時上供之米猶每嵗截留以備賑濟則常平義倉無所吝惜可知然則祥符之詔可不端拜而大書乎神宗熙寧中浙江數郡水旱災傷詔撥本路上供斛斗二十萬石賑濟謹案昔人云民可百年無貨不可一朝有飢熙寧中雖多天災流行水旱頻仍然尚有司馬光趙忭吕公弼諸君子在豈不知國本之當重肯吝其倉庾哉九重一詔萬姓回春矣哲宗元祐元年王岩叟言淮南旱甚本路監司殊不留意詔發運司截留上供米一十萬石比市價量減出糶與缺米人户每户不得過三石謹案民情難撫最在飢年人不得食徙者徙而流者流四境靡寧矣岩叟之罪監司不亦宜乎幸朝廷即詔截留一十萬石減價出糶活蒼生于閭里輯姦宄于草茅一言出而享太平非岩叟之類哉元祐四年留上供斗斛三分之一為米五十餘萬斛盡用其錢買銀絹上供了無一毫虧損縣官而命下之日所在歡呼謹案民情千古一轍昔日歡呼于今豈異積于太倉而紅腐何若留外省以施恩愛民者所當急圖也髙宗紹興中户部尚書韓仲通乞以上供之米所餘之數歲樁一百萬石列廩貯之以備水旱詔從之上曰所儲遇水旱誠為有補非細事也謹案疏可題而不題非但不為小民作飢饉之謀亦不為君上建太平之策矣如韓公此疏一行餓莩賴之而生盜賊因之而息不大有功于社稷哉紹興五年湖南旱甚吕頤浩為帥奏截撥上供米三萬石又令廣西帥漕兩司備五萬石水運至夲路充賑濟全活甚衆謹案民不得食死亡相繼即無意外之虞已損國家元氣吕公之奏截留非有愛民憂國之實心者不能也孝宗乾道七年饒州旱傷截留在州樁管上供米三萬石獻助米二千石本州義倉八萬餘石又撥附近縣義倉五萬石又請借會子五萬貫接續收糴米麥賑濟江州旱傷截留上貢米六千五百餘石本州義倉米四萬四千餘石截留贑州起到一萬石賑糶本錢四萬餘貫作夲收糴米斛又撥本路常平米十萬石誘勸上户認糴米二萬八千六百餘石吉筠等州見起赴建康府米八萬餘石樁管米六萬七千餘石眀陳龍正曰饒州得米十六萬餘石錢五萬貫江州得米三十三萬餘石錢四萬貫賑飢可謂厚矣觀其多方措置非能如隋文帝之多藏也然彼有餘而不散以促其危此不足而樂散以綿其祚人主之存心天之福禍不其永鑒與乾道間胡銓疏中有云熙寧間浙西災傷而沈起張靚不先事奏聞朝廷是不遵太宗之制也元祐間浙西災傷而蘇軾先事奏乞處置是能遵太宗之制也今嵗諸路或旱或水方秋成之際米已翔貴日甚一日來春艱食灼然可知倘不先事而圖則乙酉流離之患臣恐不免謹案此疏所言足見截留之當早若臨期撥用雖多無益顧撥用于既荒之後莫若截留于未荒之前胡公以天下為己任力排和議深折權姦無刻不以蒼生為念故慮無不周言無不切也元世祖至元二十五年尚書省臣言杭蘇湖秀四州大水請輟上供米二十萬石審其貧者賑之謹案大水為災羣黎飢饉在朝大僚能據實奏請留供賑飢不可謂非留心國計者然以四州億萬之民僅恃此項以為救濟較之聖君賢主蠲賑兼行不惜重費者去之逺矣眀憲宗成化二年江淮大旱民自相殘命右副都御史林聰往賑之聰奏借江南糧及支運糧儲數十萬給民食與之種謹案江淮為財賦之區旱荒如此而不早為之計督撫大吏之愆也截漕給種亦一時之權宜總之災荒未至必先提策一假愛民仁心整頓一畨惠民經濟同寅協恭上以積誠召天和下為閭閻籌夲計斯得之矣奏截留總論曰眀儲巏與都御史書有云目前救荒簡便應急百方以思莫如截留漕運之米為善泰昌元年御史左光斗亦請截漕救荒可見智謀之士所見略同唐宋之詔有自來矣元眀雖不能及要亦未嘗不以此為善也若王岩叟之罪監司韓仲通之得上諭為國為民之心豈淺見者所能哉吕頤浩為賑飢而特請胡銓能先事而疏題生飢人于將斃散盜賊于無形得熒熒不救炎炎奈何之意矣林聰之奏請庶幾乎近之聖天子以四海為家豈必實粟于京而始為其粟哉况天庾既足塵腐者多枵腹之民賴之得活何為畏縮不題忠君愛國之臣當如是乎若夫看省分之大小奏截留之多寡不獨下救其民抑亦廣上之澤于無窮矣願牧民之君子推類以權其宜俾黎元偶處荒年而不知有飢餒之色上下和樂中外乂安豈不稱良有司之偉業歟六稽常平以杜侵欺漢耿夀昌唐陸贄隋文帝宋韓琦余馬靖司光慶厯詔蘇軾髙宗諭大元張光董張煟瑞明朝漢宣帝五鳯四年嵗豐榖石至五錢耿夀昌建言令邊郡皆築倉榖賤時增價而糴以利農榖貴時減價而糶以利民名曰常平倉民便之賜爵關內侯謹案一倉建而民農兩利固本之法莫踰于此豈為有司應急而成哉所以官司必不可令那用小民欲貸不必待乎奏聞利民而不利官耿侯立倉之意原是如此隋文帝開皇間衛州置黎陽倉陕州置常平倉華州置廣通倉轉相灌注漕關東及汲晉之粟以給京師置常平監謹案文帝之置倉亦云備矣但豐年既實粟于倉歉嵗即宜散給于民始得建倉之益是以能藏而又能發不似守藏者惟以吝惜為心則痌瘝視民之心時時切摯于衷矣唐陸贄奏議有云臣聞仁君在上則海內無餒莩之人豈必耕而餉之㸑而食之哉蓋以慮得其宜制得其道致人于歉乏之外設備于災沴之前耳魏用平糶之法漢置常平之倉隋氏立制始創社倉終于開皇人不飢饉除賑給百姓外一切不得貸便支用每遇災荒即以賑給小歉則隨事借貸大飢則録事分頒富不至侈貧不至飢農不至傷糴不至貴一舉而數美具可不務乎謹案陸贄之意除賑給百姓外一切不得貸便支用蓋積榖原以為民倘官長那用于平時荒年百姓更從何處支給况姦胥猾吏知其可以轉移即生多少情弊陸贄此奏可謂良法宋韓琦論常平倉米遇年嵗不稔合減原價出糶但出糶之時須令諸縣取逐鄉逐村下户姓名印給關子令收執赴倉糴米每户或三石或兩石不許浮數唯是坊郭則每日零細糶與浮居之人每日或一斗或五升則人人盡受實惠謹案鄉村來糴者以數石計城市來糴者以升斗計非常平不足以應之倘被借端那去急迫何從糴取故上司不得視為無礙錢糧下屬不可因公借用倘上下交侵不但無顔以對耿侯益且深有愧于韓公矣仁宗慶厯二年余靖疏內有云天下無常安之勢無常勝之兵無常足之民無常豐之嵗由是古先聖王守之有道制之有術倘有緩急不可無備景德中詔天下以逐州户口多寡量留上供錢起置常平倉付司農寺繫帳三司不問出入今若先為三司所支則天下儲蓄盡矣伏乞特降指揮三司先借支常平夲錢處並仰疾速撥還今後不得更支撥並依景德先降敕命施行謹案此疏説得何等眀白若先為三司借去蓄積盡矣遇飢年將何救濟余公之疏慮之深而言之切可為常平萬世不易之良規慶厯四年正月詔陕西榖翔貴其令轉運司出常平倉粟減價出糶以濟貧民謹案減價出糶始得常平之意若早為有司所那百姓何由受惠聖意何由宣布此上臺之稽察當嚴而小民之首告宜許也司馬光言常平之法此乃三代良法也向者有州縣缺常平糶本雖遇豐年無錢收糴又有官吏怠惰厭糴糶之煩不肯收糴盡入蓄積之家又有官吏雖欲趂時收糴而縣申州州再申其提點取候指揮動經纍月已是失時榖價倍貴以致出糶不行堆積腐爛此乃法因人壞非法之不善也謹案有此三害已為常平之大蠧况又有那用之端存無一二飢年仍不賑糶四害並侵一無所惠不可向常平而生歎乎蘇軾奏內有云臣在浙江二年親行荒政只用出糶常平米一事更不施行餘策若欲抄劄飢貧不惟所費浩大有出無收而此聲一布飢民雲集盜賊疾疫客主俱斃惟有依條將常平斛斗出糶即官司簡便不勞抄劄勘會給納煩費但得數萬石斛斗在市自然壓下物價境內百姓人人受賜古今之法莫良于此謹案東坡救荒惟以平糶常平為美後人猶議其賑有不及見有未廣則凡後之為司牧者正宜于常平之法竭盡經營興其利剔其弊使萬姓永為利賴荒年實有可恃斯為至計髙宗紹興庚午髙宗皇帝謂執政曰國家之常平倉以備水旱宜令有司以陳易新不得侵用若臨時貸于積榖之家徒為文具無實效也謹案不得侵用四字髙宗已深知有司之弊矣見得水旱為災數之難料非豫備榖粟以救濟生靈何以解一時之紛擾此詔可為萬世法從政郎董煟曰常平錢物不許移用不知他費不許移用至于救荒正所當用若必待報則事無及矣今遇旱傷去處州縣仰一面計度用常平錢于豐熟處循環收糴以濟飢民俟結局日以糴本撥還常平可也謹案此一莭説盡常平利弊何以近則不然便于官而不便于民常平似為官而設也嗚呼是所重者官所賤者民不知米由民出聚而不散巨橋粟黎陽米是禍端也故侵那者在所當稽而現存者宜于賑糶也元張光大有云常平者荒歉之預備無傷于農有益于民遇水旱雹蝗之變民無菜色不至流離餓殍之患良法也可以遏富豪趨利之心無抄劄户口之煩有司視為文具者原其所自糴本之未立耳若以御史所言將三臺追到贓罰銀兩各隨所屬撥為常平糴夲此為反本還原仁民之良策也循環糴糶以濟飢民何患乎米有限而不能遍及村落哉為政君子果能深味常平之意則可以固邦本結民心萬世之長策也謹案昔人知常平可以固邦本結民心謂返本還原之道莫若以贓罰銀兩收糴之非籌之熟而計之得者歟奈何後之司牧無米則聽之有榖則用之民之困苦絶不經營循吏果若是乎查盤之不可稍怠也眀矣眀張朝瑞有云伏覩大明會典洪武初令天下縣分各立預備四倉官為糴榖收貯以備賑濟次災則賑糶其費小極災則賑濟其費大奈何嵗久法湮各州縣僅存城內一倉其餘鄉社盡無之矣兹欲令各屬縣于東西南北適中水陸道達人煙湊集處各立常平一所本道查發贓罰併該府縣無礙銀兩糴榖入倉不許逼抑科擾平民或值中飢大飢以便賑糶賑濟富者不許混買仍用張詠賑蜀連坐法每嵗本道或該府管糧官單車一巡視焉以防官之治名而不治實者蓋社倉之法立以時收斂富者不得取重息騰髙價貧民嵗嵗受賜霑恩誠救荒之良策也謹案從古法久弊生貴乎經理者之搜剔盡善備災恤患誠無過于常平義倉今張公所言頗得致治之要然後世人情利弊尤須曲意體貼斟酌變通務使法立而民胥享法之利實在有益于草野斯稱順俗宜民之至計稽常平總論曰常平倉循環糴糶出入利民之妙法良有司能盡心于其間徹砥為民勿敢自便則蘇公美意猶然復見于今兹苐使各省雖有常平倉即遇飢年官不得發民不得食以避部議之嚴是豈知立倉之本意哉試思隋文之倉米粟未嘗不足獨以閉藏不給致敗慶厯詔髙宗諭庶幾其可也所以戒借用之弊者莫如陸贄與余靖得賑糶之美者首推韓琦與蘇軾法之弊也司馬光言之最詳倉之廢也張朝瑞論之最當其他皆可為規為式左傳云備豫不虞善之大者也常平善人之政稽察豫備之端可不慎重其事哉欽定康濟録卷二
