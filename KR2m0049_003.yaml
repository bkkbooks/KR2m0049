body:
  text: 事後之政計有六事後論曰事將告竣尤貴斡旋略有未安終虧撫恤况飢年之事務實民命之所關才得稍蘇瘡痍未起百姓暴露乏食久廢其叢居無定所室無完聚朝廷雖有蠲復來歲丁田之詔閭閻尚少目前耕種之需縱使商賈農工盡待給於官府錢米之賑流民災戶咸仰聽於有司安插之方田究荒蕪業歸怠惰此猶以餓殍之養養之而已非深思逺慮為兆人計長久之道也所宜以古為鑑率由典常識國家大體時用之宜廣聖主加惠黎元之意周詳懇摯圖維厥終足國計而釋民愁轉荒歲為樂歲因計事後之圖亦有六焉是在行之者之無務為其文可矣一贖難賣以全骨月難去聲齊管子詔漢朝二魯孔子後魏詔唐太宗遣使栁宗元文宗詔詔宋朝三元武宗憲宗詔明成祖鍾化民齊管子曰湯七年旱禹九年水湯以莊山之金鑄幣而贖民之無饘賣子者禹以歷山之金鑄幣而贖民之無饘賣子者謹案聖王之世可見亦有賣子之人貴乎上之人有以處之耳窮民命在旦夕若不聽其鬻賣必至骨肉相枕而死不更慘乎此聖王所以聽其賣而代其贖不禁其不賣也魯國之法魯人為人臣妾於諸侯有能贖之者取金於府子貢贖魯人於諸侯而讓其金孔子曰賜失之矣取其金則無損於行不取其金則不復贖人矣謹案孔子責子貢之讓金恐曠贖人之典耳可見聖心亦以贖人為美政矣後之君子曷勿體聖人責子貢之失求為政之得哉漢高祖五年詔民以飢餓自賣為人奴婢者皆免為庶人光武建武七年詔吏人遭飢饉及為青徐賊所略為奴婢下妻欲去留者恣聽之敢拘制不還以賣人法從事謹案此二詔為貧不為富可一不可再非中和之論也若免為庶人聽其去留少者空養育於平時壯者徒費銀錢於歉歲設遇再飢其誰復買不遭啖食定喪溝渠豈禹湯鑄幣贖人之意哉後魏高宗和平四年詔前以民遭飢寒不自存濟有賣鬻男女者盡仰還其家或因緣勢力或私行請託共相通容不時檢較令良家子息仍為奴婢今仰精究不聼取贖有犯加罪若仍不檢還聼其父兄上訴以掠人論謹案古云天地無私故能覆載王者無私故能容養若處事稍有不平難言至當良家子息不聼取贖然後以掠人論罪其誰敢議如一無所得盡放還家何以活將來之餓莩今高宗之詔非兩全之道歟唐太宗貞觀二年遣使杜淹賑恤關內飢民鬻子者出金帛贖還之明邱濬曰嗚呼人之至愛者子也時日不相見則思之挺刃有所傷則戚之當年豐時雖千金不易一稚一遇凶荒惟恐鬻之而民不售此無他知偕亡而無益也故不若官買之以實軍伍文宗閛成元年三月詔比聞兩河之間頻年旱災貧人得富家數百錢數斗粟即以男女為之僕妾委所在長吏察訪聼其父母骨肉以所得婚購之勿得以虛契為理謹案此詔勿憑虛契歸其所買骨肉有再聚之歡養育無驟失之患使上不代贖而令民自圖者此詔庶幾其可也父母斯民之次法耳栁宗元為栁州刺史不鄙夷其民惟務德化先是以男女質錢約子本相當則沒為奴婢宗元與民設法悉令贖歸衡湘以南士皆北面稱弟子謹案人知栁柳州以文章鳴世而不知其以德化民即如贖子女而歸其父母其德之施於民也逺矣羅池廟食有以哉宋太宗淳化二年詔陜西緣邉諸州飢民鬻男女入近界部落者官贖之真宗大中祥符三年詔前歲陜西民飢有鬻子者命官為購贖之還其家仁宗慶厯八年二月賜瀛莫恩冀州緡錢二萬贖還飢民鬻子謹案鳥雀有羣栖之樂人生豈無完聚之歡無如死生在於旦夕骨肉在所難全天子下念窮民悉為代贖父子得以永聚夫妻不復分離非仁政之一端乎元武宗至大元年十一月以大都米貴發廩十萬石減價以糶賑貧民北來民飢有鬻子者命有司悉為贖之謹案流落異鄉尤多苦切父母不得相親閭里曾無一識武宗贖其子而還其家猶無子而有子矣發廩賤糶以賑貧民是無食而有食矣非聖朝之盛典乎明成祖永樂十一年六月上召行在戶部臣曰人從徐州來言水災民有鬻子女者人至父子相棄窮極矣即驛賑之所鬻為贖還謹案骨肉逺離死生難料設遭疾病誰念垂危是不死於飢寒亦半喪於零丁矣天子憫其孤窮骨而月之賑而活之在覆載尚有缺陷之時在朝廷絶無生離之衆寧獨受恩者永懷不已即旁觀者亦感激無窮也憲宗成化二十三年詔陜西山西河南三省軍民先因飢荒逃移將妻妾子女典賣與人者許典賣之家首告準給原價贖取歸宗其無主及願留者聼隱匿者罪之謹案官給原價贖其歸宗若不首告罪其隱匿人亦何怨之有使如漢家之竟令放還或以掠人論是以勢而不以理豈君民之道哉明神宗萬厯二十二年鍾化民河南救荒疏臣仰體德意贖還民間荒年出賣妻孥四千二百六十三名皇上全人父子兄弟夫婦之倫離而復合斷而復續骨肉肺腑之親無悲思哀痛之慘矣但贖還之後不知其終保完聚否倘糊口無資後相轉貿如夢中乍會覺後成空思及於此不覺淚下惟帝念哉謹案鍾御史之善政不一而足即如贖人一種至四千二百餘名飢時不至喪失稍熟得能完聚家而室父而子孰非再造之恩歟贖難賣總論曰曾聞明季成化乙未科狀元費宏之父捐館資一十二金贖婦還夫狼狽而歸夜聞窗外神人曰今宵採苦菜作飯明年産狀元為兒宏果十九而登鄉薦翁生受吏部侍郎之封在貧士尚憐離散居天位何得視為漠然况其賣也非自作之孽也時當歉歲不賣親人終無生理其意以為餓死而無救不若活賣而分離後得一見未可知也在買者給其價而衣食之不惜捐費於豐年實欲服勞於後日既生其身且救其家均相有益高下難分但血淚已枯於異地而夢魂猶戀乎家鄉非天子之深仁厚德孰能救其婢使奴差之苦也然漢家之詔恣聼去留不償所值設遇薦飢於何得活豈善策哉故司牧能如栁宗元使臣得若鍾化民多方設法完彼親人皆合禹湯之心無愧孔子之教矣且父子不相見兄弟妻子離散仁政之所首疾也可使見之於世乎孟子曰禹思天下有溺者由己溺之也稷思天下有飢者由已飢之也聖賢之憂民如此此父母孔邇之歌所以流傳於盛世哉二憐初泰以大撫綏漢龔遂衡後魏崔光武詔詔唐代宗李栖筠宋富弼張全義蘇軾朱太熹詔明祖元成宗詔鍾化民漢宣帝時渤海歲飢多盜帝命龔遂鎮之遂曰民困飢寒故盜弄陛下之兵於潢池耳夫治亂民猶治亂絲不可急也乃單車至府悉罷捕盜令但以執田器為良民令民賣劍買牛賣刀買犢曰何為帶牛佩犢由是吏民富實而盜悉解謹案古稱荒政貴不治之治也使太守必欲勦除盜賊以清四境不但不能使之安必將迫之亂今念煢煢赤子飢餓使然衣食足而禮義生惟務農桑富其一郡較之血我干戈腥我天地者霄壤矣光武帝建武六年正月詔曰往歲水旱蝗蟲為災榖價騰躍人用困乏朕惟百姓無以自贍惻然愍之其命郡國有榖者給廩高年鰥寡孤獨及篤癃無家屬貧不能自存者如律二千石勉加撫循無令失職謹案瘡痍初起調護無方必死無疑之症矣光武知之以往歲災傷特命賑給且勉二千石不可失職大得安不忘危之道哉後魏崔衡為秦州刺史先是河東年飢劫盜大起衡至修龔遂之法勸課農桑周年之間寇盜止息謹案崔衡既可倣而行之於魏後人獨不可效而施之於世乎盜賊悉除農桑得盛龔君妙法原在人間人自不能則耳好大喜功者徒自誅求於不已豈良有司哉唐代宗元年十一月制逃亡失業萍泛無依特宣招綏使安鄉井其逃戶復業者宜給復三年如百姓先貨賣田宅盡者宜委州縣取逃戶死口田宅量丁口充給仍仰縣令親至鄉村安存處置務從樂業以贍資糧謹案逃亡失業不能撫綏還鄉無倚復又他之烏知其不為盜也今既各有處置人民樂業泰階將起是安民適所以安己富民即所以富君非美詔歟其握要處在處置樂業以贍資糧尤見深恩代宗時李栖筠為浙西觀察使屬師旅飢饉之後百姓流離講誦之徒數年竟絶乃大閛學館招延秀異表大儒河南禇沖吳郡何員等超資授官為學者師身自執經問疑義由是逺邇趨風鼓篋升堂者至數百人教化大行謹案禮義者經國之大典也豈因飢饉之後可廢而不講乎李觀察特為之整理誠得聖人教之之義矣不大有功於名教耶僖宗光啓三年張全義為河南尹初東都薦經飢饉飢民不滿百戶全義選麾下十八人材器可仕者人給一旗一榜謂之屯將使詣十八縣故墟落中植旗張榜招懷流散勸之樹藝蠲其租稅惟殺人者死餘但笞杖而已由是民歸之者如市數年之後都城坊曲漸復舊制諸縣戶口率皆歸復桑麻蔚然野無曠土全義明察人不能欺而為政寬簡出見田疇美者輒下馬與僚佐共觀之召田主勞以酒食有蠶麥善收者或親至其家悉呼出老幼賜以茶綵衣物有田荒穢者集衆杖之或訴以乏人牛乃召其鄰里責使助之由是鄰里有無相助比戶豐實凶年不飢遂成富庶焉謹案兵火之餘尚能富足太平之世何事凋零乃知世有治人實無治法在上者能如張公之招撫流亡勸之樹藝誰不勇往耕耘互相賙濟乃知一人之鼓舞關係萬姓之豐盈何以後世之官但知自富不知富民此凋零之所由來耳茍能以富己之圖維變而為富民之善策要亦無有不富者矣後來屈指誰可並驅宋富弼鎮青州適河決八州之民俱徙京東既以救濟至次年麥熟於是各計其路之逺近授糧使歸生全者五十餘萬人謹案家不歸無以安其身糧不足無以資其歸富公計其逺近授糧遣歸不使有窮途之窘始也救之生終也給其歸始終相濟故能位極人臣而名垂萬世也蘇軾論積欠狀臣親入村落訪問父老皆有憂色云豐年不如凶年官吏以夏麥既熟舉催積欠胥徒在門枷鎖在身求死不得故流民不敢歸鄉臣聞之孔子曰苛政猛如虎昔常不信以今觀之殆有甚焉水旱殺人百倍於虎而人畏催欠又甚於水旱百姓何由安生朝廷仁政何由得成謹案催欠於麥熟之際以致居者日以擾流者不敢歸蓋些少之收還官則仍然舉家枵腹救口則目前鞭撻奚辭是飢於年者可救飢於官者難逃昔邵康莭有云寬一分小民受一分之賜凡為司牧者當以撫恤黎民為首務催征國課固不可緩苐必揆時度勢審知現在之情形勿以荒田災纍之窮民認作頑戶抗糧之百姓庶幾政無刻厲而寬厚愛民之意乃行朱熹疏臣竊以為救荒之政蠲除賑貸固當汲汲於其始而撫存休養尤在謹之於其終臣愚欲望陛下赦臣之罪察臣之言亟詔有司凡去年被災之郡盡今年毋得催理積年舊欠及將去年倚閣夏稅悉與蠲放其上二等人戶當此凶年細民所從仰食其間亦有出粟減價賑糶而不及賞格者伏望聖慈普加恩施許將去年殘欠夏稅多作料數逐年帶納則覆載之間幅員之內當此災旱之餘無有一夫一婦不被堯舜之澤矣謹案名賢之為百姓甚於自己之為一身真誠懇切無所不至文公以民之貧者念其困苦而赦之民之稍可者念其救荒而帶徵安富救貧略不稍遺豈易及哉元成宗大德三年正月詔比年水旱疾疫百姓多被其災巳嘗蠲復賑貸尚慮恩澤未周其大德三年腹裏諸路合納包銀俸錢盡行除免江南等處夏稅以十分為率量免三分五年詔各路風水災重去處今歲差發稅糧並行除免貧乏缺食人民之家計口賑濟乏絶尤甚者另加優給其餘災傷亦仰委官省視存恤謹案人君恩澤能於百姓有加無己正是培植元氣之處誠足為撫綏兆庶者之法守也矣明太祖洪武十年九月敕中書省去歲浙西嘗被水災民人缺食朕嘗遣官驗戶賑濟今雖時和年豐念去歲小民貸息已重既償之後窘乏猶多今賴上天之眷田畝頗收若不全免舊年被災之民今年田租不足以蘇其困爾中書其奉行之謹案太祖以窘乏猶多四字存之胸中則免兩租之念已勃然而不可遏矣非履安思危視民如傷之至歟要之民為邦本本固邦寧祖宗培植於前子孫保護於後權宜斟酌計出萬全是誠致治之要道也神宗時巡視河南御史鍾化民疏中有云臣每至粥厰流民告稱一向在外乞食離鄉背井日夜悲啼今蒙朝廷賑濟情願歸家但無路費又恐沿途飢死臣體皇上愛民之心令閛封等處查流民願歸者量地逺近資給路費給票到夲州縣補給賑銀務令復業據祥符縣申報共給過流移男婦二萬三千二十五名謹案鍾御史救民不盡善盡美則不肯止假如窮民雖有路費而不補給賑銀歸無所望未免逡巡今聞有此口糧先有所藉生計得以徐圖故歸而恐後者多矣立法不可與富鄭公後先嫓美耶憐初泰總論曰既荒之後如病初起不能撫綏再加勞困是不死於病篤之時而反亡於初愈之日矣不大為可歎哉麥熟矣旦夕可免啼飢之苦有麥則然蠶畢矣出入可釋無衣之歎無絲則否故小民有些須之蓄尤不可有耗散之端倘若徘徊岐路歸計無從劫掠相侵空囊如洗或追呼逼迫或禮義罔知不仍如遭倒懸之苦耶於以知歸流也弭盜也停徵也教養也四者皆仁政之大端撫綏之急務自漢唐以至元明莫不各有善法所當急效者也才履豐年方臻熟嵗可不下體民心上承天意以固我金甌哉雖然若弭盜而不歸其流則劫奪之患不息教養而不停其徵則妨民之困不除農桑何由得盛學校何從得興此又相因而為用者也缺一不講烏乎可哉三必賞罰以風繼起齊桓公詔漢武帝齊威王郭賀南北朝沈演之宋哲宗詔唐德宗詔孝宗潘劉潢明鑑元薩里布哈張士宏周孔教齊桓公之郭問父老曰郭何以亡曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰郭公善善不能用惡惡不能去所以至此耳謹案賞罰者朝廷之大權明決者經綸之妙用秉其權則必善其用倘聰明周徹而裁斷之際不能不瞻顧遲回揆之上理究非所宜所以善惡在前已灼見其根柢務即用其激揚賞罰嚴明而四方風動治國之要莫大於此齊威王語即墨大夫曰子令即墨毁言日至及使人視即墨田野闢人民給官無事東方以寧是子不賂吾左右求助也封之萬家邑語阿大夫曰子令阿譽言日至及使人視阿田野不闢人民貧餒是子賂吾左右求助也是日烹阿大夫及左右嘗譽者自是莫敢飾非而齊國大治謹案威王之賞罰明齊國之萬事理可見愛民者不可以不賞不賞無以酬既往飾非者不可以不罰不罰何以戒將來救荒者誠能體此意以用人則得任賢勿二去邪勿疑之道矣漢武帝元鼎二年詔仁不異逺義不辭難今京東雖未為豐年山林池澤之饒與民共之今水潦移於江南迫隆冬至朕懼其飢寒不活江南之地火耕水耨方下巴蜀之粟致之江陵遣博士等分循行諭告所抵無令重困吏民有振救飢民免其厄者具舉以聞謹案分人以財謂之惠惠之及人能生人於垂斃則功亦不小矣故凡有功於飢歲不敢望報者君子之存心必有以報之者朝廷之大典至若小民尤為善舉可不上聞乎明帝永平三年荆州刺史郭賀官有殊政上賜以三公之服黻黼冕旒敕行部去幨帷使百姓見其容以彰有德謹案盛矣哉上之所賜也他郡知之有不自反者歟昔魯恭有云萬民者天之所生天愛其所生猶父母愛其子故愛民者天祐之君寵之民戴之史載之衆美偹於一身矣胡為乎不以善政為先也南北朝宋文帝元嘉十二年東土飢遣揚州治中從事史沈演之巡行所在演之表曰宰邑敷政必以簡惠成能涖職闡治務以吏民著績故王奐見紀於前叔卿流稱於後竊見錢塘令劉道真餘杭令劉道錫皆奉公恤民恪勤匪懈百姓稱詠初被水災之時餘杭高隄決潰洪流迅激勢不可量道錫躬先吏民親執板築塘既屹立縣邑獲全經歷諸縣訪核名實並為二邦之首最治民之良宰上嘉之各賜榖千斛謹案有功不賞吝惠不施淮隂之論項王婦人之仁耳其何以濟演之特舉二令宋帝賜榖千斛名垂後世不可為勵衆之曠典歟後之勤於民事者幾縣受榖千斛者幾人甚可慨也唐德宗貞元二年正月詔親人之任莫切於令長導王者之澤以被於下求庶人之瘼以聞於朝得失之間所係甚大昨者詳延羣彥親訪嘉猷尚書司勳員外郎竇申等十人潔己貞明處事通敏人不流亡事皆辦集就加寵秩允叶前規嗚呼弛張係於理不係於時升降在於人不在乎位非次之恩以待能者彰義黜惡期於必行凡百君子各宜自勉謹案堯舜之時雖有水旱之災不聞有溝渠之死者要在得人而理蓄積有備耳今此詔加意於賢良勉郎官於撫字非握要之典耶宋哲宗紹聖元年十一月詔河北賑飢諸路恤流亡官吏有善狀才能顯著者以聞謹案世豈無才乎特患有才而不能知耳或為小人之所蔽或在草茅而無聞即有伏龍鳯雛不得司馬徽而薦揚之能致魚水之得歟此詔有才能者令舉以聞人惟恐才之不見用於世矣何遁迹之有孝宗淳熙八年七月賞監司守臣修舉荒政者十六人十二月癸卯朔以徽饒二州民流者衆罷守臣官出南庫錢三十萬緡付浙東提舉常平朱熹賑糶丙辰詔縣令有能修舉荒政者監司郡守以名聞謹案賢者賞之不肖者罷之又出庫錢令朱子賑糶且詔監司郡守各奏修舉荒政之員天地養萬物聖人養賢以及萬民孝宗非身體而力行者哉潘潢覆積榖疏內有云凡境內應有墟􅜌壩堰坍缺陂塘溝渠壅塞務要趂時修築堅完疏濬流通倘壞久不修修不完固或因而害民者並為不職從實按勘施行遇該考滿務查水利無壞方許起送有能為民興利如史起溉鄴鄭國開渠之利具奏不次擢用該管官員亦照所轄完壞多寡分數定注賢否一體旌别謹案世之有賞罰如門之有樞機賞罰不行如樞機壞矣尚能望其啓閉有時而足以衛護多人耶潘公此疏歷歷指出如是者當罰如是者當升誠得樞機之妙者矣元文宗時監察御史薩里布哈張士宏等言朝廷政務賞罰為先功罪既明天下斯定國家近年自特們德爾竊位擅權假刑罰以遂其私綱紀始紊逮至泰定爵賞益濫比以兵興用人甚急然而賞罰不可不嚴夫功之高下過之輕重皆繫天下之公論願命有司務合公議明示黜陟功罪既明賞罰攸當則朝廷肅清紀綱振舉而天下治矣文宗嘉納之謹案大舜用九官誅四凶德被天下而功垂不朽後人可不法之以圖治歟御史以賞罰為先文宗嘉之孰謂非紀綱振舉之朝哉明孝宗𢎞治十年二月巡撫鳯陽都御史李蕙奏致仕六安州知州劉鑑前在州四年積預備倉糧餘十萬石後致仕適連歲荒歉州民賴倉糧存濟者甚衆請加旌異上曰鑑雖致仕餘惠在民其仍進階奉政大夫以勸為民牧者謹案知州之賢巡按之奏孝宗之賞皆得報功要法可以勵繼起但其在任之時其竭力圖維預備倉糧潔己愛民不聞上臺奏請直待餘惠及民而始邀天眷其初之蔽賢者非姦佞而何周孔教撫蘇時有云大司徒保息萬民之政既曰恤民又曰安富大率民不可以勢驅而可以義動故民有出粟助賑煮粥活人者上也有富民巨賈趂豐糴榖歸里平糶循環行之至熟方持夲而歸者次也有借粟借糧借牛於鄉人待年豐而取償者又其次也凡此之民皆屬尚義於此權其輕重或請給冠帶或特給門匾或給以賞帖後犯杖罪子孫皆可準折皆所以奬之而不負之也此在會典及纍朝詔旨俱有之有司所當急行者也謹案夫子云道千乘之國敬事而信可見信為治國之夲救荒者飢時賴之以救民事後豈可置之而不問周君序三種救荒之人急宜表彰綱舉目張斯為得信賞必罰之道必賞罰總論曰古云有功不賞有罪不誅雖唐虞不能以化天下今多列報功而罰罪不載非謂不職者可以寬其罰蓋不待事畢早已逐而去之也此即范仲淹一家哭何如一路哭之意耳昔高澄問政要於杜弼弼曰天下大務莫過於賞罰賞一人使天下之人喜罰一人使天下之人懼二事不失自然盡善時有聞弼之言者大説曰言雖不多於理甚要故明於致治者無不以二端為大務也漢唐之典宋元之事盡列於前彰彰可據至劉鑑之不蒙即賞者蔽賢者之罪也周孔教之欲奬尚義者勵衆之道也乃知災傷之際不有賢良建策斡旋解民倒懸出之湯火孰與活垂斃而生餓殍禮記云聖人南面而治天下報功其二也可見賞罰者致治之大典也而可忽乎哉不特此也城市鄉村若有孝弟莭義之人或敦倫或濟世者此亦天地之正氣人間之儀表安可不一併表揚以彰有德果能若是是無往而不以唐虞之化化天下矣國有不治社稷有不安者哉四籌匱乏以防薦飢漢景帝齊何敬叔南北朝張劉敞唐晏宋范純仁中書省言蘇朱軾熹毛鼎新朱英明陳智伯鍾化民漢景帝時上郡以西旱復修賣爵令而裁其價以招民謹案救荒如救焚惟速為佳使價稍高則觀望者多後今裁價而招民人必勇往向前可謂納粟救荒之善策矣何匱乏之有宣帝地莭三年京兆尹張敞上書國兵在外田事頗廢素亡餘積雖羌虜已破來春民食必乏窮僻之處買亡所得縣官榖度不足以賑之願令諸有罪非盜受財殺人及犯法不得赦者皆得以差入榖此八郡贖罪務益致榖以預備百姓之急左馮翊蕭望之駁議曰今欲令民納粟贖罪則富者得生貧者獨死是貧富異刑而法不一也西邉之役民失作業雖戶賦口斂以贍其困乏古今通義百姓莫以為非以死救生恐未可也謹案無辜之民困之以賦不若令有罪之人贖之以財出其情願輸其當然寬一人而生數十人之身命變通之方莫妙於此况狡猾之民得安其生四方安樂民皆改行從善所謂禮義生於富足此際轉移真不費之惠矣可勿行哉南北朝齊何敬叔為長城令有能名在縣清亷不受禮遺夏莭至忽榜門受餉數日中得米二千餘斛他物稱是悉以代貧人輸稅謹案一人受汚四境得食非智者能之歟然其汚也易釋其智也實深君子曰潔己愛人莫敬叔之若矣唐代宗時劉晏掌財賦以為戶口滋多則賦稅自廣故其理財以愛民為先諸道各置知院官每旬月具州縣雨暘豐歉之狀白使司豐則貴糴歉則賤糶或以榖易雜貨供官用及於豐處賣之知院官始見不稔之端先申至某月須若干蠲免某月須若干救助及期晏不俟州縣申請即奏行之應民之急未嘗失時不待其困斃流亡餓莩然後賑之也由是民得安其居業戶口蕃息謹案大學一書劉晏能熟讀有德有人一莭行之事而見諸政其後除劉公之外凡理財者或急急於徵求恤災者且遲遲而賑救不知國之與民所係甚重偶有偏災即為救濟務使民有安全之樂而無困厄之憂則誠仁主愛惠子民之至計矣宋范純仁知襄城襄俗不事蠶織鮮植桑者純仁因民之有罪而情輕者使植桑於家多寡視罪之輕重按所植榮茂與除罪謹案愛民之人罰之者即所以益之也閛一面之恩錫自新之路與蒲鞭示辱醇酒強人同一意耳况瘡痍初起尤當以此為法元祐間蘇軾守杭嘗於城中創置病坊名曰安樂坊以僧主之仍請於朝三年醫愈若干人乞賜紫衣度牒一道復買田歲收租米千斛資之軾還朝近臣有以黃白金為餽軾恐却之以拂故人意受之則傷亷乃悉畀於杭用助買田而以書致謝意謹案東坡此舉即劉凝之受餉分給之意也人不我拂德及萬民一舉而數善備焉嗟夫東坡行之於前以救疾疫今人何不踵行於後使災民得所養耶孝宗興隆間中書門下省言河南江西旱傷立賞格以勸積粟之家凡出米賑濟係崇尚義風不與進納同謹案崇尚義風不與進納同此二語鼓舞天下救荒捐納之人真妙語也一種愛民深心沛乎筆底宜榜示四海以為捐納者勸朱熹奏內有云湖南江西旱傷米價踴貴細民艱食理合委州縣官勸諭富室如有賑濟飢民之人許從州縣保明申朝廷依今來立定格目給降付身補授名目竊恐有司將同常事未即推恩致使失信夲人無以激勸來者欲望聖慈特降睿旨依已降指揮將陳夔等特補合得官資庶幾有以取信於民將來或有災傷易為勸諭謹案聖賢之心豈為捐粟者計實為阻飢者謀若荒而令之捐熟而遲其授適有不足再欲舉行其誰我信左傳有云君子之言信而有徵故怨逺於身也毛鼎新黃岩人授浙西提舉茶鹽司準遣改常平司準遣其長有欲獻羡餘四十萬者鼎新力爭以置社倉明陳善曰鼎新此舉不啓君上之侈心而於民有德且俾其長免言利干進之咎一舉而三善具焉明宣德末永豐飢亂民嚴季茂等千餘人就縛布政陳智伯謂脅從者衆不可概令瘐死倡捐俸為粥賑之奏報決首惡三十餘人餘皆免時有告富民與賊通者三百餘人智悉令詣官自告諭之曰果若人言下吏鞫訊爾尚能保家乎今若能出粟濟飢民當貸爾衆流涕乞如命得粟萬餘石所活不可勝計謹案富民遭官一審家資盡入吏胥之手飢民其有濟乎陳公使之出粟活人真上智也窮黎被脅而從情有可矜富家向賊求生於理可恕處之悉當非秦鏡歟成化間朱英巡撫甘肅尋總督兩廣在甘肅積軍羡三十萬在兩廣四十餘萬流民復業者十五萬家或謂公先後督撫積羡撫民功多矣何不奏聞英言此邉臣常分何足自薦謹案流民復業者十五萬家非以積羡濟之而能然歟在甘肅在兩廣莫不以積羡撫民且弗自薦心何純也較之獻於天子而邀榮遇者天壤矣御史鍾化民疏內有云積儲之法在民莫善於義倉在官莫善於常平中州常行此法矣但官府之遷轉不常倉庫之廢興不一燃眉則急痛定則忘豈有濟乎臣令各州縣查將庫貯糴夲及堪動官銀榖賤則增價以糴榖貴則減價以糶設遇災荒先發義倉義倉不足方發常平不必求賑在在皆恤賑之方無俟發粟年年有不費之惠也昔神農之教曰有石城十仞湯池百步帶甲百萬無粟不可守也倉廩既實奚憂盜賊哉湯音啇湯池者水盛之池也謹案燃眉則急痛定則忘圖治之所切戒者莫大於此若飢後而不為之備又何以長享升平世稱郅治乎所以村村有儲處處有倉則民􅎋富而水旱可無急迫之憂籌匱之總論曰年運之荒歉實無常也而窮民之待哺情孔亟焉偶值無年必多匱乏茍不設法補足社倉不猶生之於東隅而窘之於西榆乎用集其四以偹採擇一曰捐職二曰贖罪三曰用羡餘四曰假餽納勸分未嘗不妙但恐難言於既輸之後耳捐職如景帝之裁酌宋孝宗之諭義深得鼓舞之方朱夫子則又論之詳而勉之至是法可勿行乎贖罪張敞所論千古嘉謨免一人之死救千百人之生豈蕭望之所能及哉法內行仁范忠宣陳智伯又為之最矣以羡餘而偹荒者則有毛鼎新朱英之可鑑將餽納而救賑者則有何敬叔與蘇東坡之可憑皆潔己愛民之君子何皆莫之法也若使理財者能如劉晏籌社倉者能如鍾化民尚有燃眉則急痛定則忘之誚乎古昔三年耕必有九年之畜以三十年之通制國用總以籌匱乏於豐年不使民間有災荒飢饉之苦耳仁哉聖心典制所垂抑何惠民深而憂民之心更如此其懇摯也耶五尚節儉以裕衣食唐杜堯漢詩齊晏嬰羊續南北朝孔奐禇遂良唐高祖詔宋寇準龎太籍詔明祖元尚文海瑞陶唐氏帝仁如天智如神就如日望如雲金銀珠玉不飾錦繡文綺不展奇怪異物不視玩好之器不寶淫佚之樂不聼宫墻室屋不堊色音惡白土也衣履不敝盡不更為也謹案人知聖人之儉乎心乎萬民不但不以金玉錦繡為貴亦無暇及於此也隋文未嘗不儉閉粟吝施不知君民一體之理猶鷦鷯而學鵬飛不能倣佛於萬一耳齊相晏嬰字平仲今山東萊州府人嬰以莭儉重齊一裘三十年豚肩不掩豆齊國之士待以舉火者七十餘家謹案晏嬰齊相也蕭何漢相也一衣食之儉也如此要亦無恆産之足治矣後世美嬰而不美何者嬰能儉以及人而何但知為子孫計耳漢杜詩字公君河內汲人也仕郡功曹遷南陽太守性莭儉而政治清平以誅暴立威善於計略省愛民役造作水排鑄為農器用力少見功多百姓便之又修治陂池廣拓土田郡內比室殷足時人方於召信臣故南陽為之語曰前有召父後有杜母謹案為政而以母稱其惠之及民也可知矣身崇莭儉農務為先以致比屋殷足較於分俸及人者更握其要吾願愛民之君子皆以杜公為法可也羊續字興祖太山平陽人也中平三年拜南陽太守當入郡界乃羸服間行侍童子一人親歷縣邑採問風謡然後乃進境內驚竦莫不震懾時權豪之家多尚奢麗續深疾之常敝衣薄食車馬羸敗府丞嘗獻生魚續受而懸於庭丞後又進之續乃出前所懸者以杜其意靈帝欲以續為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶續乃坐使人於單席舉緼袍以示之曰臣之所資唯斯而已謹案力挽頺風人之所難興祖間行入郡矯其故弊舉緼袍以示使者不以三公易其介名垂後世較於富貴一時殁則無聞者逺矣南北朝孔奐字休文晉陵守清白自勵妻子不入衙齋得俸即分贍孤寡一郡號曰神君富人殷綺見其儉素饋以氊衣奐謝曰百姓未周豈容獨享溫飽謹案孔君之儉素必欲百姓足而始自享其溫飽則無時無刻不以窮民為念矣其分俸也在所必然氊衣之惠徒增其歎今之為守者對孔君而果能無愧歟唐高祖武德二年詔曰酒醪之用表莭制於歡娛芻豢之滋致甘旨於豐衍然而沉湎之輩絶業亡資惰窳音與之民騁嗜奔欲方今𤇺燧尚警兵革未寧年穀不登市肆騰踴趨末者衆浮冗尚多肴羞麴蘖重增其費救敝之術要在權宜關內諸州官民宜斷屠酤謹案人情多縱知流而不知節知放而不知檢欲倉箱之固也得乎一遇飢年仍為餓莩此詔令官民盡斷屠酤誠得莭制嗜欲之道矣太宗嘗怪舜造漆器禹雕其爼諫者十餘不止小物何必爾耶諫議大夫褚遂良對曰雕琢害農力纂繡傷女工奢靡之始恣縱之漸也漆器不止必金為之金又不止必玉為之故諫者救其源不使得閛及夫橫流則無復事矣帝咨美之謹案奢靡之始恣縱之漸天子且然而况小民乎倉箱朝盡困窘暮乘非死即流勢所必至可不知所以莭之哉禇公之對自天子以至庶人皆不可不察也宋寇凖字平仲渭南人真宗朝拜相決䇿成澶淵功寢室一布幃二十載不易封萊國公處士魏野贈詩曰有官居鼎鼐無地起樓臺北使至歷視諸宰執語譯者曰孰是無地起樓臺相公譯音亦即今之通事也謹案清介而為外邦之所慕豈他人所能及哉叱堂吏之例簿謝門生之三䇿皎皎素風可規天下此枯竹生笋而竹林祠之所由起也可云生無樓閣地死有竹林祠仁宗時右司諌龎籍奏曰臣昨在太平州界檢會廣德軍判官錢中孚等狀稱諸鄉貧民多食草子名曰烏昧並取蝗蟲暴乾摘去翅足和野菜煮食臣竊思之東南上供糧米每歲六百萬石至府庫物帛皆出於民民於飢年艱食如此國家若不莭儉生靈何以昭蘇臣今取草子封進望宣示六宮藩戚庶抑奢侈以濟艱難謹案龎公之論莭儉欲先君而後民由宮廷而及國誠得為治之夲民之所輸若彼所食若此不深為可嘆哉是故聖君愛民必使六合咸享豐盈衣食充足猶不敢少有崇侈以自俸也此粟紅貫朽所以稱文景之盛治耳元成宗大德九年西域賈人有獻珍寶求售者議以六十萬錠售其直省臣有謂左丞尚文者曰此所謂雅庫勒大珠也六十萬售之不為過矣文問何所用之答曰含之可不渴尉面可使自有光文曰一人含之千萬人不渴則誠寶也若一寶止濟一人其用已微矣吾之所謂寶者米粟是也有則百姓安無則天下擾以功用較之豈不愈於彼乎謹案世之寶珠玉者多矣有能因珠玉而念及米粟以濟百姓者幾人賢哉左丞也照乘之珠不能以安社稷卞和之玉後復仍授他人何不寶米粟以濟蒼生永國祚而享帝王之福哉明太祖洪武三年詔禁民僣侈凡庶民之家不得用金繡錦綺紵絲綾羅止許用紬絹素絲其首飾釧鐲並不許用金玉珠翠止用銀五年詔古之喪禮以哀戚為夲治喪之具稱家有無近代以來富者奢僣犯分力不及者揭借財物炫耀殯送及有惑於風水停柩經年不行安葬宜令中書省集議定制頒行遵守違者論罪如律十四年令農民之家許穿綢紗絹布啇賈之家止許穿絹布如農民之家但有一人為啇賈者亦不許穿綢紗謹案有可用而不用謂之儉約有不當用而用謂之僣妄今民間僣妄者多非有司之過歟洪武三詔獨十四年令內尤多重農之意敦夲而莭人非深明治道者有此美政耶海瑞知淳安縣時鄢懋卿總理天下鹽政驕奢無度每巡視郡縣所過供給費且不資獨瑞供帳菲甚懋卿雖怒素聞其強項亦斂威去後擢主事抗章直諫剛正動於一時至萬厯十三年帝聞其名擢為南僉都一時京師自大僚以及郎丞無不奉法而雨花牛首等景遊宴頓絶都人巷議比之包老復生謹案細閲剛峰之抗疏與椒山之諌章片言隻字皆非他人所敢道也一種忠君愛國之心溢乎筆底不知其有身矣遑惜其他痛哉椒山蒙不測剛峯得善終者反側之徒已去故也其清介之風足以衛民足以易俗非斯民之保障哉尚莭儉總論曰奢與儉較儉固美矣但儉而不能有益於人見法於世不因吾儉而去其奢或惡其奢而師吾儉此即於陵仲子之流矣烏乎取帝堯莭於己而儉於世淡泊無為太古之風也唐高祖明太祖皆躬崇莭儉垂裕後人晏嬰以及海瑞諸君子儉以持已惠及親鄰者有之富足斯民者有之名聞外邦者有之移風易俗者有之靡不因我之儉而有益於世者也可不則之以範斯民哉昔宋均有言亷吏清在一己無益百姓似乎不足多也故其亷使非於陵仲子之亷兼能濟人末俗頺風賴之而振始可稱有功于斯世耳白香山有云人民之貧困者由官吏之縱欲也官吏之縱欲者由君上之不能莭儉也故上一莭其情而下有以獲其福上一肆其欲而下有以罹其殃此至言也易曰莭以制度不傷財不害民是莭者素為聖人君子之所重矣曷勿身以先之固萬姓之倉箱而為久安常治之道哉六敦風俗以享太平魏西門豹明帝漢文翁仇覽隋辛公義唐太宗趙有煚徐功宋沈度元仁宗朱太熹明祖魏文侯時西門豹為鄴令發民夫鑿渠引漳水灌田以蘇民困俗信女巫歲為河伯娶婦選室女投河中豹及期往視指女曰醜煩大巫入報河伯即呼吏投之羣巫驚懼乞命從此禁止謹案利不興則民無以豐衣食害不除則人何以安室家有一於此太平何由得享今西門豹之為鄴令也引漳水以灌田溺大巫而救女是拯民於陷阱之中而登之袵席之上者矣惡俗頺風有不為之煥然一新歟漢景帝末文翁為蜀郡守廣仁愛好教化見蜀中僻陋有蠻地風文翁欲誘進之乃選郡縣小吏有才者張叔等十餘人親自飭厲遣詣京師受業博士或學律令有至郡守刺史者又修起學宮於成都市中高者以補郡縣吏次為孝弟力田由是教化大行至武帝時乃令天下郡國皆立學校官自文翁為之始云謹案人之禮義廉恥四維也使無學校教誨將不知四者為何物矣何由而大其德業享其太平文翁施仁愛而廣教化不特蜀中為之一新天下後世皆為之感動故學校之官雖建於武帝而實由文翁始其有功于名教不亦多耶明帝永平二年幸辟雍拜三老五更引五更桓榮及弟子升堂上自為辨説諸儒執經問難於前冠帶薦紳之士圜橋門而觀聼者蓋億萬計自天子諸王侯及大臣子弟功臣子孫莫不受經後宮親屬概不重用以是吏得其人民樂其業逺近畏服戶口滋殖謹案勳業爛然光照天地必從古今典册中來則致治之道舍經書禮樂之人其誰與歸惟文帝首重斯文不用國戚而循良疊見若郭賀宋均劉平諸君子之美政彰彰青史則之而可以惠民可以致治凡欲廣教化美風俗者曷不以明帝為法哉仇覽一名香為蒲亭長有陳元者母訟其不孝覽驚曰守寡養姑奈何欲致子於法其母遂感悟而去覽親至其家諭以大義卒成孝子邑令王渙曰不罪陳元殊少鷹鸇之志覽曰鷹鸇不如鸞鳯耶謹案革人之面不若革人之心置人之死不若救人之生王渙能以王法坐不孝仇覽獨不能以嚴刑治逆母乎覽則不然躬行勸化使蒙天性慈者慈而孝者孝不特陳元思報劬勞之德而闔邑無不動孝養之心有恥且格末俗一新是王渙欲為其易而仇覽獨任所難鸞鳯鷹鸇之喻不信然乎隋辛公義為牟州刺史下車先至獄所決斷十餘日囹圄一空後有訟事應禁者公義即外宿人問故曰忍禁人在獄而我獨安寢乎自是州人感化以訟為恥謹案無謂末俗之難移也上果有愛民之官下斷無不化之民於公義見之矣訟之為害也結深仇費錢帛起姦偽隳事功不一而足人情由此而惡薄風俗何由而得新今辛公以清獄之德外宿之誠感動愚頑州人悉以訟為恥非古之遺愛歟趙煚音景字通賢為冀州刺史市多姦偽煚造銅斗鐵尺置之肆間百姓稱便上聞而嘉焉詔天下如其法嘗有盜田中蒿者為吏所執煚曰此刺史不能宣化故耳彼何罪也慰諭勸之令人載蒿一車賜盜盜感泣過於嚴刑謹案夫子云道之以政齊之以刑民免而無恥何若以德禮化民使其有恥且格之為美哉趙煚知其然作偽者制器以防之為盜者載蒿以愧之不尚嚴刑峻法惟期教化風行姦詭有不為之易轍耶唐太宗即位之初嘗與羣臣語及教化上曰今承大亂之後恐斯民未易化也魏徵對曰不然久安之民常驕佚則難教經亂之民多愁苦則易化封德彛非之曰三代以還人漸澆訛故秦任法律漢雜霸道蓋欲化之而不能也徵又曰五帝三王不易民而化行帝道而帝行王道而王顧所行何如耳若云漸澆今民當悉化為鬼魅矣帝從徵言謹案太公之封於齊也五月而報政伯禽之治魯也三年而報政不各隨其上之所𨗳耶德彞烏足以知之不數年太宗之教化大行非風俗之一變乎甚矣魏徵之言彰彰有驗也於以知忠厚存心者未有不獲忠厚之報也徐有功為蒲州司法參軍不忍杖民人服其德更相約曰犯徐參軍杖者衆必共斥之以故訖代不辱一人時武后聞知授有功為刑曹數犯顔敢諫持平守正執據寃罔嘗與太后反覆辨論太后大怒命拽出斬之有功回顧言曰臣雖死法終不可改至市臨刑得免凡三坐大辟終不挫折將死晏然后以此益重之所全活者甚衆酷吏為之少衰然疾之如讐矣卒年六十八授一子官張文成為有功贊曰躡虎尾而勿驚觸龍鱗而不懼者也謹案一人貪生千人立死有功寧犯顔而辨枉不因將斬而易辭仁愛與直莭並行執法者則之何失入之有宋沈度字公雅為餘干令父老以三善名其堂一曰田無廢土二曰市無遊民三曰獄無宿繫謹案聖人不云乎斯民也三代之所以直道而行也官有善政民無不譽皆其良心之所發而不容泯者也田無曠土則家有餘糧市無遊民則㕓無曠業獄無宿繫則囚乏寃民三者備而民心得有不咸欣至治而興來暮之歌哉朱熹知漳州奏除屬縣無名之征歲免七百萬以俗未知禮採古喪葬嫁娶儀制揭以示民命父老傳訓其子弟拆毁淫祠禁士女遊集僧舍風教一端謹案去民橫征之苦𨗳人儀制之間非以世道人心為己任者焉能及此文公先釋其困苦後教其婚喪循循善誘風教一新惜乎不令其久居廊廟大行其淑世𨗳民之德意耳元仁宗皇慶二年春三月御史中丞郝天挺上疏論時政陳七事一曰惜名爵二曰抑浮費三曰止括田四曰久任使五曰論好事六曰奬農務夲七曰勵學養士帝皆嘉納詔中書悉舉行之謹案凡帝王能納善言美時政未有不享一統之盛而樂物阜民康之樂者也今仁宗詔中書舉行郝御史所陳之七事理之所當廢者則必盡去世之所仰望者又必盡興政教一新人情踴躍沛乎莫遏無往而不見一道同風之治矣明太祖曰朕嘗取鏡自照多失其真冶工曰模型不正故也朕聞之惕然人主一心為天下型一不正百度乖矣可不慎乎謹案模型正矣使用人不明理財未善舛錯其政亦難致一道同風之盛此聖經於二者所以特舉之而並重也明太祖以鏡自勵握其要道克慎克勤範我黎民非致治之主耶敦風俗總論曰民之日流於汚下而不能享太平之福者人知之乎皆由未知孝弟忠信禮義廉恥之為重耳如父兄能以此而教子弟師友能以此而曉愚蒙在位者察其言行奬其淳良民惟恐身之不端而見棄於大人君子矣風俗有不敦者哉但異端不息則人心難正學校不興則教化不廣孝弟有虧則人倫未備寃獄不申則明慎多慚是皆有負於一人而獲罪於天下者也嗚呼小民之焦勞初釋衣食方充若不身自力行格彼非心雖處於豐亨明盛之時恐亦變而為頺敗委靡之俗矣不大為可憂哉歷稽往哲溺女巫而毁淫祠者有人修學宮而幸辟雍者有人教以敦倫寧如鸞鳯力爭寃獄甘觸龍鱗心何仁而膽何壯也又有格民恥訟愧盜如刑不恃刑罰為章程者非皆以善教得民心力任移風易俗之仁人耶然民亦有以三善名其堂者益見斯民也三代之所以直道而行者也信乎夫子之言君子之德風小人之德草草上之風必偃厚其生復其性有不永享太平之福者哉欽定康濟録卷四上
