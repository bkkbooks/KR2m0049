body:
  text: 臨事之政十一安流民以免顛沛漢成帝詔宋天聖詔唐王方翼韓琦富令弼趙良畢仲游滕逹道杜武紘制元宗鄭剛中明原傑漢成帝鴻嘉四年春正月詔曰數勅有司務行寛大而禁苛暴迄今不改一人有辜舉宗拘繫農夫失業怨恨者衆傷害和氣水旱為災關東流散者衆青幽冀部尤劇朕甚痛焉已遣使者循行郡國被災害什四已上民貲不滿五萬勿出租賦逋貸未入皆勿收流民欲入關輒籍内籍其名而内之所之郡國謹遇以理務有全活之恩以稱朕意謹案民至於一無所有借貸無門身同乞丐今日或父子同行明晚烏知不夫妻離散故不作他鄉之鬼者十不得其半也今此詔除其逋欠所在之處輒籍内之令郡國速為救全以廣天子之意民有不興鴻雁于飛之咏耶唐儀鳳間王方翼為肅州刺史蝗獨不至其境鄰郡民皆重繭走之方翼出私錢作水磑薄其直以濟饑瘵起舎數十百楹居之全活甚衆宋董煟曰流民至當為法以處之富弼令樵採打魚之類地主不得為主是也但一時未免侵擾莫若修隄浚河興水利公私兩便不然官司出錢租賃民間蘆場或柴篠山近縣郭市井去處縱流民樵採官復置場買之非惟流民得自食其力雪寒平價出賣亦可濟應細民宋仁宗天聖七年閏二月詔河北轉運使契丹流民其令分送唐鄧汝襄州以閒田處之仍令所過人日給米二升初河北轉運使言契丹嵗大饑民流過界河上謂輔相曰雖境外之民皆是朕之赤子也可賑救之故降是詔宋董煟曰境外之民一遇饑歉流徙過界仁皇尚且救賑之聖度廣大如此况同路同郡之民為守令者可不加意乎韓琦知益州嵗饑流民滿道琦募人入粟設粥濟之明年給糧遣歸又招募壯者等第列為禁軍一人充軍數口之家得以全活檄劍關民流移欲東者勿禁凡撫活流亡共一百九十萬慶歴三年陕西饑詔琦撫之琦至寛徵徭免租税給復一年逐貪殘不職之吏罷冗員六百七十人時河中同華等州饑民相率東徙琦發廪賑之凡活一百五十萬人琦後為相封魏郡王五子皆貴忠彦繼為相謹案天地之大徳曰生韓公體之有一民不被其澤者若已推而納之溝中韓公任之兩畨賑救法出萬全堪為濟世之嘉模永作活人之大典於今屈指七百餘年凡見流移必思盛德是韓公之泯沒者身而不亡者心以其生機猶在故也安流者可不以韓公為法哉富弼知青州㑹河北嵗凶流人就食者衆公勸民出粟益以官廪随所在貯之葺公私廬舎若干散處其人以便薪汲或曰此非弭謗自全計也公曰能全活數萬人不勝二十四考中書令哉行之愈力忌者亦無能難也其法詳于摘要備觀内謹案大膽做去細心處事汲汲於民罔知其他富公之安流也安流之法其要惟三一得食一有居三可歸富公盡得其妙故為千古之名臣哲宗元祐中耀州大旱野無青苗畢仲游謂向来郡縣賑濟多後時力愈勞而民不救乃先民之未饑揭榜示曰郡將賑濟且平糶若干萬石諭無出境民皆歡然安堵已而果漸艱食乃出粟以賑且平糶以給之隣近流散殆盡而耀民之當徙就食者乃十七萬九千口顧所發粟不及萬石以民粟繼之家給人足無一人逃者監司故搜於長安得二人曰此耀之流民也送還郡仲游驗閲皆中州之逐利者所齎自厚即非流民監司媿阻謹案民心惶惑百詭俱生仲游先期出示則民有所恃而無恐何流亡之有後則繼之以實政或平糶或賑濟恵不混施出之裕如非平日素有籌畫者而能然歟孝宗隆興二年趙令良帥紹興是時流民聚城郭待賑濟餓而死者不可勝計通判王恬閭邱寧孫建䇿云今盡發常平義倉米賑給之至来年麥熟止恐無以為繼况旬給斗升之米官不勝其勞民不勝其病莫若計其地之逺近口數之多寡人給兩月之糧令歸治本業不猶愈于聚城郭待升斗之給困餓而死乎趙行其言委官抄劄給糧以遣之不旬日間城中無一死人歡呼盈道全活甚衆謹案建䇿者貴乎通盤打筭如此則生若彼則死計地給糧令歸治業非生民于必死之中耶其妙處在總給兩月之糧日食之外尚可謀生君子哉趙公也聽仁者之言而活此流民也滕達道知鄆州嵗方饑乞淮南米二十萬石為備後淮南東京皆大饑達道獨有所乞之米召城中富民與約曰流民且至無以處之則疾疫起併及汝等矣吾城外廢營田欲為席屋以待之民曰諾為屋二千五百間一夕而成流民至以次授地鍋炊器用皆具以兵法部勒婦女炊少者汲壯者樵民至如歸上遣工部侍郎王古按視廬舎道巷引繩綦布肅然如營陣古大驚圖上其事有詔褒美用活者數萬人謹案安流者心不慈所需必不備法不嚴混亂不循規滕君部民有法派職有條經濟之才令人驚服詔㫖烏得不大為褒美國朝陳芳生曰流民過境必當量倉儲多寡預酌撫恤之宜如其未至又且所積無㡬或欲揚聲招之以飾虚譽此賊民之甚者亦必自賈竒禍切戒切戒杜紘為永平令嵗荒民將他徙召諭父老曰令不能使汝必無行若畱能使汝無饑皆曰善聽命乃官給印劵稱貸於大家約嵗豐為督償於是咸得食無徙者明年稔償不愆民甚德之謹案民之流者或死於道路或亡於疫疾或陷於刼賊或歸於豪强種種慘狀不一而足惟永平令慰之於未流之前生之於將斃之際民甚德之不亦宜乎鄭剛中判温州嵗饑流民載道勸守發倉賑之守曰恐實惠不及饑者答曰業有措置以萬錢每錢押一字夜出坊巷遇饑卧者給一錢戒曰勿拭去押字次早憑錢給米饑者無遺守歎服謹案出人不意而為之簡且便剛中法也若稍露其機假冐者多矣總之真心愛民自有善法推廣其意當不止此仁者勉之元武宗至大元年三月乙丑以北来貧民八十六萬八千户仰食于官非久計給鈔百五十萬錠帑帛准鈔五十萬錠命太師伊徹察喇等分給之罷其廪給三年詔各處人民饑荒轉徙疾疫死亡雖令有司賑恤而實惠未徧今嵗收成轉徙復業者有司用心存恤原抛事産依數給還在官一切逋欠並行蠲免仍除差税三年野死遺骸官為收拾於官地内埋瘞明陳龍正曰苛刻之吏稍遇豐收民間有復業者輒併追其舊逋以故民畏而不敢歸况更肯除税三年乎元時紀綱雖頺而民生往往受其寛政故雖灾荒之日子孫眷屬毫無愁苦仁民之政豈誣也哉明憲宗成化十二年御史原傑奏設行臺於鄖陽統治新設竹溪鄖西等縣詔可初祭酒周洪謨憐流民為項忠所逐著流民説有云東晉時廬松滋之民流至荆州乃僑置滋縣於荆江之南陕西雍州之民流至襄陽乃僑置南雍州於襄水之側其後松滋遂隸於荆州南雍遂併於襄陽垂今千載寧謐如故前代安流民甚得其道今若聽其近諸縣者附籍逺諸縣者設州縣以撫之置官吏編甲里寛徭役使安生理則流民皆齊民矣何以逐為御史李賢然其説至是流民復集遂援洪謨之説疏上之故命原傑往蒞其事事成進傑右都御史謹案實有救民之心何患無安流之法古之致治何嘗借才於異代項忠坐不讀書未知往事周君深明故典彷彿前人流民藉此而生三縣賴之而設故諸事不可不以法古為先也安流民總論曰時至饑年以守土牧民官視之則曰流民以天子宰相視之莫非赤子忍令其扶老攜幼冐雨衝風吞饑忍饑途栖路宿而流離於道路哉故愛民之君子皆當法前賢之遺事以救之也民之未流者當以畢仲游杜紘為法民之已流者王方翼韓琦富弼可師成帝之詔能釋行路之悲剛中之錢可救途宿之苦趙令良計程給費故郷得返原子山立縣收畱異地可居境外之民仁宗待之以赤子逺来之衆武宗濟之以恩膏是未流者已流者欲歸者欲畱者行路者途宿者他國民逺来衆前人無不有以處之矣是所望於後之仁人哀其窮而軫恤乎離鄉求活之苦詩云之子于征劬勞于野爰及矜人哀此鰥寡膺民社者顧可不知勞来還定安集之典哉十二勸富豪以助濟施齊管子漢趙憙春秋子皮子罕後魏樊子鵠唐来濟扈稱宋向經曽鞏陳珦明世宗齊桓公曰大夫多并其財而不出腐朽五榖而不散管子對曰請以城陽大夫而請之桓公曰何哉管子對曰城陽大夫嬖寵被絺綌鵝鶩含餘秫齊鐘鼔吹笙箎而同姓兄弟寒不得衣饑不得食將欲盡忠於邦國能乎其毋復見寡人削其秩杜其門而不出功臣之家皆争發其積蔵以與其逺近兄弟以為未足又收國之貧病孤獨老不能自食之氓皆與得焉國無饑民此之謂繆數舊評既抑城陽之寵又勸功臣之施管子片言其利大矣春秋之時鄭饑未及麥民病子皮餼國人粟户一鍾是以得鄭國之民故罕氏世掌國政以為上卿宋饑時司城子罕出公粟以貸使大夫皆貸司城氏貸而不書為大夫之無者貸宋無饑人晋叔向聞之曰鄭之罕宋之樂二者皆得國乎宋董煟曰罕氏果世掌國政於鄭樂氏遂有後於宋此所謂天災流行國家代有行道有福理之必然也漢趙憙守平原青州大蝗侵平原荒甚乃出俸賑之勸富民出榖濟饑所活萬計官太傅封侯世爵謹案以何忍獨飽存於胸中分俸救人伏湛行之矣今又見於趙公且勸富民出榖賑濟所活萬計何平原之多幸也荒於天而不荒於人非太守之力歟後魏樊子鵠為殷州刺史屬旱儉恐民流亡乃勸有粟之家分貸貧者并遣人牛易力多種二麥州内獲安謹案不勸貸窮民必流不種麥三春失望何以及秋成而得活樊刺史悉為措處令小民通那有無已不費而流亡少乏經濟之才者何足語此唐髙宗顯慶元年夏四月上謂侍臣曰朕思養人之道未得其要公等為朕陳之来濟對曰昔齊桓公出遊見老而饑寒者命賜之食老人曰願賜一國之饑者賜之衣曰願賜一國之寒者公曰寡人之廩府安足以周一國之饑寒老人曰君不奪農時則國人皆有餘食矣不奪蠶要則國人皆有餘衣矣故人君之養人在省其徴役而已今山東役丁嵗别數萬役之則人大勞取庸則人大費臣願陛下量公家所須外餘悉免之謹案勸分於有力之家孰若輸息於朝廷之上来濟所對得之矣饑寒遍於國中征役苦於萬姓雖日言養人而人得養歟一國之饑寒非朝廷不能濟也非老人不能言也君天下者幸致思之宋向經知河陽大旱蝗民乏食經度官廪嵗支無餘乃先以已圭田所入租賑救之已而富人皆争效慕出粟所全活者甚衆謹案旱蝗一見已知必饑理宜通盤打算國帑肯發而賑乎倉庫足散而救乎如其未然勸分在所不免以身樹法猶恐其遲向君肯後之乎故至饑年當加禮於富人深憐乎貧者否則富人不為我用而貧者無得飽之時矣仁宗時扈稱為梓州轉運使嵗大饑道殍相望稱即先出祿米賑民故富家大族皆願以米輸之於官而全活者數萬人降勅奬諭謹案竭一己之力有限合衆人之助方多即江海不擇細流之意耳然不有以先之其誰我信今扈公先出祿米以賑民則富人之恐後也必矣君子之德風信然曽鞏判越州時嵗饑度常平不足以賑給而田野之人不能皆至城郭至者羣聚有疫癘之虞前期諭屬縣召富人使自實粟數總得十五萬石視常平價稍増以與民民得從便受粟不出田里而食有餘粟價自平又出粟五萬石貸民為種糧使随嵗賦入官農民賴以不乏宋董煟曰此䇿固善但視常平價稍増則視時價必稍損矣恐成科抑不若前期勸諭商賈富民循環糴販之為愈陳珦知徐州沛縣㑹久雨平原出水榖既不登晚種不入民無卒嵗具珦謂俟水退即耕而種時已過矣乃募富家得豆數千石以貸民使布之水中水未盡涸而甲已露矣是年遂不艱食謹案凡勸募於人者原不可認定出錢出粟假如沛縣因久雨而田難種若勸人以粟賑之烏能久逺陳君揆時度勢豆尚可種遂募而種之果得以濟為費既省為力又多即此而推䦕人多少聰明啟人多少悟頭故因時而募者方稱善法明世宗嘉靖十年令支大倉銀三十萬兩賑濟陕西又奏准陕西灾傷重大扣本家食用其餘照依時價糶與饑民若每石減價一錢至五百石以上者給與冠帶一千以上表為義門遺棄子女州縣官設法收養如民家有能自收養至二十口以上者給與冠帶謹案此詔之妙在減價出糶者遞有恩榮使有米者不得盡索髙價小民可沾平糶之恩朝廷不煩發帑之費一舉而數善備焉然皆祖忠肅于公之政也至收養子女亦一時同行之事良有司所當究心者勸富豪總論曰勸諭之道不一握其要則民輸恐後失其方雖官索不輸曷弗以古人為法哉若管子之勸貴人則以退黜勸司城氏之勸大夫則以不伐勸其他先已而後人者比比然也至如揆時度勢若陳珦之勸輸豆種又在留心經濟者之善為師法矣但又有一種分頭勸不可不知宜預查通縣共有㡬社每社先訪才幹出衆者能事能言者數人聘以禮酌以筵許其旌奬每一人令其勸輸㡬户多者為能倘有富足而不聽勸輸者有司始自勸焉不激不撓循循善誘務在必得如是則社社無不輸之上户村村無不救之窮民矣詩云哿矣富人哀此㷀獨周禮云五族為黨使之相救五黨為州使之相賙統詩禮而觀之有無原貴相通濟貧即是安富勸分其可少乎特不可稍存其私耳十三乞蠲賑以紓羣黎漢蠲免詔憲宗唐李絳白居易京兆府奏宋沈倫趙善防程御顥臺元史明吴之鵬漢昭帝元鳳二年詔朕閔百姓未贍前年減漕三百萬石頗省乗輿馬及苑馬以補邉郡三輔傳馬其令郡國毋斂今年馬口錢三輔太常郡得以菽粟當賦宣帝元康二年五月詔曰今天下頗被疾疫之災朕甚愍之其令郡國被災甚者毋出今年田租安帝延光元年京師及郡國二十七雨水大風傷人詔曰被淹傷者一切勿收田租謹案漢帝之蠲免田租奚啻數千萬此但畧舉一二以見大綱凡在後之撫綏兆民者要當彷彿前人加意百姓蠲免徵收裕其衣食不待有司之報先事豫圖一聞奏請之章凖給恐後庶㡬天災不害而民有保聚之樂矣唐憲宗元和四年三月上以久旱欲降德音翰林學士李綘與白居易上言以為欲令實恵及人無如減其租税又言宫人驅使之餘其數猶廣事宜省費物貴狥情又請禁諸道横斂以充進奉又言嶺南黔中福建風俗多掠良人賣為奴婢乞嚴禁止閏月己酉降制釋天下繫囚蠲租税出宫人絶進奉禁掠賣皆如二人之請己未雨絳表賀曰乃知憂先於事故能無憂事至而憂無救於事謹案二公以婉言諫君蠲租之外復請多端悉皆聽從當斯時也愁苦之氣變而為和暢之風此時雨之所以立沛也元和七年上謂宰相曰卿輩屢言淮浙去嵗水旱近有御史自彼還言不至為災事竟何如李綘對曰臣按淮南浙東浙西奏狀皆云水旱人多流亡求設法招撫其意似恐朝廷罪之者豈有無災而妄言有災耶此盖御史欲為姦䛕以悦上意耳願得其主名按置之法上曰卿言是也國以人為本聞有災當急救之豈可復疑之耶朕昔不思失言耳命速蠲其租税謹案憲宗之蠲租也不但命蠲而且命速蠲可見人主愛民之心頗切特患無以告之耳使非李絳力言㡬為御史所誤小人之不可令其近君也若此元和十年三月京兆府奏恩勅蠲放百姓兩税及諸色逋懸等伏以聖慈憂軫疲氓屢蠲逋賦將行久逺實在均平有依倚權豪因循觀望忽逢恩貸全免徵繇至於孤弱貧人里胥敦廹及其輸納不敢稽違曠蕩之恩翻不沾及亦有奸猾之輩僥倖為心時雨稍愆已生覬望競相誘扇因至逋懸若無綱條實恐滋弊自今後忽逢不稔或有恩蕩伏請每貫每石内分數放免輸納已畢者准數折免来年租税則恩澤所加强弱普及人知分限自絶奸欺從之諸州府亦准此處分謹案欲厚斯民燭奸為最否則孤弱受其追呼豪强享其德澤完納者全無實恵拖欠者反得沾恩無以懲其既往何以勸其將来京兆之奏天子之從兩得之矣宋太祖建隆元年户部郎中沈倫使吴越歸奏揚泗饑民多死郡中軍儲尚百萬餘斛可貸於民至秋復收新粟有司沮倫曰今以軍儲賑饑民嵗若薦饑無所收取孰任其咎上以難倫倫曰國家以廩粟濟民自當召和氣而致豐稔豈復水旱耶帝命貸之謹案帝王雖肯愛民亦貴賢臣有以啟之宋太祖之貸軍糧若非沈倫之鼓舞焉能得貸和氣致祥實與洪範相符仁人之論非淺見者所能及也故數語而人傳千載程顥知扶溝水災民饑請發粟貸之隣邑亦請司農怒遣使閲實使至隣邑而令遽自陳榖且登無貸可也使至謂顥盍亦自陳顥不肯使者遂言不當貸顥則請貸不已力言民饑遂得榖六千石饑者獲濟而司農益怒視貸籍户同等而所貸不等檄縣杖主吏顥言濟饑當以口之衆寡不當以户之髙下且令實為之非吏罪乃得已謹案必存濟世豈論位之尊卑若程夫子之抗司農可言其位之尊耶食君之祿者必當忠君之事畧不以黜陟介其懐故民得濟而吏得免責也君子之處事豈庸衆之所能測哉寧宗嘉泰四年前知常州趙善防言貧民下户每嵗二税但有重納未嘗拖欠朝廷蠲放利歸攬户郷胥而小民未嘗沾恩乞明詔自今郊霈與減放次年某料官物或全料或一半其日前殘零並要依數納足則貧民實被寛恩官賦亦易催理從之謹案饑饉不蠲民安得活但蠲而不得其當徒歸攬户良善無恩惟有停徵本年舒萬姓剜肉之苦免其来年全四境易納之人頑户拖欠空延日月良民肯納来嵗無徵此外别無善法趙公所奏可為萬世不易之良規元成宗大德六年御史臺言自大德元年以来數有星變及風水之災民間乏食陛下敬天愛民之心無所不至理宜轉災而福今春霜殺麥秋雨傷稼五月太廟災尤古今重事臣等思之得非荷陛下重任者不能奉行聖意以至如此若不更新後難為力乞令中書與老成識達治體者共圖之復請禁諸路釀酒減免差税賑濟饑民帝皆嘉納命中書即議行之謹案以災傷而令老成圖治復請禁釀酒免差税廣賑濟皆饑年之要務而天子從之有不轉災而為福者哉昔人云儒者之言可寳萬世若此數語能發天地之陽和闡乾坤之生意非萬世之寳歟明神宗萬歴九年給事中吴之鵬疏内有云至若江南天下財賦半給於斯霪雨不絶田墟盡沒禾苗淹爛廬舎漂流若不大施捐免不可然臣之所謂蠲者不在積逋而在新逋不在存留而在起運何也盖積逋之蠲奸頑侵欠者獲厚恵而善良供賦者不沾恩則何以勸且以凶嵗議蠲而乃免樂嵗逋欠之虚數民危在眉睫而乃議往年可緩之徵輸則何以周急乃若存留不過國課十分之一二耳官俸軍儲之類詎可一日無哉故非蠲運濟民未有能獲甦者也謹案凶年之苦拆屋伐桑難存皮骨賣妻鬻子不足充饑故雖任爾千般鍛鍊總難上納分釐是不蠲亦蠲矣何若蠲之而民心猶在也然蠲而不得其法等於不蠲耳給事之疏搜剔利弊一目瞭然奏蠲者所當急效也乞蠲賑總論曰歲當饑饉小民顛沛流離非急下蠲租之詔頻頒濟困之恩庶民何由而康濟乎此漢唐以下之賢主知之深而謀之最急者也苐聖天子深居九重全恃親民有司目擊民艱者速為䦕報鎮撫大員旬宣德意者急為具題或請蠲或請賑或請貸時勢不同處置各異是故損上益下之權總在轉移者之審别其要剔除冐濫之法總在推行者之竭盡其心倘或民遇饑荒郡縣抑使不報報亦覆驗遲行甚至災荒分數寧刻毋浮賑濟貧窮寧嚴毋濫此豈聖主恵愛斯民之本意凡厥有司可勿為之仰承恩㫖以子恵元元乎要之安民不當惜費撫衆貴乎實心故為臣者不可不以奏請為急為上者自必當以聽納為先乞天恩而生饑餒洞達國體者必不以為損朝廷之儲蓄而以為培國本之良圖矣十四興工作以食餓夫齊晏子范仲淹宋趙抃歐陽修熙寧詔汪綱張守約邵靈甫明張純李畛林希元張敷華鍾化民齊景公之時饑晏子請為民發粟公不許當為路寢之臺晏子令吏重其賃逺其兆徐其日而不趣三年臺成而民振故上悦乎游民足乎食君子曰政則晏子欲發粟與民而已若使不可得則依物而偶於政謹案晏子之濟饑上無逆鱗之恐下有拯溺之恩以智行仁即工寓賑上下墜其仁術而不知此君子所以美之也宋趙抃知越州嵗大饑公多方賑救之外又僱小民修城四千一百人為工共三萬八千乃計其工而厚給之民賴以濟謹案公之賑救多端念此壯夫一種非興工不足以聚多人故城事一舉而四境歸工貧苦之家賴之得生富貴之室藉此免禍不然强而有力者當此饑寒逼廹不知做出多少不可知之事矣范公仲淹知杭州吴中大饑吴民素喜競渡好佛事乃縱民競渡召諸寺主諭以饑嵗工賤令其大興土木又新倉厫吏舍工技服力日數萬人是嵗兩浙惟杭晏然民不流徙謹案令人廣修寺院更美於官府興工其價稍増故耳至於嬉遊者必其力之可費而後費之借此以濟窮民格外之仁智寓於權也歐陽修知潁州嵗大饑公奏免黄河夫役得全者萬餘家此即周禮所謂弛力也又給民工食大修諸陂以溉民田盡賴其利此即以工役而寓賑濟之意也謹案歐陽修不但文章名世愛民之政至今膾炙人口此其所以稱全人也神宗熙寧七年正月河陽災傷䦕常平倉賑濟斛斗不足乞兼發省倉詔賜常平榖萬石興修水利以賑濟饑民謹案此詔愛民深矣一舉而數善備焉興修水利令民口有食而家有糧非目前之善䇿乎興修之後堤塘堅固溝洫分明田事賴以不損非永逺之善䇿乎賑濟之外果能府府皆然何患大有之難登張守約知涇州涇水善暴城每嵗増治堤堰費不貲適年饑罷其役或曰如水害何守約曰荒嵗勞民甚於河患禱之河神一夕雷雨河徙而南城不為患謹案昔潮州有鱷魚韓文公投之以文則徙而去之人以為竒今涇水暴城張公禱之於神一夕而徙不更異乎總之為萬民起見天地鬼神自能鑒原所以無靈不格耳人可不以萬民為念哉汪綱字仲舉知蘭谿嵗苦旱勸富民濬治塘堰大興水利饑者得食其力民賴以蘇謹案窮民無事衣食弗得法網在所不計矣故盜賊蜂起富室先遭塗毒而餓莩亦䘮殘生為害可勝言哉今勸富民治塘修堰饑者得食富室無虞保富安貧之道莫過於此邵靈甫宜興人儲榖數千斛嵗大饑或請乗時糶之曰是急利也或請損值糶之曰此近名也或曰將自豐乎曰有成畫矣乃盡發所儲僱傭除道自縣至湖鎮四十里浚蠡湖横塘等水道八十餘里通罨畫溪入震澤邑人争受役皆賴全活水陸又俱得利子梁登第孫綱冠於南省咸謂積善之報謹案耿夀昌奏立常平而封侯食報宋子貞廣濟饑人而官至平章救人之功上干天聽靈甫子孫連登髙第於理何疑明英宗正統五年二月以畿内災民食不贍勅張純都察院右僉都御史李畛大理寺右少卿區畫賑濟給京城饑民飯三月造奉天華盖謹身三殿乾清坤寧二宫以畿内饑復民二年家有父母者人賜二石米謹案昔周孔教云官府賑給安能飽其一家故凡城之當修池之當鑿水利之當興者召民為之日授其直是於興役之中寓賑民之恵也今張李二公查有父母之家又各賜米二石孝養教民又得之於興工之内矣非善政歟孝宗𢎞治元年張敷華為湖廣布政使嵗饑給粟散粥藥病掩胔髙值来商卑詞告糴出官錢修學宫徧役軍民籍為甲伍使資傭值以業餓者謹案一命之榮尚能起死况方面乎觀張公之所為身受其恵者固感激終身即見諸史者亦永懐不已噫𢎞治至今布政多矣惟張公膾炙人口者恵政及民故也嘉靖時僉事林希元疏内有云凶年饑嵗人民缺食而城池水利之當修在在有之窮餓垂死之人固難責以力役之事次貧稍貧人户力能興作者雖官府量品賑貸安能滿其仰事俯育之需故凡圯壊之當修涸塞之當濬者召民為之日受其直則民出力以趨事而因可以賑饑官出財以興事而因可以賑民是謂一舉而兩得也謹案僉事公云在在有城池水利之當修此一句不知提醒多少夢中人盖他事䦕銷不無難易若地方急務豈亦躊躇誠一舉而兩得之事也牧民者何事因循不為上少紓恤民之憂乎萬歴間御史鍾化民救荒令各府州縣查勘該動工役如修學修城濬河築堤之類計工招募以興工作每人日給米三升借急需之工養枵腹之衆公私兩利謹案化民之救荒日馳數百里廵察各縣粥厰随從無㡬所到食粥以故吏民畏服敬若神人如修學築堤等類悉令䦕工每人日給米三升不許畧加粞榖又諭州縣有領工價而或稍怠其役者鞭撻槩行停止恐一人卧痛闔室餓亡故耳誠不世出之仁人也興工作總論曰失業之人不知所往加以饑寒逼廹不就死於溝壑必創亂於山林勢所必至何也豐年尚有通那之處歉嵗斷無告貸之門晏子知之範君民於仁術立法千古宋之諸君子法之饑民得濟恵愛何深若張守約之禱河神一夕而徙鍾化民之戒鞭撻百世銜恩不又可為後世之則歟賜榖萬石而興修水利者神宗一人也給工食而寓孝道者張李二公也靈甫解囊於郷里又奚愧焉其他愛民之人未有不急急於此者惟宋與明為獨甚令彼窮人不暇於為非全家賴之而得食恩施萬姓名著千秋有為者亦若是我獨不能歟昔宋時莆陽一寺有建大㙮者工費鉅萬或告侍郎陳正仲曰當此荒嵗寺僧剝斂民財以作無益之舉盍白郡公禁止之正仲笑曰子過矣建塔之役寺僧能自為之乎莫非傭此邦之人而為之也斂之於富饒之家散之於貧寠之輩小民藉之得食當此凶嵗惟恐僧之不為塔也子乃欲禁之乎乃知仁者之言明白顯易可醒愚蒙而為後世法者此種是也牧民者可不知興工寓賑之道哉十五育嬰兒以慈孤幼越勾踐賈彪漢髙祖光武章帝鄭産晋王濬詔唐文宗南北朝任昉宋葉夢得劉仲彞俞寛虞允文元明林希越王勾踐令國中將免者以告免即分娩也公令醫守之生丈夫二壺酒一犬生女子二壺酒一豚生三人公與之母生二人公與之餼謹案户口不繁疆塲誰拓况遭顛沛尤貴人扶故越王命醫給賞與母與餼惓惓焉惟恐稍有不及而損之也此其十年生聚十年教訓二十年之後吴其為沼也嬰兒其可勿恤乎漢髙祖七年民産子復勿事二嵗復免也勿事不役使也光武帝建武中産子者復以三年之算每人嵗賦錢一百二十為一算章帝二年春正月詔曰人有産子者復勿算三嵗令諸懐􅗖者賜胎榖人三斛復其夫勿算一嵗著以為令謹案漢家之恤丁口也若是故版籍繁而幅員廣兩漢世數約有四百餘年異代豈無愛民之君能以嬰兒為重者則未有若漢家之惠養殷殷者矣賈彪為新息長小民困貧多不養子彪嚴為其制與殺人同罪城南有盜刼害人者北有婦人殺子者彪出案發而掾吏欲引南彪怒曰賊㓂殺人此則常理母子相殘逆天違道遂驅車北行案驗其罪城南賊聞之亦面縛自首數年間人養子者千數僉曰賈父所長生男名賈子生女名賈女謹案人見殺一無辜者必怒罵曰如此沒天理若嬰兒初出母胎何罪而即遭慘殺况殺之者又其父母非滅天倫之輩乎是可忍也孰不可忍也回車案問重於大盜明決之論也鄭産泉陵人為白土郷嗇夫時民家産子一嵗輒出口錢鮮有舉子者産勸百姓勿殺子口錢皆為代出郡縣具以聞上錢因得免改白土曰更生郷謹案民之艱於費也骨肉在所不顧故以口錢而殺子者衆今鄭君悉為代出因而上聞有感得免郷亦改為更生為人上者可不深念民艱凡可以蘇民困者悉更有以生之哉晋王濬為巴蜀太守邑人生子皆不舉濬嚴其科條寛其徭役所活數千人及後伐吴所活者皆堪為兵其父母戒之曰王府君生汝汝必死之用是破吴而建大功謹案以太守而活嬰兒如拾芥之易去其致死之由䦕其得生之路其誰敢異何以今不多見也王公因好生而全人骨肉後因骨肉之言而建大功食報之速不捷於影響歟南北朝任昉為義興守嵗饑以月俸治粥廣活饑民禁民産子不舉有孕者輒助其資斧全活數千餘家謹案平時尚有斃嬰之户荒年豈無殺子之人任公不但禁民之不舉有孕即為之輸金衣食無措之人藉此而併生其夫婦民惟恐孕之不有矣尚有殺子之人哉唐文宗太和六年五月詔内云天下有家長大者皆死所餘孩稚十二至襁褓者不能自活必至夭傷長吏勒其近親收養仍官中給兩月糧亦具都數聞奏謹案既恤孤於幼小必當月給其口糧奈何以勒令為功糧止兩月數月之後能保其無恙乎嗚呼天子尚恤其錙銖小民豈能常慷慨是唐之慈幼不及漢之懐保矣宋葉夢得守許昌值大水流殍滿道公盡發常平倉所儲者賑之全活者數萬人獨有遺棄小兒無由得救公詢之左右曰無子者何不收養曰人固所願但患嵗豐年長即来認去耳公即立法凡災傷棄兒父母不得復認遂作空劵印給發於里社凡得兒者明書於劵以付之計救小兒共三千八百餘人後官至尚書左丞封侯子皆登第謹案凡欲救人不立一善法則人必不為我救如葉公之救三千餘人假使不立印劵勿令父母不許復認救之焉能如此之衆故宋時有慈幼局近世有育嬰堂不可不盡法之以廣吾仁愛也劉彞所至多善政其知䖍州也㑹江西饑歉民多棄子於道上彞揭榜通衢召人收養日給廣恵倉米二升每月一次抱至官中看視又推行於縣鎮細民利二升之給皆為字養故一境生子無夭閼者謹案給之厚生之衆必然之理劉公操此立論故無不救之嬰蘇東坡云聞鄂人有秦光亨者今已及第為安州司法方其在母也其舅陳遵夢一小兒挽衣求救甚急因念其姊有娠將産而意不樂多子豈應是乎馳往省之則嬰兒已在水盆中矣救之得免以是觀之救之非救一嬰兒是救一安州司法矣廣而推之功可勝言哉虞允文聞浙人嵗有丁錢絹故細民生子即棄之稍長即殺之每為之惻然訪知江渚有荻塲利甚溥而為世家及浮屠所私虞令有司籍其數以聞請以代輸民之身丁錢符下日民歡呼鼓舞始知有父子生聚之樂有云虞公知太平州所行者謹案救人於一時不若救人於永逺救人於猶豫難必之間不若救人以的確不易之舉嚴其禁賑其米但救於一時而未必永逺丁錢絹朝廷之舊額遽爾請蠲恐多未確今虞公訪荻塲而代之賦既不缺且可永逺所失者皆私竊皇家之地利所全者實民間父子之至情今生齒浩繁皆謂之虞子也可四明俞仲寛宰劍之順昌作戒殺之文召諸郷父老為人所信服者列坐廡下以奉置醪醴親酌而侑之出其文使歸勸其郷人無得殺子嵗月間活者以千計故生子多以俞為小字轉運判官曹輔上其事朝廷嘉之就改仲寛一官仍令在任復為立法推行一郡後仲寛因被差他郡還邑每有小兒數百迎於郊謹案竹馬之迎不可與漢之郭汲比羙先後哉要非座列廡中親行酌勸者不能也故有活嬰兒之心平時宜以仲寛為法若逢饑嵗則非月給不生又當效王致逺之䦕慈幼局也明嘉靖時林希元疏内有云大饑之年民父子不相保往往棄子而不顧臣昔在泗州見民有投子於淮河者有棄子於道路者為之惻然因效劉彞之法凡收養遺棄小兒者日給米一升一支五日每月抱赴局官看視饑民支米之外又得小兒一口之糧逺近聞風争趨收養甚至親生之子亦詐稱收抱以希米食旬月之間無復有棄子於河於道者矣今各處災傷去處若有遺棄小兒如臣之法似可行也謹案僉事公遇一事必盡一事之美即如救嬰兒倣古人之法給一口之糧不但行之於一身兼欲廣之於天下尤有不可及處所題疏稿出筆醒豁不尚辭華大有洞䦕重門之意非寔心處事之君子乎育嬰兒總論曰户口之繁朝廷之瑞嬰兒夭折元氣虧傷臨民者救之育之曷可緩也况天地之大德曰生其所最愛者曰人可令其無端受戮雛雞小犬之不若哉故越王撫之而昌大其國漢室重之而世數綿長賈彪回車案問名垂不朽王濬嚴列科條功著平吴劉彞之掲榜通衢夢得之預為空劵恵在一時法垂萬世仁何溥也繼此惟俞仲寛之酌酒勸人庶㡬可匹林希元疏内有云饑民支米之外又利一口之糧争趨收養可見法之嚴不若恵之厚也古云拯諸溝壑而置之襁褓惟在臨民者之一舉意耳烏得以錙銖是惜而不以好生為懐哉周禮大司徒以保息六養萬民慈幼居其首則不可不急為之撫育也明矣識認嬰兒法須記其頭目疤􅂒及手指旋紋㡬箕㡬羅始無差錯足指悉騐而記之方得其微衣褓是何顔色布帛單綿此次辨也一曰凶年之所棄父母性命尚在不保安顧嬰兒或有人通知或有人抱来急宜收養問其来歴便其長大知父母之姓名也十六視存亡以惠急需漢鍾離意文帝南北朝宋周周暢蘭祥後賀隋辛公義宋仁宗諭唐太宗詔趙抃吕公著明太祖元仁宗林希元漢鍾離意㑹稽山隂人少為郡督郵太守賢之任以縣事建武十四年㑹稽大疫死者萬數意獨身自隐親經給醫藥隐親謂親自隐恤之經給謂經營濟給之所部多蒙全濟謹案大疫之時不難於給藥而難於親為調治身且不恤藥豈吝施病者藉之而得生非周禮司救之道歟周暢為河南尹安帝永初二年夏旱久禱無雨暢因收葬雒城傍客死骸凡萬餘應時雨嵗乃稔謹案君子之處事求其無歉於心而已尸骸零落暴露風霜於心安乎河南尹特為收葬雖不能必其有雨然而天道昭昭毫釐不爽爾既恩施於枯骨天豈不恤於生人此雨之所以立降也南北朝宋文帝元嘉四年五月京師疾疫遣使存問給醫藥死者若無家屬賜以棺器二十四年六月京邑疫癘使郡縣及營署部司普加履行給以醫藥謹案凡帝王遇病者當法神農之心而救之生見死者宜效文王之道而使之掩文帝此舉兩得之矣否則病者咨嗟死者暴露何以見仁風之廣被後周賀蘭祥為荆州刺史時盛夏亢陽祥親廵境内觀政得失見有發掘古塜暴露骸骨者謂守令曰此豈仁者之為政耶命所在收葬之即日雨是年大有州境先多古墓俗好發掘至是遂息謹案發掘古塜骸骨抛殘不特大傷天理亦且澆薄成風此際之縣家所為者何政聴其兇暴而不加禁止茍非刺史之深仁曷能致時雨之大降甚矣廵行之不可少也隋辛公義為岷州刺史岷俗一人病疫闔户避之病者多死公義欲變其俗命凡有疾者悉輿至㕔中親身為之拊摩病者愈召其家諭之曰設若相染吾殆矣諸病者子孫皆感泣而去敝風遂革合境呼為慈母謹案死生命耳故有病疫而死者有不死者必非一病而盡死也但無藥食調理此必死之道辛公知之力挽頺風親自拊摩見病之不能染也岷俗感之而化慈母之稱至今猶在恵愛何深也唐太宗貞觀十年關内河東疾疫遣醫賫藥療之十六年夏榖涇徐虢戴五州疾疫遣賜醫藥十八年自春及夏廬濠巴普郴疾疫遣醫往療謹案賢君爱民不使一民失所肯令疾疫為之遍染耶太宗命醫賫藥而往亹亹不倦民命自重不特無忝於神農之味藥且沛陶唐仁夀之遺風矣宋仁宗至和元年正月壬申京師疫内出犀角二令太醫和藥以療民疾其一通天犀也左右請留供服御帝曰吾豈貴異物而賤百姓哉立命碎之謹案君之民散於國君之寳蔵於庫無寳不失其為令主愛民則世稱為聖君仁宗深恤抱疾之衆不寳通天之犀其識鑒豈不可與抵璧投珠之聖主共垂萬世哉神宗熙寧八年吴越大飢趙抃知越州多方救濟及春人多病疫乃作坊以處疾病之人募誠實僧人分散各坊早晚視其醫藥飲食無令失時以故人多得活凡死者又給工銀使在處收埋不得暴露謹案人病矣飲食湯藥一無所有雖輕病尚不能生况饑餓之軀乎趙公用及僧人使視湯藥真妙想天䦕僧以慈悲為心者固勇往而直前即無此心亦不得不以活人自命也雖然究須誠實者方佳而賞勞亦不可少哲宗元祐三年冬頻雪凍死者無算吕公著為相日與同列議所以救禦之術乃發官米官炭遣官分塲賤賣以惠貧民疾病之人日給醫藥饘粥又不時委官看問以故得多全活謹案米炭則分塲而賤賣藥食則日給而救援且又不時委官分看非賢相而能之歟上有好者下必有甚焉者矣其時體相君之心而活民者要亦不少真不減虞夏黄農之世矣元仁宗皇慶二年十一月京師大旱疫帝問弭灾之道翰林學士程鉅夫舉湯禱桑林事以對帝歎曰此實朕之責也赤子何罪明日大雪謹案帝王之心常與天地相通者也上不愛民則疾疫頻傳元元是恤大雪降於次日則髙逺而不能力求者天也呼吸而可以相通者亦天也君天下者可勿以小民之疾苦為念哉明太祖洪武三年命天下府州縣䦕設恵民藥局拯療貧病軍民疾患每局選設官醫提領於醫家選取内外科各一員令府醫學授正科一員掌之縣醫學授副訓科製藥恵濟其藥於各處出産并税課抽分藥材給與不足則官為買之謹案大有為之君未有不以民命為重者此惠民藥局所由建也妙在即以税課抽分之藥材而給之不足又買之後世果能守而不廢歟太平日久貴者愈貴賤者益賤上下不相關死生不相恤始有不可知之事矣嘉靖時僉事林希元疏内有云時際凶荒民多疫癘極貧之民一食尚艱求醫問藥於何取給往時江北賑濟亦發銀買藥以濟貧民然督察無方徒資冐破臣愚欲令郡縣博選名醫多領藥物随郷䦕局臨症裁方多出榜文播告逺近但有饑民疾病並聽就厰領票赴局支藥遇死者給銀四分令人埋葬生死沾恩矣謹案林公説一食尚艱何從得藥真切中病根之語此醫藥之所以不可不並設也然不随郷立局處處有醫病者焉能匍匐就醫得藥而生至死者給銀收葬不至暴露尤見深仁急宜法也視存亡總論曰民之大事生死而已生惟疾病可憂死則暴露為慘二者不知所惠而謂民之愛戴猶深者恐未之確也周静軒有云天之立君以為民也君之立國以行保民之政也故炎帝察寒温平熱之性以療人疾後之為君者可勿體此意以救民哉藥局之䦕命醫之舉宜急行焉生之於床蓆活之於垂亡雖乏神犀賴兹慈母庶無忝耳設不幸枵腹而死矣茍不助銀令人速掩血淚染尸獸餐初斃青燐夜泣白骨飄零生不能充腸而足食死復暴露於荒郊㷀㷀赤子遭此慘傷可云澤潤蒼生保民之政一無歉歟今則並舉而列之於右則君臣各有所法不至有愧於前人豈尚貽譏於後世周禮云司救者有人以治民病也掌除骴者有人以掩骼埋胔也皆大典也每嵗宜然况饑年乎十七弭盗賊以息奸宄魯孔子譚顯漢光武唐太宗權德輿蘇軾宋司馬光謝諤董成煟諭明化金牛德昌邱濬魯孔子曰民之所以生者衣食也上不教民民匱其生飢寒切于身而不為非者寡矣故古之于盗惡之而不殺也今不先其教而一殺之是以罰行而善不及刑張而罪不省夫赤子知慕其父母由審故也况為政興其賢者而廢其不賢以化民乎知審此二者則上盗息謹案聖人之意重教而不重殺故曰古之于盗惡之而不殺况當飢饉之時命在須臾之際其為盗也意在盗其生耳茍與豐嵗之為盗者而同其罪必欲置之死可云審得其當哉要知殺固不可縱亦非宜聖人加一惡字弭盗者能體此意亦無愧于讀書之人矣漢光武帝建武十六年郡國羣盗並起郡縣追討到則解散去復屯結冬十月遣使者下郡國聴羣盗自相紏擿五人共斬一人者除其罪於是更相追捕賊並解散徙其魁帥于他郡賦田受廪使安生業自是牛馬放牧不收邑門不閉古者給人以食取諸倉廩故稱廩給廩食也謹案以兵治盗盗匿則不知以盗治盗盗散仍可捕生五人而殺一人為盗者人人自危所以並相解散也徙其魁帥不殺可知邑門不閉良心盡現要非賦田受廩使其有生業之可安者不能也譚顯為豫州刺史時天下飢饉競為盗賊州界收捕萬餘人顯愍其困窮自陷刑辟輒擅赦之因自劾奏有詔勿理謹案仁哉刺史譚公也萬人之命懸于一人之手與其殺之以彰王法無寧生之而令自新况人至衆豈無株連寃抑之累哉譚公赦之而自劾天子不問一團生意充塞寰區吾知亂者定而飢者食何也世間之理感召者多當此之時騰歡遐邇豈無瑞麥佳禾之應哉唐太宗時上與羣臣論止盗或請重法以禁之上曰朕當去奢省費輕徭薄賦選用亷吏使民衣食有餘則自不為盗安用重法耶自是數年之後海内昇平路不拾遺外户不閉商旅野宿焉謹案治水而不窮其源理人而不得其本皮毛之用何濟于事然則太宗之輕徭薄賦裕其衣食之本源是以徳化民不以盗視民較于用重法而殺人者不有天壤之隔耶後果四海昇平匪人改過故貞觀之治可為萬世法憲宗問宰相為政之道寛猛何先權徳輿對曰秦以慘刻而亡漢以寛大而興太宗觀明堂圖禁杖人背是故安史以来屢有壊法之臣皆旋踵而亡由祖宗仁政結于人心人不能忘故也然則寛猛之先後可見上善其言謹案徳輿之對憲宗大得為政之體天理人情之至也以秦漢而觀興亡瞭然慘刻何為唐之太宗恩浃人心是以危而復安亂而復治徳輿所對悉得其要天子安得不善其言由此觀之刑清政簡俗厚風淳皆君上敦崇寛大之一念所由成耳臨民者可勿鑒諸宋司馬光知諫院時言臣聞勅下京東西灾傷州軍如貧户以飢偷盗斛斗因而盗財者與減等斷放臣竊以為未便若朝廷明降勅文預言與減等斷放是勸民為盗也百姓乏食當輕徭薄賦䦕倉賑貸以救其死不當使之自相刼奪况降勅而勸之臣恐國家始于寛仁而終于酷虐意在活人而殺人更多也謹案温公豈不知活人為美政哉但盗刼斛斗而預言減等朝廷之德意雖深小人之盗心益熾是欲活人而反䦕殺機矣温公之奏何等深切明白盖君子之言有當先期而告諭者有宜存心而未發者時中為妙况天子之詔乎神宗熙寧七年蘇軾知密州軍論河北京東盗賊奏曰臣伏見河北京東比年以来旱蝗相仍盗賊漸多今又不雨麥不入土竊料明年春夏之際盗必甚于今日謹按山東自上世以来為腹心根本之地其與中原離合常係社稷安危近年公私匱乏民不堪命冐法而為盗則死畏法而不盗則飢飢寒之與棄市均是死亡而賖死之與忍飢禍有遲速相牽為盗亦理之常雖日殺百人勢必不止茍非陛下較得䘮之孰多權禍福之孰重特于財利少有所捐衣食之門一䦕骨髓之恩皆遍人心不革盗賊不衰者未之有也謹案荒歉之年東坡以人之棄市而死者遲凍餒而亡者速因為盗者多殊不知不止此也彼以為作盗而戮者止其一身受餓而亡者必死其闔户此急賑之猶恐其為盗况于不賑乎且山東係中原要地社稷之存亡係焉可勿令其啣骨髓之恩哉要非䦕衣食之門者不能也前賢論之既當後人玩之當行否則何貴乎有書積案盈箱之亂人耳目也孝宗淳熙中廬陵艱食飢民萬餘守譙門錄事參軍謝諤亟命植五色旗分部給窮民頃刻而定謹案經濟之學不講倉卒之變難支飢民萬餘守譙門而不散使無仁術慰羣黎雖無作亂之心難免刼掠之舉何以結局參軍急命樹旗别其五色分部賑之既分其黨不得相顧遍恵其民各自為心頃刻而定若此之事設遇飢年可不熟之于衷乎董煟曰荒政除盗亦當原情頃有京尹者以死囚代為盗者沉之于江此最為得法盖凶荒之年强有力者好倡亂須當有以警惕之使逺邇自肅之為上不然則羣聚而起殺傷多矣謹案智哉京尹之以死囚而代飢民仁哉董煟之援引以詔後世縱之恐諸人之効尤殺之在情理有可恕以此而警惕窮民非飢年禁盗之妙法耶金牛德昌為萬泉令屬蒲陕洊飢羣盗充斥城門晝閉德昌到官即日䦕城門縱百姓出入榜曰民苦飢寒剽掠郷聚以偷旦夕之命甚可憐也䏻自新者一不問賊皆感激解散縣境以安謹案干戈息盗不若至誠感人民因飢饉而為盗非擾社稷而興兵胡為乎閉其城而必欲致之死牛公洞悉其情使之自新人孰無良有不感激而解散者乎災傷既至此類恒多斟酌用之可稱上智明憲宗成化二十一年正月廵按山西監察御史周洪奏翼城垣曲等縣飢民嘯聚為盗招撫不服宜發兵捕之上曰民廹飢寒朕甚憫焉其令鎮守廵撫等官宣布朝廷寛宥之意明示有司撫御之方果有執迷不服然後相機除勦謹案兵者凶器也不得已而用之亦必大傷和氣民當飢嵗衣食全無御史與其既亂而請發兵何不未飢而請先賑不知罪已但欲殺人何以為御史仁哉上諭生意多而殺機少聖天子之心矣社稷有不鞏固而盗賊有不敗亡者哉邱濬曰臣願明勅有司遇有水旱災傷勢必至于饑饉必先榜示禁民刼奪諭之不從痛懲首惡以警餘衆決不可行姑息之政此非但救飢荒乃弭禍亂之先務也倘有富民閉糴何以處之曰先諭之以恵隣次䦕之以積善許其随時取直禁人侵其所有民之無力者官與之劵許其取息待熟之後官為追償茍積粟之家丁口頗衆亦必為計算推其贏餘以濟匱乏若彼僅自足亦不可强也凡有所積不肯發者非至豐穰不許出糴彼見得利又恐後時自計有餘亦不得不發矣謹案刼糧之衆固可恨閉糴之民亦可嫌古人以數字而慰萬民曰刼糧者斬閉糴者籍誠荒政之妙䇿也今邱公欲痛懲首惡以警餘人非善法歟雖然衣食無資恐難終止故勦除不如招撫之美蠲免不及賑濟之佳實恵及民心懐盛德何憂百姓之傾危否則鮮有不為明主之責罰者慎之慎之弭盗賊總論曰弭豐年之盗易弭飢嵗之盗難何也持法若嚴則失緩刑之意治之稍寛又䦕刼奪之門嗚呼惟知之真則處之當盖廹于飢寒而圖茍活者實不等于以刼掠而為生涯者也此孔子有曰古之于盗惡之而不殺漢光武徙賊帥于他郡給田受廩使安生業唐太宗之慎選賢良輕徭薄賦裕其衣食明之成化惟以招撫為心不以勦除是急豈非皆務寛大而不尚慘刻者哉司馬光之不欲豫言減等深于愛民也蘇子瞻之先期請賑明于治道也對譚顯而何慚經濟如叅軍存心若京尹非即晝䦕邑門之意乎邱公以逞刼奪之風者當痛懲首惡以警餘人言簡而理當舎此何求於以知饑年之弭盗外貌不妨示以嚴若柴瑾之封劍命誅楊簡之斷肋示衆得之矣存心又貴其能恕如龔遂之撫恤亂民王曽之笞釋死犯近之矣易云天地之大德曰生聖人之大寳曰位何以守位曰仁然則為君者固當溥吾仁而永吾位為臣者可不體天地之心承朝廷之意裕其衣食之源以告無忝于聖人之立説哉十八甘專擅以奮救援漢汲黯晋陶回韓魏韶元忠後李隋張須陀宋范純仁唐員半千楊紘程張顥範元𢎞洪王皓明竑漢武帝時河内失火延燒千家上使汲黯往視還報曰家人失火比屋延燒不足憂也臣過河南貧人傷水旱者萬餘家至父子相食臣謹以便宜持節發河南倉粟以賑貧民臣請歸節伏矯制之罪上賢而釋之宋董煟曰古者社稷之臣其見識施為與俗吏固有不同黯時為謁者而能矯制以活生靈今之太守號曰牧民一遇水災牽制顧望不敢專決視黯當内愧矣韓韶為羸長羸長泰山郡縣令長賊聞其賢相戒不入羸境餘縣流民萬餘户入縣界韶䦕倉賑之主者爭謂不可韶曰長活溝壑之人而以此伏罪含笑入地矣太守素知韶名德竟無所坐韶與同郡荀淑鍾皓陳寔皆嘗為縣長所至以德政稱時人謂之潁川四長謹案他縣之民流入我境遽䦕倉賑救世豈無議殊不知仁人之心見彼流于道路求活無門焉分彼此噫我能救人人亦自能諒我公道在天地間斷無少滅之理晉陶回為吴興太守時人飢榖貴三吴尤甚詔欲聴相鬻買以拯一時之急回上疏曰當今天下不普荒儉惟獨東土榖價偏貴使相鬻買聲必逺流北海聞此將窺疆場如臣愚意不如䦕倉廩以賑之乃不待報輒䦕倉及割府郡軍資數萬斛米以救乏絶由是一境獲全既而下詔并勅㑹稽吴郡依囬賑恤謹案古云隣之厚君之薄也若君之薄非隣之厚歟今陶太守惟恐惡聲逺播専擅救全上格賢主悉倣其法識力豈在汲黯之下哉後魏李元忠為光州刺史時州境災儉人皆菜色元忠表求賑貸至秋徵收被報聴用萬石元忠以為萬石給人計一家不過升斗耳徒有虚名不救其弊遂出十五萬石賑之事訖表陳朝廷嘉之謹案杯水不可救車薪之火古云二千石與國同休戚救民之灾茍不力任王仁恭見殺于劉武周郭子和誅王才于榆林衛皆以不賑而起人拂􅊇之心可小視哉今刺史不事虚名増其賑米不獨救民且可弭盗隋張須陀為齊郡丞㑹興遼東之役百姓散失又屬嵗飢榖米踴貴須陀䦕倉賑給官屬咸曰須待詔勅不可擅與須陀曰今帝在逺遣使往来必淹嵗序百姓有倒懸之急如待報至當委溝壑矣吾若以此獲罪死無所恨先䦕倉而後上狀煬帝不責也謹案惻隠之心人皆有之不因帝王而異也但為小人之所蔽擴充者無㡬耳郡丞為國為民不惜身命䦕倉賑給雖專擅于下而上不之責後之閉倉不救者抑何䕶身之䇿太堅也耶唐員半千為武陟尉屬頻嵗旱飢勸縣令殷子良䦕倉以賑貧餒子良不從㑹子良赴州半千便發倉粟以給飢人懐州刺史郭齊宗大驚囚而按之時黄門侍郎薛元超為河北道存撫使謂齊宗曰公之民不能救之而使惠歸一尉豈不愧也遽令釋之謹案有心救民位不在乎大小如員君職不過一尉耳令不從其請後因令之公出遽發倉而賑之一㸃救人之念有勃然不可遏者民不賴之以生耶何物太守竊位茍祿而且囚之雖然不有小人難形君子此薛員二公所以見稱千載也宋環慶大饑帥守坐不職罷去范純仁代之始至慶州餓殍載路官無榖以賑純仁欲發常平封貯粟麥賑之州郡官皆不欲曰常平擅支罪不赦純仁曰環慶一路生靈付某豈可坐視其死而不救衆皆曰須奏請得㫖純仁曰人七日不食則死豈能待乎諸公但勿預吾獨坐罪可耳即發粟賑之一路饑民悉得全活謹案世多不職之吏人亦知其所以不職之故乎一懼禍患二為功名三貪財貨人肯置三者于勿問惟以生民為己念斷無不做一畨惠人之事名垂竹帛者也如范公曰吾當自坐四字出口不知壓倒多少無能之輩仁宗慶厯七年江東大饑運使楊紘發義倉以賑之吏欲取㫖紘謂吏曰國家置義倉本慮凶嵗今須㫖而發人將殍死上聞而褒之謹案楊公認定義倉為荒而建以之救民何辭以責即有不測一身危而萬姓安得失已非愚者所及况事聞於上不但不罪而且褒之遲早之間所生多矣智孰及之程顥攝上元令盛夏塘堤大决法當聞之府府禀於漕然後計工調役非月餘不能興作顥曰如是苗必槁矣民將何食救民獲罪所不辭也遂發民夫塞之嵗則大熟謹案聖賢出仕之心非致君則澤民豈為功名豈拘文法塘決而待請雖則允從苗已稿矣傷稼殺人俗吏之事程夫子而肯為之哉秀州錄事洪皓見民田盡為水沒饑民塞路倉庫空虚白郡守以荒政自任悉籍境内之粟留一年食發其餘糶於城之四隅本境民有不能自食者洪亦為主之凡流民俱立屋於城之西南兩廢寺男女異處樵汲有職稍有所犯以民饑不可杖逐而去之借用所司發運錢糧不足㑹浙東運常平米四萬過城下洪遣使鎻津栅語運官截留官噤不肯曰此御筆所起也罪死不赦公曰民仰哺當至麥熟今臘猶未盡中道而止則如不救寧以一身易十萬人之命竟留之未㡬亷訪使至驗其立法曰吾行邉軍之法不過如是違制抵罪為君脱之又請得米二十萬石所活九萬五千餘人後官至端明學士謚文惠謹案洪公之活民也始則心傷餓殍竭力何辭繼則米盡官民雖死勿恤故遣吏鎖柵强遏皇糧當斯時也但知有萬民之命不知有一己之身認罪活民究無所罪後且身膺上爵子拜相公誰謂作福而無福報哉元武宗至大二年大名大水張𢎞範輒免其租税朝廷罪其専擅𢎞範進曰臣以為朝廷儲小倉不若儲之大倉詔勿問謹案張君之説大為近理設大倉窮而小倉徒多充實不特無益抑且難恃是故哲后賢臣諮謀朝夕惟以民生為急恒産是謀迨乎里多盖蔵兆姓殷富然後政教流行而風俗淳厚豈非盛時休美之業歟眀景帝景泰二年都御史王竑廵撫江北時徐淮連嵗饑荒竑大發官倉賑救諸倉盡空獨廣運倉尚有滯積此備京師之用者也一中貴一户部官主之竑欲發而主者難之竑曰民惟邦本本固邦寧民窮至此旦夕為盗且上憂朝廷何論備京師爾不吾從脱有變吾先殺爾治爾召盗罪然後自請死竑詞既戅主者素憚其威許之所存活百五十八萬八十餘人他境流寓安輯者萬六百餘家共用米一百六十餘萬石先是徐淮大饑帝於㯶轎上閲疏驚曰餓死我百姓矣奈何後得䦕倉賑濟之奏又大言曰好御史不然百姓多餓死矣謹案史載竑部民有疾者許其舁輿即愈竑每出百姓則争舁之可見有活人之功者身雖未死已作神人昔朱熊所刻救荒補遺内言韓魏公方歿有死而復甦者言公為閻羅天子矣即同事神人無不欽敬其救荒之功也其事類此因記之甘専擅總論曰士君子䇿名清時専為一身之計乎萬姓流離將斃若不奮身以救何貴乎有此權位也如以死懼古詩云遍觀四海人誰為不死客然則死忠死孝死為萬民正死之得其所者矣又何懼哉况天之賦性相同惟帝王更多惻隠未有不以恤灾捍患之臣而為不忠者也何必盡以珠玉之貴惜其身而不以愛身之道以愛民如以位言員半千不過縣尉儼然有汲黯之風洪皓止於錄事力並純仁之舉曷常以尊卑為限也至若邑宰韓韶之救活流民人稱四長程顥之發夫防決苗長千村非良牧而何太守獨無善政歟陶回之發粟擅美於晋時元忠之賑貸首稱於後魏皆彰彰青史可法而可嘉者也嗚呼人當隋代尚有郡丞張須陀之救援後世不能概見者何哉如宋之運使楊紘明之廵撫王竑皆㧞萃超群實心盡職力任䦕倉全活萬姓生為柱石沒為明神信所宜矣大倉之喻𢎞範且然人可弗及歟乃知有致君澤民之心者不獨不重視其功名即此身亦不甚惜耳其意若曰左傳不云乎茍利社稷生死以之吾何為而不以智仁勇三者自勵也故其知災傷之當恤智也哀矜惻隠仁也甘心専擅勇也一事舉而震驚千古寧獨一時哉十九撲蝗蝻以保稼穡漢卓茂戴封宋魯均恭唐太宗宋太宗姚李崇廸謝王綘亷明士元張寛朱熊漢平帝時卓茂為密令天下大蝗河南二十餘縣皆被其災獨不入密縣界督郵言之太守不信自出案行見乃服焉謹案卓公之為令也人納其訓吏懐其惠教化大行豈若他人食祿而無益于國家哉此蝗蝻之所以不入其境也可嘆者卓之賢太守未之知也賢愚莫辨黜陟混淆何以為太守光武時宋均為九江太守虎皆渡江而去中元元年山陽楚沛多蝗其飛至九江界者輒東西散去由是名稱逺近謹案愛民之人即此誠心能格異類故猛虎渡江蝗蝻散去豈因祈禱而然全在平日之清亷恵愛有以格之耳故凡為太守者欲除蝗蝻于四境之上不若除蝗蝻于一心之中心清而政仁所去者不獨一蝗也戴封字平仲對䇿第一擢拜儀郎遷西華令時汝頴有蝗災獨不入西華界督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境竒之謹案異哉督郵確似蝗蝻之主帥也督郵以剝民肥已為心蝗蝻亦以食苗自飽為事二而一者也此蝗蝻所以随督郵而来去耳微戴君之亷明西華之青禾㡬何而不為蝗蝻之盡食也故觀蝗蝻之有無即知司牧之賢否可不警哉元和間魯恭為中牟令有三異蝗不入境化及禽獸童子有仁心謹案蝗之為災皆因官之不職有以致之故京房易傳云臣安祿滋謂貪厥灾䖝易飛候曰食祿不益聖化天視以䖝䖝無益于人而食萬物者也今魯君之化及于禽獸童子有仁心蝗尚入其境哉唐太宗時畿内有蝗上入苑中掇數枚祝之曰民以榖為命而汝食之寧食吾之肺腸舉手欲食之左右諫曰惡物恐成疾上曰朕為民受灾何疾之避遂吞之是嵗蝗不為灾謹案君有仁言熒惑退度今欲吞惡物寧食肺腸以救小民而蝗蝻有不為之感化哉天地以生物為心太宗以救民為重是天即君矣君即天矣君心激切天意克從蝗不為灾理固然耳又何疑哉元宗䦕元四年山東大蝗民祭拜坐視食苗不敢捕宰相姚崇奏云秉彼蟊賊付畀炎火此古除蝗詩也乃出臺臣為捕蝗使分道殺蝗盧懐慎曰凡天灾安可以人力制也且殺䖝過多必戾和氣崇曰昔楚王吞蛭而厥疾瘳叔敖斷蛇而福乃降今蝗幸可驅若縱之榖且盡殺䖝活人禍歸于崇不以諉公也蝗害遂息謹案此何事也猶牽制顧慮作此迂論盧公清慎有餘學術不足其為相也元宗原欲其坐鎮雅俗世人稱為伴食中書良不誣也宋太宗淳化二年春正月不雨蝗三月乃雨時連嵗旱蝗是年尤甚帝手詔宰相曰朕將自焚以答天譴翌日大雨蝗盡死謹案昔㓂凖言洪範云天人之際應若影響斯言誠不謬也太宗愛民心切直欲自焚以答天譴翌日大雨飛蝗盡死羽書桴鼓捷不若此所謂天髙而聴卑特患無愛民之君不患無不息之災也真宗咸平八年秋九月時連嵗旱蝗帝問學士李廸曰旱蝗薦臻將何以濟廸言陛下土木之役過甚蝗旱之災殆天意以警陛下也帝然之遂罷諸營造禁獻瑞物未㡬得雨青州飛蝗赴海死積海㟁百餘里謹案帝問旱蝗而李廸以力役對若天有以命之也帝即然之遂罷營造禁獻瑞物時雨即降飛蝗盡死可見大心即在民心何必逺求哉凡欲除災害者曷勿以民情而揆之也謝綘論救蝗有云竊見比日蝗蟲亘野坌集入郛郭而使者數出府縣監捕驅逐蹂踐田舎民不聊生謹按春秋書蝗為哀公賦斂之虐又漢儒推蝗為兵象臣願令公卿以下舉州府守臣而使自辟屬縣令長務求方略不限資格然後寛以約束許便宜從事期年條上理狀參考不誣奏之朝廷旌賞錄用以示激勸謹案蝗之為災一在賦斂之苛一在官員不職古人所推理必不爽漢儒又推兵象者若以民困不救久將紛紜擾國急切難于撲滅也今謝公欲令公卿以下各舉守臣令其便宜從事期年參考以定賞罰非至計歟元順帝時秋七月河南武陟縣禾將熟有蝗自東来縣尹張寛仰天祝曰寧殺縣尹毋傷百姓俄而黑鷹飛啄食之謹案天下之蠢然而無知者蟲鳥也殊不知最靈明而有覺者亦蟲鳥也天子改過蝗皆自斃郎官自祝遂致鷹驅故有牧民之責者不必患蝗之為害特患己之不誠也明成祖永樂二十二年五月濬縣蝗蝻生知縣王士亷以失政自責齋戒率僚屬耆民禱于八蜡祠越三日有烏數萬食蝗殆盡皇太子聞而嘉之顧侍臣曰此實誠意所格耳謹案禮記云先王能修禮以達義體信以達順則天降膏露地出醴泉鳳凰麒麟皆在郊棷矣今濬令悔過自責誠心敬禱故始失而終得也蝗無知而烏有靈感孚之所致耳朱熊所緝救荒補遺有云天災不一有可以用力者有不可以用力者凡水與霜非人力所能為姑得任之至于旱傷則有車戽之利蝗蝻則有捕瘞之法茍可以用力者豈得坐視而不救哉為守宰者當速為方畧以禦之以令斯民也謹案明朱熊所刻救荒書即董煟之所緝不過増減其間俱至當而不可易故正統間刻此書名曰救荒活民補遺萬歴間復有人刋之以行于世可見惻隠之心人皆有之若能廣為傳布蒼生之幸矣撲蝗蝻總論曰蝗蝻之生人知之乎刻剝小民不為顧恤地方官吏侵漁百姓之見端耳所以在上者以愛民為心未有不格天地而異類為之消除至如唐太宗寧食惡物而不恤姚崇認後患而不辭則蝗害頓除或思自責或罷土木灾之散也捷若桴鼓太守得如宋均縣令能如卓茂等安得有蝗入其境中即有之不為黑鷹啄食亦為鳥雀所餐又何慮哉此謝絳朱熊之論所當法也要知蝗蝻不去則草野咸受其害一在修德格天一在捕瘞除患如以物命為憐蝻者蝦之遺孽也天下之食蝦者統嵗而計寧止億萬石何獨至于害稼之蝗而疑之此汴州刺史所以見誚于姚崇也詩云去其螟螣及其蟊賊無害我田穉上古且然今何惑哉二十貸牛種以急耕耘漢昭帝僧静南齊戴南北朝魏太子唐袁髙齊德州劉渙宋太宗諭熙寧御批曽林鞏元明希查喻道均漢昭帝始元元年三月遣使者賑貸貧民無種食之人秋八月詔曰往年災害多今年蠶麥傷所賑貸食勿收責毋令民出今年田租謹案殘冬已過東作方興若不急令耕耘將来困苦必倍於前者力盡人疲故也昭帝特令貸之種食不但貸之而又令勿收責且蠲其租非天子之仁相君之德沛生機於民食者乎南北朝宋文帝元嘉二十一年魏太子課民稼穡使無牛者借人之牛以耕種而代為耘田以償之凡耕種二十二畝而芸田七畝大略以是為率使民各標姓名於田首以知其勤惰禁飲酒遊戲者於是墾田大増謹案民無牛令借人之牛使耕種耘田以償是有牛者不吝而耕田者亦樂於相從處之大得其公又使標姓名於田首而知勤惰種種妙法不一而足無惑於墾田之大増國賦由之而足也南齊戴僧静為北徐州刺史買牛給貧民令耕種甚得邉荒之情謹案有田無牛猶之有舟無楫不能濟也刺史一郡之主民之生死係焉買牛而給與貧民獲救荒之本其得民情也宜矣唐徳宗貞元元年二月詔曰諸道節度觀察使所進耕牛委京兆府勘責有地無牛百姓量其産業以所進牛均平給賜其有田五十畝已下人不在給限給事中袁髙奏曰聖慈所憂切在貧下百姓有田不滿五十畝者尤是貧人請量三兩户共給牛一頭以濟農事從之是時蝗旱之後牛多疫死諸道節度韋臯李叔明等咸進耕牛故有是命謹案給事之奏深得民情民以貧而田不能多再以田少而牛無所給是困而益困貧而益貧矣豈裒多益寡之道歟視其田之多寡共給耕牛當為至法文宗太和三年七月齊德州奏百姓自用兵已来流移十分只有二分伏乞賜麥種耕牛等勅量賜麥三千石牛五百頭共給綾一萬疋充價直仍各委本州自以側近市糴分給謹案兵荒之後惟賴救全牛種俱無何由得活德州之奏請不大有功於萬民耶詩云愷悌君子人之父母首重耕耘何慚民牧宋太宗至道二年詔官倉發粟數十萬石貸京畿及内郡民為種有司請量留以供國馬太宗曰民田無種不能盡地利且竭力以給之國馬以芻藁可矣謹案天地之利用之則不竭取之則非貪以之救民何民不救太宗借種與民而欲盡收地利以食民是神農之心矣肯以此粟為國馬所食哉有司之請不智甚矣英宗治平間河北凶荒民無食多賤賣耕牛劉渙知澶州盡發公帑錢買牛明年逋民歸無牛耕價貴十倍渙依元直賣牛河北一路惟澶州民不失所謹案公之賣耕牛雖濟民於已荒之後實救人於未困之先何也使人賣時不買今欲買時安得有賣牧民者肯事事倣此而行則饑民無往不濟矣神宗熙寧八年三月上批沂州淮陽軍災傷特甚百姓不惟缺食農乏榖種田事殆廢粒食絶望糾集為盗者多實可矜憫若不復加賑恤恐轉至連結羣黨難以捕擒陷溺其民投之死地可速議所以賑恤之遂詔京東轉運提舉司發常平錢省倉米等給散與孤貧人户謹案民無種榖將来之口糧何從取給賑之固不勝其賑而所賑之粟米并且難支為民務本計者肯恝然乎今神宗御批小民絶粒在於無種因而大發倉庫廣賑孤貧本固矣尚有憔悴其枝者哉曽鞏知越州值嵗饑出粟五萬石貸民為種糧使随嵗賦入官農事賴以不乏謹案知一州即當知一州之緩急曽公之知越州嵗饑矣使不知種糧之當貸或死或盜紛然而起即不困阨元氣已傷今以五萬石貸之随賦而入官既無損民不困乏何美如之查道知虢州蝗災知民困極急取州麥四千斛貸民為種民困由是而蘇遂得盡力於耕耘之事古人云春秋於他不書惟無麥即書董仲舒建議令民廣種宿麥無許後時盖二麥於新陳未接之時最為得力不可不廣也查君貸之以種非得古人之良法者哉明僉事林希元疏内有云幸而殘冬得度東作方興若不預為之所將来嵗計復何所望故牛種一事猶當處置臣召父老計之自立一法逐都逐圖差人查勘除有牛無種有種無牛聴自為計外無牛人户令有牛一頭者帶耕二家用牛則與之供食失牛則與之均賠無種人户令富人户一人借與十人或二十人每人所借雜種三斗或二斗耕種之時令債主監其下種不許因而食用收成之時許債主就田扣取不許因而拖負亦加其息官為主契付債主收執此法一立有牛種者皆樂於借而不患其無償缺牛種者皆利於借而不患其乏用有災傷處如臣之法似可行也謹案僉事公之貸牛種也特設一法不取給於官而通那於民非至公至當可乎故加息立劵萬不可少無許拖負猶得民情但當多發示諭遍曉城市郷村不得略遲時日况為數不多救全甚廣非親身與父老斟酌者而能得此善政耶萬歴戊子東南水災窮民工力種糞一無所有新建喻均守松江得請免田糧若干出示佃户還租亦如減糧之數仍令有田之家量留榖本至春耕時貸與佃户為来嵗種田之資一時稱為恵政謹案請免田糧而恵及佃户其仁溥矣又令各留榖本以貸佃户殷殷無巳無非為郷民起見不知喻公之為郷民正所以為富户郷民絶粒業主何收故當時鍾御史給民之牛種云有可耕之民無可耕之具饑餒何從得食租税何從得有也貸牛種總論曰四民中最苦者農也耕耘之外别無所能當此饑饉之時若不令其速為耕種則又絶將来之望矣賑濟者囊已俱傾待哺者仍然引領不猶中道而廢耶今觀漢唐以及於明貸耕牛之善法莫如魏太子貸宿麥之妙䇿首推查道矣四五月間新陳未接之際得此一助民賴不死此董仲舒所以力言二麥之不可少也為君者能如漢之昭帝宋之太宗熙寧之御批為臣者得若南北朝之戴氏及唐宋明三代之諸臣何患乎牛之不得種之不播哉粒食可望而餓莩得生矣但林公疏内有云令保甲監其下種曽則以為不若使田隣互相監種之為便也彼見我田我見他地一不種則有罰何冐領之有左傳云政如農功日夜思之思其始而成其終可見臨民者必如是而後可以言為政也則牛種之貸可不代為籌畫勉其耕種以慰西成之望乎欽定康濟錄卷三下
